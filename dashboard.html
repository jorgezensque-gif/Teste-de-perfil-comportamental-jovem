    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --destaque: #00d2d3; }
        body { background: var(--grafite); color: white; font-family: sans-serif; padding: 20px; }
        .grid-paineis { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #2d3436; padding: 20px; border-radius: 15px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); }
        select { width: 100%; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 16px; }
        canvas { max-height: 400px; }
    </style>

    <h1>Painel de Controle - Jorge</h1>

        <div class="card">

            <select id="selectAluno" onchange="atualizarGraficoIndividual()">

        </div>

<script>
    // Configuração Firebase do Jorge
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dadosAlunos = {};

    // Puxar dados do Firebase
    db.ref('resultados').on('value', (snapshot) => {
        dadosAlunos = snapshot.val();
        popularSelect();
        gerarGraficoColetivo();
    });

    function popularSelect() {
        const select = document.getElementById('selectAluno');
        select.innerHTML = '<option value="">Selecione um aluno...</option>';
        for (let id in dadosAlunos) {
            let option = document.createElement('option');
            option.value = id;
            option.text = dadosAlunos[id].aluno;
            select.add(option);
        }
    }

</body>
</html>
