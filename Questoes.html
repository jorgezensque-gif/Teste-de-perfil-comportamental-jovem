<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Pescar - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #181c24; padding: 30px; border-radius: 15px; border: 1px solid #252a35; max-width: 600px; width: 100%; text-align: center; }
        input { width: 80%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; }
        button { background: #ff5c3a; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .opcoes button { text-align: left; background: #252a35; margin: 5px 0; }
        .barra-bg { width: 100%; height: 8px; background: #0a0c10; border-radius: 4px; margin: 20px 0; }
        .barra-fill { height: 100%; background: #ff5c3a; width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div class="container" id="box">
    <h2>Identificação</h2>
    <p>Por favor, digite seu nome completo:</p>
    <input type="text" id="nomeAluno" placeholder="Nome do Jovem">
    <button onclick="iniciar()">COMEÇAR AVALIAÇÃO</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let nomeDoJovem = "";
    let fase = "SAP"; let indice = 0;
    let resSAP = []; let resDISC = {E:0, C:0, P:0, A:0};

    const perguntasSAP = [
        { t: "1-PROTAGONISMO", q: "Como você avalia sua autonomia?" },
        { t: "2-RESPONSABILIDADE", q: "Como você avalia seu compromisso?" },
        { t: "3-AMBIENTAL", q: "Como você avalia seu cuidado ambiental?" },
        { t: "4-CONVIVÊNCIA", q: "Como você avalia sua ética?" },
        { t: "5-SAÚDE", q: "Como você avalia seu bem-estar?" },
        { t: "6-EQUIPE", q: "Como você avalia seu trabalho em grupo?" },
        { t: "7-APRENDER", q: "Como você avalia seu desejo de aprender?" }
    ];

    const perguntasDISC = [
        { q: "Em um desafio, prefiro:", o: [{t:"Comandar",v:"E"},{t:"Animar",v:"C"},{t:"Apoiar",v:"P"},{t:"Analisar",v:"A"}] },
        { q: "Sou mais:", o: [{t:"Decidido",v:"E"},{t:"Influente",v:"C"},{t:"Estável",v:"P"},{t:"Cauteloso",v:"A"}] }
    ];

    function iniciar() {
        nomeDoJovem = document.getElementById('nomeAluno').value;
        if(nomeDoJovem.length < 3) { alert("Digite seu nome!"); return; }
        mostrar();
    }

    function mostrar() {
        let html = `<div class="barra-bg"><div class="barra-fill" style="width:${(indice/7)*100}%"></div></div>`;
        if(fase === "SAP") {
            const p = perguntasSAP[indice];
            html += `<h2>${p.t}</h2><p>${p.q}</p><div class="opcoes">`;
            for(let i=1; i<=5; i++) html += `<button onclick="votarSAP(${i})">${i}</button>`;
        } else {
            const d = perguntasDISC[indice];
            html += `<h2>Perfil DISC</h2><p>${d.q}</p><div class="opcoes">`;
            d.o.forEach(o => html += `<button onclick="votarDISC('${o.v}')">${o.t}</button>`);
        }
        document.getElementById('box').innerHTML = html + "</div>";
    }

    function votarSAP(v) { resSAP.push(v); indice++; if(indice>=7){ fase="DISC"; indice=0; } mostrar(); }
    function votarDISC(v) { resDISC[v]++; indice++; if(indice>=2) finalizar(); else mostrar(); }

    async function finalizar() {
        document.getElementById('box').innerHTML = "<h2>Enviando...</h2>";
        await db.ref('resultados_testes').push({ aluno: nomeDoJovem, data: new Date().toLocaleString(), sap: resSAP, disc: resDISC });
        document.getElementById('box').innerHTML = "<h2>Sucesso!</h2><p>Jorge recebeu seu relatório.</p>";
    }
</script>
</body>
</html>
