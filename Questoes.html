<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Pescar - SAP & DISC</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #181c24; padding: 30px; border-radius: 15px; border: 1px solid #252a35; max-width: 650px; width: 100%; }
        .header-box { border-bottom: 3px solid #ff5c3a; margin-bottom: 20px; padding-bottom: 10px; text-align: center; }
        .desc-texto { background: #0a0c10; padding: 15px; border-radius: 8px; font-size: 14px; color: #abb2bf; margin: 15px 0; border-left: 4px solid #ff5c3a; }
        .btn-acao { padding: 15px; border-radius: 8px; border: 1px solid #353b48; background: #252a35; color: white; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-acao:hover { background: #ff5c3a; }
        .grid-notas { display: flex; justify-content: space-between; gap: 5px; }
        .btn-nota { flex: 1; padding: 20px; background: #252a35; color: white; border: 1px solid #353b48; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-nota:hover { background: #ff5c3a; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 8px; border: none; background: #0a0c10; color: white; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container" id="quiz-box">
    <div class="header-box"><h2>Identificação</h2><p>Projeto Pescar</p></div>
    <input type="text" id="nomeJovem" placeholder="Seu nome completo">
    <button class="btn-acao" onclick="iniciar()">COMEÇAR AVALIAÇÃO</button>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let nomeGlobal = ""; let fase = "SAP"; let index = 0; let dadosSAP = []; let dadosDISC = { E:0, C:0, P:0, A:0 };
    const sapLista = [
        { t: "1-PROTAGONISMO", d: "Conscientiza-se de sua identidade, autônomo e construtor do seu destino." },
        { t: "2-RESPONSABILIDADE", d: "Compromisso, pontualidade e cumprimento de normas." },
        { t: "3-AMBIENTAL", d: "Cuidado com o meio ambiente e uso consciente de recursos." },
        { t: "4-CONVIVÊNCIA", d: "Agir com ética, respeitando as diferenças." },
        { t: "5-SAÚDE", d: "Cuidado físico e emocional, hábitos saudáveis." },
        { t: "6-EQUIPE", d: "Capacidade de colaborar, colocando o grupo acima do pessoal." },
        { t: "7-APRENDER", d: "Habilidade para buscar e construir novos conhecimentos." }
    ];
    const discLista = [
        { q: "Qual sua atitude em um desafio?", o: [{t:"Decidir rápido",v:"E"},{t:"Conversar e animar",v:"C"},{t:"Apoiar com calma",v:"P"},{t:"Analisar detalhes",v:"A"}] },
        { q: "Qual seu ponto forte?", o: [{t:"Determinação",v:"E"},{t:"Entusiasmo",v:"C"},{t:"Paciência",v:"P"},{t:"Organização",v:"A"}] },
        { q: "Como prefere trabalhar?", o: [{t:"Com autonomia",v:"E"},{t:"Com pessoas",v:"C"},{t:"Com segurança",v:"P"},{t:"Com regras",v:"A"}] },
        { q: "O que mais te motiva?", o: [{t:"Vencer",v:"E"},{t:"Reconhecimento",v:"C"},{t:"Paz",v:"P"},{t:"Perfeição",v:"A"}] }
    ];
    function iniciar() { nomeGlobal = document.getElementById('nomeJovem').value; if(nomeGlobal.length < 3) return alert("Nome!"); render(); }
    function render() {
        let html = "";
        if(fase === "SAP") {
            const p = sapLista[index];
            html = `<div class="header-box"><h2>${p.t}</h2></div><div class="desc-texto">${p.d}</div><div class="grid-notas">`;
            for(let i=1; i<=5; i++) html += `<button class="btn-nota" onclick="votoS(${i})">${i}</button>`;
        } else {
            const d = discLista[index];
            html = `<div class="header-box"><h2>DISC - Perfil</h2></div><p>${d.q}</p>`;
            d.o.forEach(o => html += `<button class="btn-acao" onclick="votoD('${o.v}')">${o.t}</button>`);
        }
        document.getElementById('quiz-box').innerHTML = html + "</div>";
    }
    function votoS(v) { dadosSAP.push(v); index++; if(index>=7){ fase="DISC"; index=0; } render(); }
    function votoD(v) { dadosDISC[v]++; index++; if(index>=4) enviar(); else render(); }
    async function enviar() {
        document.getElementById('quiz-box').innerHTML = "<h2>Enviando...</h2>";
        await db.ref('resultados_testes').push({ aluno: nomeGlobal, data: new Date().toLocaleString(), sap: dadosSAP, disc: dadosDISC });
        document.getElementById('quiz-box').innerHTML = "<h2>Sucesso!</h2>";
    }
</script>
</body>
</html>
