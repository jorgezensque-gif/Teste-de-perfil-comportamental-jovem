<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Completa - Instrutor Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #181c24; padding: 30px; border-radius: 15px; border: 1px solid #252a35; max-width: 700px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff5c3a; text-align: center; border-bottom: 2px solid #ff5c3a; padding-bottom: 10px; }
        .descricao-sap { background: #0a0c10; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; line-height: 1.4; color: #abb2bf; }
        .opcoes button { width: 100%; padding: 12px; margin: 5px 0; background: #252a35; color: white; border: 1px solid #353b48; border-radius: 8px; cursor: pointer; text-align: left; }
        .opcoes button:hover { background: #ff5c3a; border-color: #ff5c3a; }
        .barra-bg { width: 100%; height: 10px; background: #0a0c10; border-radius: 5px; margin-bottom: 20px; }
        .barra-fill { height: 100%; background: #ff5c3a; width: 0%; transition: 0.4s; }
        .tipo-teste { text-align: center; color: #ff8e75; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <div id="status" class="tipo-teste">ETAPA 1: AUTOAVALIAÇÃO SAP</div>
    <div class="barra-bg"><div class="barra-fill" id="barra"></div></div>
    <div id="quiz"><h2>Carregando...</h2></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const perguntasSAP = [
        { t: "1-SER PROTAGONISTA", d: "Conscientiza-se de sua identidade, atua com autonomia e constrói seu destino.", q: "Em uma escala de 1 a 5, como você se avalia em protagonismo?" },
        { t: "2-SER RESPONSÁVEL E COMPROMETIDO", d: "Pontualidade, cumprimento de prazos e respeito às normas.", q: "Como você avalia seu compromisso com as regras?" },
        { t: "3-TER CONSCIÊNCIA AMBIENTAL", d: "Cuidado com o meio ambiente e uso consciente de recursos.", q: "Como você avalia sua postura ambiental?" },
        { t: "4-VIVER VALORES DE CONVIVÊNCIA", d: "Ética, respeito às diferenças e postura cidadã.", q: "Como você avalia sua ética e convivência?" },
        { t: "5-CUIDAR DA SAÚDE E DO BEM-ESTAR", d: "Cuidado físico, emocional e hábitos saudáveis.", q: "Como você avalia o cuidado com sua saúde?" },
        { t: "6-TRABALHAR E PRODUZIR EM EQUIPE", d: "Colaboração e colocar o interesse do grupo acima do pessoal.", q: "Como você avalia sua produção em grupo?" },
        { t: "7-APRENDER A APRENDER", d: "Habilidade de buscar novos conhecimentos constantemente.", q: "Como você avalia seu desejo de aprender?" }
    ];

    const perguntasDISC = [
        { q: "Em uma tarefa difícil, eu prefiro:", o: [{t:"Resolver rápido e assumir o comando", v:"E"}, {t:"Conversar com todos e motivar", v:"C"}, {t:"Seguir um plano com calma", v:"P"}, {t:"Analisar os dados com perfeição", v:"A"}] },
        { q: "Meu maior medo é:", o: [{t:"Falhar e perder o controle", v:"E"}, {t:"Ser rejeitado pelo grupo", v:"C"}, {t:"Mudanças bruscas e caos", v:"P"}, {t:"Cometer erros técnicos", v:"A"}] }
    ];

    let etapa = "SAP"; let indice = 0; 
    let resSAP = []; let resDISC = { E: 0, C: 0, P: 0, A: 0 };

    function mostrar() {
        let html = "";
        if (etapa === "SAP") {
            const p = perguntasSAP[indice];
            document.getElementById('status').innerText = "ETAPA 1: AUTOAVALIAÇÃO SAP (Competência " + (indice+1) + "/7)";
            html = `<h2>${p.t}</h2><div class="descricao-sap">${p.d}</div><p>${p.q}</p><div class="opcoes">`;
            for(let n=1; n<=5; n++) { html += `<button onclick="votarSAP(${n})">${n} - ${n===1?'Preciso Melhorar':n===5?'Excelente':''}</button>`; }
        } else {
            const p = perguntasDISC[indice];
            document.getElementById('status').innerText = "ETAPA 2: PERFIL COMPORTAMENTAL (Questão " + (indice+1) + "/2)";
            html = `<h2>Mapeamento de Perfil</h2><p>${p.q}</p><div class="opcoes">`;
            p.o.forEach(opt => { html += `<button onclick="votarDISC('${opt.v}')">${opt.t}</button>`; });
        }
        document.getElementById('quiz').innerHTML = html + "</div>";
        atualizarBarra();
    }

    function votarSAP(n) {
        resSAP.push(n); indice++;
        if (indice >= perguntasSAP.length) { etapa = "DISC"; indice = 0; }
        mostrar();
    }

    function votarDISC(v) {
        resDISC[v]++; indice++;
        if (indice >= perguntasDISC.length) { finalizar(); } else { mostrar(); }
    }

    function atualizarBarra() {
        let total = perguntasSAP.length + perguntasDISC.length;
        let prog = etapa === "SAP" ? indice : perguntasSAP.length + indice;
        document.getElementById('barra').style.width = (prog / total * 100) + "%";
    }

    async function finalizar() {
        document.getElementById('quiz').innerHTML = "<h2>Enviando resultados...</h2>";
        const nome = localStorage.getItem('nomeAluno') || "Jovem";
        await db.ref('resultados_testes').push({ aluno: nome, data: new Date().toLocaleString(), sap: resSAP, disc: resDISC });
        document.getElementById('quiz').innerHTML = "<h2>Concluído!</h2><p>Jorge recebeu sua avaliação.</p>";
    }
    mostrar();
</script>
</body>
</html>
