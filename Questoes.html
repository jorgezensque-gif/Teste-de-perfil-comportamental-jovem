<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DISC & SAP Jovem</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: #181c24; padding: 30px; border-radius: 15px; border: 1px solid #252a35; max-width: 500px; width: 100%; text-align: center; }
        h2 { color: #ff5c3a; margin-bottom: 20px; }
        .opcoes button { width: 100%; padding: 15px; margin: 10px 0; background: #252a35; color: white; border: 1px solid #353b48; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; font-size: 16px; }
        .opcoes button:hover { background: #ff5c3a; border-color: #ff5c3a; }
        .barra-bg { width: 100%; height: 8px; background: #0a0c10; border-radius: 4px; margin-bottom: 20px; }
        .barra-fill { height: 100%; background: #ff5c3a; width: 0%; transition: 0.4s; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="barra-bg"><div class="barra-fill" id="barra"></div></div>
    <div id="conteudo-quiz">
        <h2>Carregando Questões...</h2>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com",
        projectId: "perfil-jovem--disc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const perguntas = [
        { q: "No dia a dia, o que mais te define?", 
          o: [{t:"DETERMINAÇÃO: Foco em resultados e rapidez.", v:"E"}, {t:"ENTUSIASMO: Gosto de falar e motivar.", v:"C"}, {t:"PACIÊNCIA: Gosto de rotina e calma.", v:"P"}, {t:"EXATIDÃO: Gosto de detalhes e perfeição.", v:"A"}] },
        { q: "Como você age em grupo (SAP 6.0)?", 
          o: [{t:"Tomo a frente e decido logo.", v:"E"}, {t:"Animo a galera e comunico as ideias.", v:"C"}, {t:"Ajudo a todos e busco harmonia.", v:"P"}, {t:"Analiso os riscos e sigo o plano.", v:"A"}] },
        { q: "Sobre Protagonismo (SAP 1.0):", 
          o: [{t:"Eu faço acontecer e lidero.", v:"E"}, {t:"Eu influencio as pessoas ao redor.", v:"C"}, {t:"Eu planejo meu futuro com calma.", v:"P"}, {t:"Eu estudo e analiso minhas escolhas.", v:"A"}] },
        { q: "Como lida com regras (SAP 2.0)?", 
          o: [{t:"Sigo se for para ganhar tempo.", v:"E"}, {t:"Sigo para não chatear o grupo.", v:"C"}, {t:"Sigo porque me sinto seguro.", v:"P"}, {t:"Sigo porque é o correto e organizado.", v:"A"}] }
    ];

    let indice = 0;
    let pontos = { E: 0, C: 0, P: 0, A: 0 };

    function mostrarQuestao() {
        if (indice >= perguntas.length) {
            salvarEResultar();
            return;
        }
        const p = perguntas[indice];
        let html = `<h2>Questão ${indice + 1}</h2><p style="margin-bottom:20px">${p.q}</p><div class="opcoes">`;
        p.o.forEach(opt => {
            html += `<button onclick="votar('${opt.v}')">${opt.t}</button>`;
        });
        html += `</div>`;
        document.getElementById('conteudo-quiz').innerHTML = html;
        document.getElementById('barra').style.width = ((indice / perguntas.length) * 100) + "%";
    }

    function votar(v) {
        pontos[v]++;
        indice++;
        mostrarQuestao();
    }

    async function salvarEResultar() {
        document.getElementById('conteudo-quiz').innerHTML = "<h2>Salvando seu Perfil...</h2>";
        const nomeAlun = localStorage.getItem('nomeAluno') || "Jovem";
        try {
            await db.ref('resultados_testes').push({ aluno: nomeAlun, data: new Date().toLocaleString(), perfil: pontos });
            document.getElementById('conteudo-quiz').innerHTML = `<h2>Pronto, ${nomeAlun}!</h2><p>Seu teste foi enviado com sucesso para o Jorge.</p>`;
        } catch (e) {
            document.getElementById('conteudo-quiz').innerHTML = "<h2>Erro de conexão!</h2>";
        }
    }

    mostrarQuestao();
</script>
</body>
</html>
