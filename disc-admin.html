<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin SAP/DISC - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; padding: 20px; }
        .card-aluno { background: #181c24; border: 1px solid #353b48; padding: 25px; border-radius: 15px; margin-bottom: 40px; }
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .info-header { border-bottom: 2px solid #ff5c3a; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        canvas { background: rgba(255,255,255,0.02); border-radius: 10px; padding: 15px; }
        .legenda-detalhada { font-size: 12px; color: #abb2bf; margin-top: 15px; line-height: 1.4; }
        @media (max-width: 900px) { .grid-graficos { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>📊 Gestão de Competências SAP - Projeto Pescar</h1>
    <div id="lista-resultados">Carregando relatórios...</div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Descrições baseadas no formulário oficial
        const descricoesSAP = [
            "1-Protagonismo: Consciência de identidade e autonomia.",
            "2-Responsabilidade: Pontualidade e cumprimento de regras.",
            "3-Ambiental: Zelo com recursos naturais e materiais.",
            "4-Convivência: Ética, respeito e postura cidadã.",
            "5-Saúde: Cuidado físico e emocional.",
            "6-Equipe: Colaboração e interesses do grupo.",
            "7-Aprender: Busca por novos conhecimentos."
        ];

        db.ref('resultados_testes').on('value', snap => {
            const container = document.getElementById('lista-resultados');
            container.innerHTML = "";
            snap.forEach(alunoSnap => {
                const d = alunoSnap.val();
                const id = alunoSnap.key;
                
                container.innerHTML += `
                    <div class="card-aluno">
                        <div class="info-header">
                            <strong>NOME: ${d.aluno}</strong>
                            <span>📅 ${d.data}</span>
                        </div>
                        <div class="grid-graficos">
                            <div class="box-chart">
                                <h3 style="text-align:center">Perfil Comportamental (DISC)</h3>
                                <canvas id="disc-${id}"></canvas>
                            </div>
                            <div class="box-chart">
                                <h3 style="text-align:center">Radar de Competências SAP</h3>
                                <canvas id="sap-${id}"></canvas>
                                <div class="legenda-detalhada">
                                    <strong>Resumo das Competências:</strong><br>
                                    ${descricoesSAP.join('<br>')}
                                </div>
                            </div>
                        </div>
                    </div>`;
                
                setTimeout(() => desenhar(id, d), 100);
            });
        });

        function desenhar(id, d) {
            // Gráfico DISC
            new Chart(document.getElementById('disc-'+id), {
                type: 'bar',
                data: {
                    labels: ['Executor', 'Comunicador', 'Planejador', 'Analista'],
                    datasets: [{ label: '% Perfil', data: [d.disc.E, d.disc.C, d.disc.P, d.disc.A], backgroundColor: '#ff5c3a' }]
                },
                options: { scales: { y: { beginAtZero: true, max: 10, grid: {color:'#333'} } } }
            });

            // Gráfico Radar SAP com as informações detalhadas
            new Chart(document.getElementById('sap-'+id), {
                type: 'radar',
                data: {
                    labels: ['Protagonismo', 'Responsab.', 'Ambiental', 'Convivência', 'Saúde', 'Equipe', 'Aprender'],
                    datasets: [{
                        label: 'Autoavaliação SAP',
                        data: d.sap,
                        borderColor: '#06d6a0',
                        backgroundColor: 'rgba(6, 214, 160, 0.2)',
                        pointRadius: 5
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0, max: 5,
                            ticks: { stepSize: 1, color: '#fff', backdropColor: 'transparent' },
                            grid: { color: '#444' },
                            angleLines: { color: '#444' },
                            pointLabels: { color: '#fff', font: { size: 12 } }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return "Nota: " + context.raw + " - " + descricoesSAP[context.dataIndex];
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
