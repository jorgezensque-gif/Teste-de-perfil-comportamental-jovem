<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel DISC — Administrador Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { background: #0a0c10; color: #e8ecf2; font-family: sans-serif; padding: 50px; text-align: center; }
        .admin-card { background: #181c24; padding: 40px; border-radius: 20px; border: 1px solid #252a35; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff5c3a; margin-bottom: 25px; }
        input { width: 80%; padding: 12px; margin-bottom: 20px; background: #0a0c10; border: 1px solid #252a35; color: white; border-radius: 8px; font-size: 16px; }
        .btn-gerar { width: 85%; padding: 15px; background: #ff5c3a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn-gerar:hover { background: #e04b2f; transform: scale(1.02); }
        .lista { margin-top: 30px; text-align: left; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        .chave-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #252a35; font-family: monospace; }
        .disponivel { color: #06d6a0; }
        .usada { color: #6b7585; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Gerador de Chaves DISC</h2>
        <input type="text" id="prefixo" placeholder="Prefixo (Ex: TURMA-A)">
        <button class="btn-gerar" onclick="gerarNovaChave()">GERAR CHAVE NA NUVEM</button>

        <div class="lista" id="lista-chaves">
            <p style="text-align:center; color:#6b7585;">Carregando chaves do Firebase...</p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU PROJETO NO FIREBASE
        const firebaseConfig = {
            databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com",
            projectId: "perfil-jovem--disc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FUNÇÃO PARA GERAR CHAVE
        async function gerarNovaChave() {
            const prefixo = document.getElementById('prefixo').value.toUpperCase() || "DISC";
            const codigoAleatorio = Math.random().toString(36).substr(2, 5).toUpperCase();
            const chaveFinal = prefixo + "-" + codigoAleatorio;

            try {
                // Pega a lista atual do Firebase
                const snapshot = await db.ref('lista_chaves').once('value');
                let chaves = snapshot.val() || [];

                // Adiciona a nova chave à lista
                chaves.push({
                    code: chaveFinal,
                    used: false,
                    user: ""
                });

                // Salva a lista atualizada de volta no Firebase
                await db.ref('lista_chaves').set(chaves);
                
                alert("Sucesso! Chave " + chaveFinal + " gerada!");
                document.getElementById('prefixo').value = ""; // Limpa o campo
                atualizarLista();
            } catch (error) {
                console.error(error);
                alert("Erro ao salvar! Verifique se as Regras do Firebase estão em 'true'.");
            }
        }

        // FUNÇÃO PARA MOSTRAR AS CHAVES NO ECRÃ
        async function atualizarLista() {
            const snapshot = await db.ref('lista_chaves').once('value');
            const chaves = snapshot.val() || [];
            const container = document.getElementById('lista-chaves');
            
            if (chaves.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Nenhuma chave gerada ainda.</p>";
                return;
            }

            container.innerHTML = "<h4>Chaves Geradas:</h4>";
            // Mostra as chaves mais recentes no topo
            chaves.reverse().forEach(c => {
                const status = c.used ? `<span class="usada">Usada por: ${c.user}</span>` : `<span class="disponivel">Disponível</span>`;
                container.innerHTML += `
                    <div class="chave-item">
                        <strong>${c.code}</strong>
                        ${status}
                    </div>
                `;
            });
        }

        // Carrega a lista assim que abrir a página
        atualizarLista();
    </script>
</body>
</html>
