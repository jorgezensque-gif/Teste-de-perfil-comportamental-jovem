<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Educador Jorge - SAP & DISC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-geral: #ffffff;
            --texto: #2d3436;
            --primaria: #ff5c3a;
            --cinza-claro: #f8f9fa;
            --borda: #ececec;
        }

        body { background: var(--bg-geral); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Estilo do Login */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box { 
            padding: 40px; border-radius: 15px; border: 1px solid var(--borda); 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 300px;
        }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--borda); border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--primaria); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Estilo do Painel */
        #painel-conteudo { display: none; }
        .menu { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; position: sticky; top: 0; background: white; padding: 15px; border-bottom: 1px solid var(--cinza-claro); z-index: 100; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; font-size: 12px; }
        .btn-print { background: #0984e3; }
        .btn-del { background: #ff7675; }
        
        .sessao { background: #fff; padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--borda); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card-aluno { background: #fff; padding: 25px; border-radius: 12px; margin-top: 25px; border: 1px solid var(--borda); page-break-inside: avoid; }
        .pdi-box { background: var(--cinza-claro); padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--primaria); font-size: 14px; }
        
        .tag { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; }
        @media print { .menu, #login-screen { display: none; } .card-aluno { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--primaria)">Acesso Restrito</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-login" onclick="verificarLogin()">Entrar no Painel</button>
            <p id="erro-msg" style="color: red; font-size: 12px; display: none; margin-top: 10px;">Acesso negado!</p>
        </div>
    </div>

    <div id="painel-conteudo">
        <div class="menu">
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir PDIs</button>
            <button class="btn btn-del" onclick="limparBanco()">🗑️ Zerar Turma</button>
        </div>

        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size: 22px; color: #2d3436;">DASHBOARD DE AVALIAÇÃO SOCIOEMOCIONAL</h1>
            <p style="color:#636e72;">Educador Socioemocional/Social: <strong>Jorge</strong></p>
        </div>

        <div id="area-turma" class="sessao" style="display:none;">
            <h2 style="color:var(--primaria); font-size: 18px;">📈 Diagnóstico Geral da Turma</h2>
            <div class="grid">
                <div><canvas id="canvas-turma-sap"></canvas></div>
                <div><canvas id="canvas-turma-disc"></canvas></div>
            </div>
            <div id="feedback-turma" class="pdi-box" style="margin-top:20px;"></div>
        </div>

        <h2 style="text-align:center; margin-top:50px; color: #636e72;">👤 Acompanhamento Individual</h2>
        <div id="lista-alunos">Buscando dados...</div>
    </div>

<script>

    function verificarLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'pitukinha') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'block';
            iniciarFirebase();
        } else {
            document.getElementById('erro-msg').style.display = 'block';
        }
    }
