<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Educador</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --grafite: #2d3436; --card: #353b48; --primaria: #ff5c3a; --texto: #ffffff; }
        body { background: var(--grafite); color: var(--texto); font-family: sans-serif; margin: 0; padding: 20px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--grafite); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; text-align: center; width: 300px; border: 1px solid #4b4b4b; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        
        #painel-conteudo { display: none; }
        .menu { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-aluno { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #4b4b4b; }
        .pdi-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border-left: 5px solid var(--primaria); font-size: 14px; }
        
        canvas { max-width: 100% !important; height: auto !important; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--primaria)">Acesso Jorge</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn" style="background:var(--primaria); width:100%" onclick="verificarLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="painel-conteudo">
        <div class="menu">
            <button class="btn" style="background:#0984e3" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button class="btn" style="background:#eb4d4b" onclick="limpar()">🗑️ ZERAR</button>
        </div>

        <h1 style="text-align:center; font-size: 20px;">DASHBOARD EDUCADOR SOCIOEMOCIONAL</h1>
        <p style="text-align:center; color: #bdc3c7;">Responsável: <strong>Jorge</strong></p>

        <div id="area-turma" class="sessao">
            <h2 style="color:var(--primaria); font-size: 16px;">📈 MÉDIAS DA TURMA (SAP & DISC)</h2>
            <div class="grid">
                <div style="min-height: 250px;"><canvas id="chart-sap-turma"></canvas></div>
                <div style="min-height: 250px;"><canvas id="chart-disc-turma"></canvas></div>
            </div>
        </div>

        <div id="lista-alunos">Buscando dados...</div>
    </div>

<script>
    function verificarLogin() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'pitukinha') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'block';
            iniciarApp();
        }
    }

    function iniciarApp() {
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const perfis = {
            E: { n: "Dominante (D)", c: "#e17055", pdi: "Trabalhar escuta e paciência." },
            C: { n: "Influente (I)", c: "#fdcb6e", pdi: "Focar em organização e prazos." },
            P: { n: "Estável (S)", c: "#55efc4", pdi: "Enfrentar mudanças com firmeza." },
            A: { n: "Analítico (C)", c: "#74b9ff", pdi: "Evitar que o perfeccionismo trave entregas." }
        };

        db.ref('resultados_testes').on('value', snap => {
            const lista = document.getElementById('lista-alunos');
            lista.innerHTML = "";
            if (!snap.exists()) return;

            let somaTotalSAP = [0,0,0,0,0,0,0];
            let somaTotalDISC = { E:0, C:0, P:0, A:0 };
            let totalAlunos = 0;

            snap.forEach(alunoSnap => {
                const d = alunoSnap.val();
                const id = alunoSnap.key;
                totalAlunos++;

                d.sap.forEach((v, i) => somaTotalSAP[i] += v);
                somaTotalDISC.E += d.disc.E; somaTotalDISC.C += d.disc.C; 
                somaTotalDISC.P += d.disc.P; somaTotalDISC.A += d.disc.A;

                let principal = Object.keys(d.disc).reduce((a, b) => d.disc[a] > d.disc[b] ? a : b);

                lista.innerHTML += `
                    <div class="card-aluno">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                            <strong>JOVEM: ${d.aluno}</strong>
                            <span style="background:${perfis[principal].c}; padding:5px 10px; border-radius:15px; color:#2d3436; font-size:11px; font-weight:bold;">${perfis[principal].n}</span>
                        </div>
                        <div class="grid">
                            <div style="max-height:200px;"><canvas id="radar-${id}"></canvas></div>
                            <div class="pdi-box">
                                <strong>🎯 PDI Individual:</strong><br>${perfis[principal].pdi}<br><br>
                                <strong>📊 Média SAP:</strong> ${(d.sap.reduce((a,b)=>a+b)/7).toFixed(1)}
                            </div>
                        </div>
                    </div>`;
                
                setTimeout(() => {
                    new Chart(document.getElementById('radar-'+id), {
                        type: 'radar',
                        data: {
                            labels: ['P1','P2','P3','P4','P5','P6','P7'],
                            datasets: [{ data: d.sap, borderColor: '#ff5c3a', backgroundColor: 'rgba(255,92,58,0.2)' }]
                        },
                        options: { 
                            scales: { r: { min:0, max:5, grid:{color:'#4b4b4b'}, angleLines:{color:'#4b4b4b'}, pointLabels:{color:'#fff'} } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }, 500);
            });

            // GRÁFICOS DA TURMA (DISC e SAP)
            setTimeout(() => {
                const mediasSAP = somaTotalSAP.map(v => v/totalAlunos);
                
                // Barras SAP
                new Chart(document.getElementById('chart-sap-turma'), {
                    type: 'bar',
                    data: { labels:['P1','P2','P3','P4','P5','P6','P7'], datasets:[{label:'Média', data:mediasSAP, backgroundColor:'#ff7675'}]},
                    options: { scales:{ y:{min:0, max:5, ticks:{color:'#fff'}}, x:{ticks:{color:'#fff'}} }, plugins:{legend:{display:false}}}
                });

                // Pizza DISC (O que estava faltando!)
                new Chart(document.getElementById('chart-disc-turma'), {
                    type: 'pie',
                    data: {
                        labels: ['Dom','Inf','Est','Ana'],
                        datasets: [{ data: [somaTotalDISC.E, somaTotalDISC.C, somaTotalDISC.P, somaTotalDISC.A], backgroundColor: ['#e17055','#fdcb6e','#55efc4','#74b9ff'] }]
                    },
                    options: { plugins: { legend: { position: 'bottom', labels: {color: '#fff'} } } }
                });
            }, 1000);
        });
    }

    function limpar() { if(confirm("Apagar tudo?")) firebase.database().ref('resultados_testes').remove(); }
</script>
</body>
</html>
