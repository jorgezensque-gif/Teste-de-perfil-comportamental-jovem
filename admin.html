<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; padding: 20px; }
        .controles { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-excel { background: #27ae60; }
        .btn-limpar { background: #e74c3c; }
        .card-aluno { background: #181c24; border: 1px solid #353b48; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="controles">
        <button class="btn btn-excel" onclick="exportar()">📗 EXPORTAR EXCEL</button>
        <button class="btn btn-limpar" onclick="limpar()">🗑️ LIMPAR TUDO</button>
    </div>
    <div id="lista"></div>
<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dadosExcel = [];
    db.ref('resultados_testes').on('value', snap => {
        const container = document.getElementById('lista'); container.innerHTML = ""; dadosExcel = [];
        snap.forEach(alunoSnap => {
            const d = alunoSnap.val(); const id = alunoSnap.key;
            dadosExcel.push({ Aluno: d.aluno, Data: d.data, Exec: d.disc.E, Comu: d.disc.C, Plan: d.disc.P, Anal: d.disc.A });
            container.innerHTML += `<div class="card-aluno"><h3>${d.aluno}</h3><div class="grid">
                <div class="box"><canvas id="radar-${id}"></canvas></div>
                <div class="box"><canvas id="barra-${id}"></canvas></div>
            </div></div>`;
            setTimeout(() => {
                new Chart(document.getElementById('radar-'+id), { type: 'radar', data: { labels: ['P1','P2','P3','P4','P5','P6','P7'], datasets: [{ label:'SAP', data: d.sap, borderColor: '#06d6a0' }] } });
                new Chart(document.getElementById('barra-'+id), { type: 'bar', data: { labels: ['E','C','P','A'], datasets: [{ label:'DISC', data: [d.disc.E, d.disc.C, d.disc.P, d.disc.A], backgroundColor: '#ff5c3a' }] } });
            }, 100);
        });
    });
    function exportar() {
        const ws = XLSX.utils.json_to_sheet(dadosExcel); const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Resultados"); XLSX.writeFile(wb, "Relatorio_Jorge.xlsx");
    }
    function limpar() { if(confirm("Limpar tudo?")) db.ref('resultados_testes').remove(); }
</script>
</body>
</html>
