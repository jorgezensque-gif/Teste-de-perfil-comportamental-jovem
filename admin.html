<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Relatório de Assessment Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --grafite: #2d3436; --card: #353b48; --primaria: #ff5c3a; --texto: #ffffff; --destaque: #00d2d3; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--grafite); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; text-align: center; width: 300px; border: 1px solid #4b4b4b; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #1e272e; color: white; }
        
        #painel-conteudo { display: none; max-width: 1200px; margin: 0 auto; }
        .menu { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; position: sticky; top: 0; background: var(--grafite); padding: 15px; z-index: 1000; border-bottom: 1px solid #4b4b4b; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; text-transform: uppercase; }
        
        .card-aluno { background: var(--card); padding: 30px; border-radius: 15px; margin-top: 30px; border: 1px solid #4b4b4b; page-break-after: always; }
        .header-aluno { display: flex; justify-content: space-between; border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-bottom: 20px; }
        
        .grid-relatorio { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .detalhes-perfil { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; font-size: 14px; line-height: 1.6; }
        .detalhes-perfil h3 { color: var(--destaque); margin-top: 0; border-bottom: 1px solid #4b4b4b; padding-bottom: 5px; }
        
        .tag-perfil { padding: 5px 15px; border-radius: 20px; color: #000; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        
        @media print { .menu, #login-screen { display: none; } body { background: white; color: black; } .card-aluno { border: 1px solid #ccc; } .detalhes-perfil { background: #f9f9f9; color: #333; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--primaria)">Sistema Jorge</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn" style="background:var(--primaria); width:100%" onclick="verificarLogin()">ACESSAR ASSESSMENT</button>
    </div>
</div>

<div id="painel-conteudo">
    <div class="menu">
        <button class="btn" style="background:#0984e3" onclick="window.print()">🖨️ IMPRIMIR LAUDOS COMPLETOS</button>
        <button class="btn" style="background:#eb4d4b" onclick="limpar()">🗑️ ZERAR BASE</button>
    </div>

    <div id="lista-alunos">Carregando diagnósticos detalhados...</div>
</div>

<script>
    let activeCharts = {};

    // DADOS TÉCNICOS DOS PERFIS (Baseado nas suas imagens)
    const infoPerfis = {
        E: { 
            n: "Dominância (D)", c: "#e17055",
            caract: "Direto, decisivo, focado em resultados e aceita desafios.",
            motivacao: "Poder, autoridade e prestígio. Liberdade para agir.",
            medo: "Falha, perda de controle e parecer vulnerável.",
            comunicao: "Seja breve, objetivo e foque no 'o quê'. Evite detalhes excessivos."
        },
        C: { 
            n: "Influência (I)", c: "#fdcb6e",
            caract: "Entusiasta, otimista, persuasivo e comunicativo.",
            motivacao: "Reconhecimento social, aprovação e popularidade.",
            medo: "Rejeição social, isolamento e rotina rígida.",
            comunicao: "Seja amigável, entusiasta e dê espaço para ele falar. Foque no 'quem'."
        },
        P: { 
            n: "Estabilidade (S)", c: "#55efc4",
            caract: "Leal, bom ouvinte, paciente e trabalha bem em equipe.",
            motivacao: "Segurança, estabilidade e ambientes harmoniosos.",
            medo: "Mudanças bruscas, conflitos e perda de segurança.",
            comunicao: "Seja gentil, calmo e dê tempo para ele processar. Foque no 'como'."
        },
        A: { 
            n: "Conformidade (C)", c: "#74b9ff",
            caract: "Preciso, analítico, perfeccionista e disciplinado.",
            motivacao: "Precisão, qualidade e seguir normas claras.",
            medo: "Críticas ao seu trabalho, erros e desorganização.",
            comunicao: "Seja específico, use dados e fatos. Não pressione por decisões rápidas."
        }
    };

    function verificarLogin() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'pitukinha') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'block';
            iniciarApp();
        }
    }

    function iniciarApp() {
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('resultados_testes').on('value', snap => {
            const lista = document.getElementById('lista-alunos');
            lista.innerHTML = "";
            if (!snap.exists()) return;

            snap.forEach(alunoSnap => {
                const d = alunoSnap.val();
                const id = alunoSnap.key;
                
                // Identificar Perfil Principal
                let principal = Object.keys(d.disc).reduce((a, b) => d.disc[a] > d.disc[b] ? a : b);
                const info = infoPerfis[principal];

                lista.innerHTML += `
                    <div class="card-aluno">
                        <div class="header-aluno">
                            <div>
                                <span style="font-size: 22px; font-weight: bold;">${d.aluno}</span><br>
                                <span style="color: #bdc3c7; font-size: 12px;">Relatório de Assessment Comportamental</span>
                            </div>
                            <span class="tag-perfil" style="background:${info.c}">${info.n}</span>
                        </div>

                        <div class="grid-relatorio">
                            <div>
                                <canvas id="radar-${id}"></canvas>
                                <div class="detalhes-perfil" style="margin-top:20px; border-left: 4px solid var(--primaria);">
                                    <h3>🎯 PDI Estratégico</h3>
                                    <p>Com base na predominância de <b>${info.n}</b>, o foco deve ser no desenvolvimento de competências complementares e no ajuste do ambiente para máxima performance.</p>
                                </div>
                            </div>

                            <div class="detalhes-perfil">
                                <h3>🔍 Características do Perfil</h3>
                                <p>${info.caract}</p>
                                
                                <h3>💡 Motivações</h3>
                                <p>${info.motivacao}</p>
                                
                                <h3>⚠️ Medos e Tensões</h3>
                                <p>${info.medo}</p>
                                
                                <h3>🗣️ Como se comunicar com este jovem</h3>
                                <p>${info.comunicao}</p>
                            </div>
                        </div>
                    </div>`;
                
                setTimeout(() => {
                    const ctx = document.getElementById('radar-'+id).getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['Dominância', 'Influência', 'Estabilidade', 'Conformidade'],
                            datasets: [{
                                label: 'Perfil Atual',
                                data: [d.disc.E, d.disc.C, d.disc.P, d.disc.A],
                                borderColor: info.c,
                                backgroundColor: info.c + '33',
                                borderWidth: 3
                            }]
                        },
                        options: {
                            scales: { r: { min: -5, max: 15, grid:{color:'#4b4b4b'}, pointLabels:{color:'#fff'} } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }, 100);
            });
        });
    }

    function limpar() { if(confirm("Deseja apagar todos os laudos?")) firebase.database().ref('resultados_testes').remove(); }
</script>
</body>
</html>
