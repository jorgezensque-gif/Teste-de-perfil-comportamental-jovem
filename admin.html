<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Jorge (Pescar)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; padding: 20px; }
        .login-screen { max-width: 400px; margin: 100px auto; text-align: center; background: #181c24; padding: 40px; border-radius: 15px; border: 1px solid #ff5c3a; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #ff5c3a; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card-aluno { background: #181c24; border: 1px solid #252a35; padding: 25px; border-radius: 15px; margin-bottom: 40px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
        h1, h2 { color: #ff5c3a; text-align: center; }
        .info-aluno { border-bottom: 1px solid #353b48; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="login-area" class="login-screen">
        <h2>Área do Instrutor</h2>
        <p>Insira a chave de acesso</p>
        <input type="password" id="key" placeholder="Senha Admin">
        <button onclick="acessar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="dashboard" style="display:none;">
        <h1>📊 Relatórios de Desenvolvimento Turma Pescar</h1>
        <div id="container-resultados"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function acessar() {
            if(document.getElementById('key').value === "PITUKINHA") {
                document.getElementById('login-area').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                carregarRelatorios();
            } else { alert("Senha Inválida!"); }
        }

        function carregarRelatorios() {
            db.ref('resultados_testes').on('value', snap => {
                const lista = document.getElementById('container-resultados');
                lista.innerHTML = "";
                snap.forEach(alunoSnap => {
                    const data = alunoSnap.val();
                    const id = alunoSnap.key;
                    
                    const card = `
                        <div class="card-aluno">
                            <div class="info-aluno">
                                <strong>ALUNO: ${data.aluno}</strong>
                                <span>📅 ${data.data}</span>
                            </div>
                            <div class="charts-grid">
                                <div><canvas id="disc-${id}"></canvas></div>
                                <div><canvas id="sap-${id}"></canvas></div>
                            </div>
                        </div>`;
                    lista.innerHTML += card;

                    setTimeout(() => desenharGraficos(id, data), 100);
                });
            });
        }

        function desenharGraficos(id, data) {
            // Gráfico de Barras DISC
            new Chart(document.getElementById('disc-'+id), {
                type: 'bar',
                data: {
                    labels: ['Executor', 'Comunicador', 'Planejador', 'Analista'],
                    datasets: [{
                        label: 'Perfil Comportamental (DISC)',
                        data: [data.disc.E, data.disc.C, data.disc.P, data.disc.A],
                        backgroundColor: '#ff5c3a'
                    }]
                },
                options: { plugins: { legend: { display: true, labels: {color: '#fff'} } } }
            });

            // Gráfico de Radar SAP (7 Competências)
            new Chart(document.getElementById('sap-'+id), {
                type: 'radar',
                data: {
                    labels: ['Protagonismo', 'Resp./Comp.', 'Ambiental', 'Valores', 'Saúde', 'Equipe', 'Aprender'],
                    datasets: [{
                        label: 'Desenvolvimento SAP',
                        data: data.sap,
                        borderColor: '#06d6a0',
                        backgroundColor: 'rgba(6, 214, 160, 0.2)',
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: { 
                    scales: { r: { min: 0, max: 5, grid: {color: '#353b48'}, angleLines: {color: '#353b48'}, ticks: {display: false} } },
                    plugins: { legend: { labels: {color: '#fff'} } }
                }
            });
        }
    </script>
</body>
</html>
