<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Jorge - SAP & DISC</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; padding: 20px; }
        .controles { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; position: sticky; top: 0; background: #0a0c10; padding: 15px; z-index: 100; border-bottom: 1px solid #333; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-excel { background: #27ae60; }
        .btn-limpar { background: #e74c3c; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        .card-aluno { background: #181c24; border: 1px solid #353b48; padding: 25px; border-radius: 15px; margin-bottom: 50px; }
        .grid-disc { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-sap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box-chart { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; text-align: center; }
        .info-header { border-bottom: 2px solid #ff5c3a; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        @media (max-width: 900px) { .grid-disc { grid-template-columns: 1fr 1fr; } .grid-sap { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="controles">
        <button class="btn btn-excel" onclick="exportarExcel()">📗 EXPORTAR PARA EXCEL</button>
        <button class="btn btn-limpar" onclick="limparBanco()">🗑️ LIMPAR TODAS AVALIAÇÕES</button>
    </div>

    <h1 style="text-align:center;">📊 Relatórios Turma Pescar</h1>
    <div id="lista-resultados"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let dadosParaExcel = [];

        db.ref('resultados_testes').on('value', snap => {
            const container = document.getElementById('lista-resultados');
            container.innerHTML = "";
            dadosParaExcel = [];
            
            snap.forEach(alunoSnap => {
                const d = alunoSnap.val();
                const id = alunoSnap.key;
                
                // Prepara dados para o Excel
                dadosParaExcel.push({
                    Nome: d.aluno, Data: d.data,
                    SAP_1: d.sap[0], SAP_2: d.sap[1], SAP_3: d.sap[2], SAP_4: d.sap[3], SAP_5: d.sap[4], SAP_6: d.sap[5], SAP_7: d.sap[6],
                    Exec: d.disc.E, Comu: d.disc.C, Plan: d.disc.P, Anal: d.disc.A
                });

                container.innerHTML += `
                    <div class="card-aluno">
                        <div class="info-header"><strong>ALUNO: ${d.aluno}</strong><span>📅 ${d.data}</span></div>
                        <div class="grid-disc">
                            <div class="box-chart"><canvas id="d1-${id}"></canvas><strong>E</strong></div>
                            <div class="box-chart"><canvas id="d2-${id}"></canvas><strong>C</strong></div>
                            <div class="box-chart"><canvas id="d3-${id}"></canvas><strong>P</strong></div>
                            <div class="box-chart"><canvas id="d4-${id}"></canvas><strong>A</strong></div>
                        </div>
                        <div class="grid-sap">
                            <div class="box-chart"><canvas id="radar-${id}"></canvas></div>
                            <div class="box-chart"><canvas id="barra-${id}"></canvas></div>
                        </div>
                    </div>`;
                
                setTimeout(() => desenhar(id, d), 100);
            });
        });

        function desenhar(id, d) {
            const cores = { E: '#ff5c3a', C: '#ffbd2e', P: '#27ae60', A: '#2980b9' };
            // DISC
            [['d1','E'],['d2','C'],['d3','P'],['d4','A']].forEach(p => {
                new Chart(document.getElementById(`${p[0]}-${id}`), {
                    type: 'doughnut', data: { datasets: [{ data:[d.disc[p[1]], 4-d.disc[p[1]]], backgroundColor:[cores[p[1]], '#111'] }] },
                    options: { cutout: '70%' }
                });
            });
            // RADAR SAP
            new Chart(document.getElementById('radar-'+id), {
                type: 'radar',
                data: { labels: ['Protag.','Resp.','Amb.','Conv.','Saúde','Equipe','Apr.'], datasets: [{ label:'SAP', data: d.sap, borderColor:'#06d6a0', backgroundColor:'rgba(6,214,160,0.2)' }] },
                options: { scales: { r: { min:0, max:5, grid:{color:'#444'} } } }
            });
            // BARRA SAP
            new Chart(document.getElementById('barra-'+id), {
                type: 'bar',
                data: { labels: ['P1','P2','P3','P4','P5','P6','P7'], datasets: [{ label:'Notas', data: d.sap, backgroundColor:'#06d6a0' }] },
                options: { scales: { y: { min:0, max:5 } } }
            });
        }

        function exportarExcel() {
            if(dadosParaExcel.length === 0) return alert("Sem dados para exportar!");
            const ws = XLSX.utils.json_to_sheet(dadosParaExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Avaliações");
            XLSX.writeFile(wb, "Relatorio_Pescar_Jorge.xlsx");
        }

        function limparBanco() {
            if(confirm("Jorge, você tem certeza? Isso vai APAGAR todos os alunos para começar uma nova rodada!")) {
                db.ref('resultados_testes').remove();
                alert("Banco de dados limpo!");
            }
        }
    </script>
</body>
</html>
