<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão SAP & DISC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; padding: 20px; }
        .menu { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; position: sticky; top: 0; background: #0a0c10; padding: 10px; z-index: 100; border-bottom: 2px solid #333; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; font-size: 12px; }
        .btn-ex { background: #27ae60; } .btn-del { background: #e74c3c; } .btn-print { background: #3498db; }
        .sessao { background: #181c24; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-aluno { background: #1e2430; padding: 20px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #ff5c3a; page-break-inside: avoid; }
        .pdi-box { background: #0a0c10; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 14px; color: #cbd5e0; line-height: 1.5; border: 1px dashed #444; }
        h2 { color: #ff5c3a; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: #000; }
        @media print { .menu { display: none; } body { background: white; color: black; } .sessao, .card-aluno { border: 1px solid #ccc; background: white; color: black; } }
    </style>
</head>
<body>

    <div class="menu">
        <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir PDIs e Relatórios</button>
        <button class="btn btn-del" onclick="limparBanco()">🗑️ Limpar Dados da Turma</button>
    </div>

    <h1 style="text-align:center;">📊 Painel de Controle - Instrutor Jorge</h1>

    <div id="area-turma" class="sessao" style="display:none;">
        <h2>📈 Diagnóstico Geral da Turma</h2>
        <div class="grid">
            <div><canvas id="canvas-turma-sap"></canvas></div>
            <div><canvas id="canvas-turma-disc"></canvas></div>
        </div>
        <div id="feedback-turma" class="pdi-box" style="margin-top:20px; background: rgba(255,92,58,0.1);"></div>
    </div>

    <div id="lista-alunos">Aguardando dados...</div>

<script>
    // Configuração do Firebase do Jorge
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com", projectId: "perfil-jovem--disc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Dicionário DISC baseado no PDF
    const perfisDISC = {
        E: { n: "Dominante (D)", c: "#e74c3c", pdi: "Focar em paciência e escuta ativa. Reduzir a pressa em decidir sozinho e envolver mais a equipe." },
        C: { n: "Influente (I)", c: "#f1c40f", pdi: "Melhorar o foco em detalhes e o cumprimento de prazos. Utilizar listas de verificação." },
        P: { n: "Estável (S)", c: "#2ecc71", pdi: "Desenvolver abertura para mudanças e expressar opiniões de forma mais direta e firme." },
        A: { n: "Analítico (C)", c: "#3498db", pdi: "Trabalhar a agilidade. Evitar que a busca pela perfeição trave a entrega dos projetos." }
    };

    const nomesSAP = ['Protagonismo', 'Responsabilidade', 'Ambiental', 'Convivência', 'Saúde', 'Equipe', 'Aprender'];

    db.ref('resultados_testes').on('value', snap => {
        const lista = document.getElementById('lista-alunos');
        lista.innerHTML = "";
        
        if (!snap.exists()) {
            lista.innerHTML = "<div class='sessao'>Nenhum aluno avaliado ainda.</div>";
            document.getElementById('area-turma').style.display = "none";
            return;
        }

        document.getElementById('area-turma').style.display = "block";
        let somaTotalSAP = [0,0,0,0,0,0,0];
        let somaTotalDISC = { E:0, C:0, P:0, A:0 };
        let contador = 0;

        snap.forEach(alunoSnap => {
            const d = alunoSnap.val();
            const id = alunoSnap.key;
            contador++;

            // Cálculos da Turma
            d.sap.forEach((v, i) => somaTotalSAP[i] += v);
            somaTotalDISC.E += d.disc.E; somaTotalDISC.C += d.disc.C; 
            somaTotalDISC.P += d.disc.P; somaTotalDISC.A += d.disc.A;

            // Perfil Predominante
            let principal = Object.keys(d.disc).reduce((a, b) => d.disc[a] > d.disc[b] ? a : b);

            lista.innerHTML += `
                <div class="card-aluno">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>JOVEM: ${d.aluno}</strong>
                        <span class="tag" style="background:${perfisDISC[principal].c}">${perfisDISC[principal].n}</span>
                    </div>
                    <div class="grid" style="margin-top:20px;">
                        <div>
                            <canvas id="radar-${id}" height="200"></canvas>
                        </div>
                        <div>
                            <div class="pdi-box">
                                <strong>🎯 PDI (Plano de Desenvolvimento Individual):</strong><br>
                                ${perfisDISC[principal].pdi}
                            </div>
                            <div class="pdi-box" style="border-color: #06d6a0;">
                                <strong>💡 Análise SAP:</strong><br>
                                O aluno apresenta média de ${(d.sap.reduce((a,b)=>a+b)/7).toFixed(1)} nas competências Pescar.
                            </div>
                        </div>
                    </div>
                </div>`;
            
            // Desenha Radar Individual
            setTimeout(() => {
                new Chart(document.getElementById('radar-'+id), {
                    type: 'radar',
                    data: {
                        labels: ['P1','P2','P3','P4','P5','P6','P7'],
                        datasets: [{ label: 'Competências', data: d.sap, borderColor: '#06d6a0', backgroundColor: 'rgba(6,214,160,0.1)' }]
                    },
                    options: { scales: { r: { min: 0, max: 5, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                });
            }, 300);
        });

        // Gráficos Coletivos
        setTimeout(() => {
            const mediasSAP = somaTotalSAP.map(v => v/contador);
            
            // Barra SAP Turma
            new Chart(document.getElementById('canvas-turma-sap'), {
                type: 'bar',
                data: {
                    labels: nomesSAP,
                    datasets: [{ label: 'Média da Turma', data: mediasSAP, backgroundColor: '#06d6a0' }]
                },
                options: { scales: { y: { min: 0, max: 5 } } }
            });

            // Pizza DISC Turma
            new Chart(document.getElementById('canvas-turma-disc'), {
                type: 'pie',
                data: {
                    labels: ['Exec/Dom','Comu/Inf','Plan/Est','Anal/Cau'],
                    datasets: [{ data: [somaTotalDISC.E, somaTotalDISC.C, somaTotalDISC.P, somaTotalDISC.A], backgroundColor: ['#e74c3c','#f1c40f','#2ecc71','#3498db'] }]
                }
            });

            // Feedback Inteligente
            const menorNotaIndex = mediasSAP.indexOf(Math.min(...mediasSAP));
            document.getElementById('feedback-turma').innerHTML = `
                <strong>📢 Diagnóstico para o Instrutor Jorge:</strong><br>
                A turma está com o menor desempenho em <b>${nomesSAP[menorNotaIndex]}</b>. 
                Sugerimos focar as próximas dinâmicas nesta competência.
            `;
        }, 600);
    });

    function limparBanco() {
        if(confirm("Jorge, você deseja apagar TODOS os resultados para iniciar uma nova turma?")) {
            db.ref('resultados_testes').remove();
        }
    }
</script>
</body>
</html>
