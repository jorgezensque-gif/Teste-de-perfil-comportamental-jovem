<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function enviar() {
        const nome = document.getElementById('nome-aluno').value;
        if (!nome) return alert("Jorge, o nome do aluno é obrigatório!");

        let dados = {
            aluno: nome,
            data: new Date().toLocaleString('pt-BR'),
            sap: {}
        };

        // Coleta as 7 notas SAP (item0 até item6)
        for (let i = 0; i < 7; i++) {
            const sel = document.querySelector(`input[name="sap${i}"]:checked`);
            if (!sel) return alert(`Por favor, responda a competência SAP ${i + 1}`);
            dados.sap[`item${i}`] = parseInt(sel.value);
        }

        // ENVIAR PARA A PASTA CORRETA: resultados_testes
        db.ref('resultados_testes').push(dados)
            .then(() => {
                alert("Sucesso! Dados enviados para o painel do Jorge.");
                location.reload(); 
            })
            .catch(err => alert("Erro ao enviar: " + err));
    }
</script>
