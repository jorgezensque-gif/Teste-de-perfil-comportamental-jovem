<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026 - Jorge Zensque</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        .section-card { background: #334155; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 5px solid #38bdf8; }
        h3 { color: #facc15; margin-top: 0; }
        .question-block { margin-bottom: 25px; border-bottom: 1px solid #475569; padding-bottom: 15px; }
        .evidencias { font-size: 0.85em; color: #38bdf8; background: #0f172a; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .options-grid { display: grid; gap: 10px; }
        .option-item { background: #1e293b; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid #475569; }
        input[type="radio"] { margin-right: 10px; }
        input[type="range"] { width: 100%; accent-color: #38bdf8; }
        .btn-enviar { width: 100%; padding: 20px; background: #0ea5e9; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Diagnóstico Socioemocional 2026</h2>
    <input type="text" id="nomeAluno" style="width:100%; padding:15px; margin-bottom:20px; border-radius:8px;" placeholder="Nome Completo do Aluno">

    <form id="testeForm">
        <div class="section-card">
            <h3>1. COMPETÊNCIAS SOCIOEMOCIONAIS (SAP)</h3>
            <div id="sap-questions"></div>
        </div>

        <div class="section-card" style="border-left-color: #f87171;">
            <h3 style="color: #f87171;">2. PERFIL COMPORTAMENTAL (DISC)</h3>
            <div id="disc-questions"></div>
        </div>

        <div class="section-card" style="border-left-color: #fbbf24;">
            <h3 style="color: #fbbf24;">3. AUTOPERCEPÇÃO (DUNNING-KRUGER)</h3>
            <div id="dk-questions"></div>
        </div>

        <button type="button" class="btn-enviar" onclick="enviarDados()">FINALIZAR DIAGNÓSTICO</button>
    </form>
</div>

<script>
    // CONFIGURAÇÃO DOS DADOS (Jorge, aqui estão todas as suas perguntas das imagens)
    const sapData = [
        { q: "1. PROTAGONISMO", e: "Tomo iniciativa; Busco soluções; Sou proativo." },
        { q: "2. RESPONSABILIDADE", e: "Cumpro prazos; Assumo meus erros; Sou organizado." },
        { q: "3. COMUNICAÇÃO", e: "Falo com clareza; Sei ouvir; Expresso ideias." },
        { q: "4. ÉTICA", e: "Respeito regras; Sou honesto; Valorizo o próximo." },
        { q: "5. RESOLUÇÃO DE PROBLEMAS", e: "Penso rápido; Sou criativo; Não desisto." },
        { q: "6. TRABALHO EM EQUIPE", e: "Colaboro; Coloco o grupo acima do eu; Aceito críticas." },
        { q: "7. APRENDER A APRENDER", e: "Sou curioso; Estudo por conta própria; Tiro lições." }
    ];

    const discData = [
        { q: "1. Em um grupo, você prefere:", options: ["Liderar e decidir (D)", "Animar e interagir (I)", "Ouvir e apoiar (S)", "Analisar e organizar (C)"] },
        // ... repita para as 16 questões conforme sua planilha
    ];

    // Geração automática das perguntas na tela
    const sapDiv = document.getElementById('sap-questions');
    sapData.forEach((item, index) => {
        sapDiv.innerHTML += `
            <div class="question-block">
                <label>${item.q}</label>
                <div class="evidencias">Evidências: ${item.e}</div>
                <input type="range" name="sap${index}" min="1" max="5" value="3">
            </div>`;
    });

    // Dunning-Kruger (Suas 10 novas perguntas)
    const dkDiv = document.getElementById('dk-questions');
    for(let i=1; i<=10; i++) {
        dkDiv.innerHTML += `
            <div class="question-block">
                <label>Pergunta DK ${i}</label>
                <input type="range" name="dk${i}" min="1" max="5" value="3">
            </div>`;
    }

    // FIREBASE E ENVIO
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function enviarDados() {
        const nome = document.getElementById('nomeAluno').value;
        if(!nome) return alert("Jorge diz: Digite o nome!");

        const fd = new FormData(document.getElementById('testeForm'));
        
        // Exemplo de cálculo simplificado para o Jorge
        const dados = {
            aluno: nome,
            sap: { p: fd.get('sap0'), r: fd.get('sap1'), c: fd.get('sap2'), e: fd.get('sap3'), pb: fd.get('sap4'), eq: fd.get('sap5'), a: fd.get('sap6') },
            disc: { D: 5, I: 4, S: 2, C: 3 }, // Jorge, aqui entra sua lógica de somar os pontos do rádio
            dk_grafico: [1, 4, 2, 3, 5], // Cálculo do DK baseado nas perguntas 1-10
            data: new Date().toLocaleDateString()
        };

        db.ref('resultados_testes').push(dados).then(() => {
            alert("Sucesso, Jorge! Teste salvo.");
            location.reload();
        });
    }
</script>
</body>
</html>
