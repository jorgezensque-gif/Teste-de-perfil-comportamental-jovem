<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional - Jorge Zensque</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { display: none; }
        .active { display: block; }
        .section-card { background: #334155; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h3 { color: var(--accent); text-align: center; }
        .question { margin-bottom: 20px; border-bottom: 1px solid #475569; padding-bottom: 15px; }
        .evidencia { font-size: 0.8em; color: var(--blue); margin-bottom: 10px; font-style: italic; background: #0f172a; padding: 8px; border-radius: 5px; }
        input[type="range"] { width: 100%; margin: 10px 0; accent-color: var(--blue); }
        .btn-next { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .disc-opt { display: block; background: #0f172a; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #0f172a; color: white; margin-bottom: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="step0" class="step active">
        <h3>Diagnóstico Socioemocional 2026</h3>
        <input type="text" id="nomeAluno" placeholder="Nome Completo do Aluno">
        <button class="btn-next" onclick="nextStep(1)">INICIAR 1ª ETAPA: SAP</button>
    </div>

    <div id="step1" class="step">
        <h3>1ª ETAPA: COMPETÊNCIAS (SAP)</h3>
        <div id="sap-content"></div>
        <button class="btn-next" onclick="nextStep(2)">PRÓXIMO: PERFIL DISC</button>
    </div>

    <div id="step2" class="step">
        <h3>2ª ETAPA: PERFIL COMPORTAMENTAL (DISC)</h3>
        <div id="disc-content"></div>
        <button class="btn-next" style="background:#22c55e;" onclick="finalizar()">FINALIZAR E ENVIAR</button>
    </div>
</div>

<script>
    // DADOS SAP (As 7 competências)
    const sapData = [
        { q: "PROTAGONISMO", e: "Tomo iniciativa e busco soluções." },
        { q: "RESPONSABILIDADE", e: "Cumpro prazos e assumo meus atos." },
        { q: "COMUNICAÇÃO", e: "Falo com clareza e sei ouvir." },
        { q: "ÉTICA", e: "Respeito regras e sou honesto." },
        { q: "RESOLUÇÃO DE PROBLEMAS", e: "Sou criativo e resiliente." },
        { q: "TRABALHO EM EQUIPE", e: "Colaboro bem com o grupo." },
        { q: "APRENDER A APRENDER", e: "Busco novos conhecimentos sempre." }
    ];

    // Geração SAP
    const sapDiv = document.getElementById('sap-content');
    sapData.forEach((s, i) => {
        sapDiv.innerHTML += `<div class="question"><label><b>${s.q}</b></label><div class="evidencia">Evidência: ${s.e}</div><input type="range" id="sap${i}" min="1" max="5" value="3"></div>`;
    });

    // Geração DISC (16 Questões)
    const discDiv = document.getElementById('disc-content');
    for(let i=0; i<16; i++) {
        discDiv.innerHTML += `<div class="question"><label>Questão ${i+1}: Escolha uma frase:</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="D"> Sou decidido e direto.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="I"> Sou entusiasmado e falante.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="S"> Sou paciente e bom ouvinte.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="C"> Sou detalhista e organizado.</label></div>`;
    }

    function nextStep(s) {
        if(s === 1 && !document.getElementById('nomeAluno').value) return alert("Digite seu nome!");
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    // FIREBASE
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function finalizar() {
        const nome = document.getElementById('nomeAluno').value;
        
        let sapRes = {
            p: document.getElementById('sap0').value,
            r: document.getElementById('sap1').value,
            c: document.getElementById('sap2').value,
            e: document.getElementById('sap3').value,
            pb: document.getElementById('sap4').value,
            eq: document.getElementById('sap5').value,
            a: document.getElementById('sap6').value
        };

        let discFinal = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=0; i<16; i++) {
            let r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) discFinal[r.value]++;
        }

        db.ref('resultados_testes').push({
            aluno: nome, sap: sapRes, disc: discFinal, data: new Date().toLocaleDateString()
        }).then(() => {
            alert("Sucesso, Jorge! Dados enviados.");
            location.reload();
        });
    }
</script>
</body>
</html>
