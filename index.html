<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assessment DISC Profissional - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-top: 0; }
        
        .enunciado-pergunta { background: #3d444b; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 16px; color: #00d2d3; }
        
        .bloco-disc { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 35px; border: 1px solid #4b4b4b; }
        .linha-header { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; font-weight: bold; color: var(--primaria); text-align: center; margin-bottom: 10px; font-size: 12px; }
        .linha-disc { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid #3d444b; }
        .col-radio { display: flex; justify-content: center; }
        input[type="radio"] { width: 25px; height: 25px; accent-color: var(--primaria); cursor: pointer; }
        
        .btn-enviar { width: 100%; padding: 25px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid #4b4b4b; background: #000; color: #fff; font-size: 18px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="sessao">
        <h2>IDENTIFICAÇÃO</h2>
        <input type="text" id="nome-aluno" placeholder="NOME COMPLETO">
    </div>

    <div class="sessao">
        <h2>AVALIAÇÃO COMPORTAMENTAL</h2>
        <p>Leia a pergunta e marque o que <b>MAIS (+)</b> e o que <b>MENOS (-)</b> representa sua reação.</p>
        <div id="disc-content"></div>
    </div>

    <button class="btn-enviar" onclick="enviarDados()">ENVIAR AVALIAÇÃO FINAL</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // BLOCOS COM ENUNCIADOS (BASEADO NO SEU MODELO)
    const blocos = [
        {
            pergunta: "1. Como você se sente com trabalhos repetitivos?",
            opcoes: [
                {t: "Gosto, pois me trazem segurança e rotina", v: "S"},
                {t: "Aceito se houver um padrão lógico e preciso", v: "C"},
                {t: "Fico impaciente, prefiro desafios e ação", v: "D"},
                {t: "Me cansam, prefiro interagir com pessoas", v: "I"}
            ]
        },
        {
            pergunta: "2. Em uma discussão em grupo, você geralmente:",
            opcoes: [
                {t: "Toma a frente e decide o caminho", v: "D"},
                {t: "Anima o grupo e busca consenso", v: "I"},
                {t: "Ouve a todos antes de opinar", v: "S"},
                {t: "Analisa os fatos de forma técnica", v: "C"}
            ]
        },
        {
            pergunta: "3. Qual sua atitude perante mudanças inesperadas?",
            opcoes: [
                {t: "Vejo como uma oportunidade de vencer", v: "D"},
                {t: "Fico entusiasmado com a novidade", v: "I"},
                {t: "Sinto desconforto, prefiro o planejado", v: "S"},
                {t: "Avalio os riscos e detalhes da mudança", v: "C"}
            ]
        }
        // Jorge, você pode seguir adicionando até as 28 questões seguindo esse padrão exato.
    ];

    function render() {
        const div = document.getElementById('disc-content');
        blocos.forEach((b, i) => {
            let html = `
                <div class="bloco-disc">
                    <div class="enunciado-pergunta">${b.pergunta}</div>
                    <div class="linha-header"><span>RESPOSTA</span><span>MAIS (+)</span><span>MENOS (-)</span></div>`;
            
            b.opcoes.forEach(op => {
                html += `
                    <div class="linha-disc">
                        <span>${op.t}</span>
                        <div class="col-radio"><input type="radio" name="m${i}" value="${op.v}"></div>
                        <div class="col-radio"><input type="radio" name="l${i}" value="${op.v}"></div>
                    </div>`;
            });
            html += `</div>`;
            div.innerHTML += html;
        });
    }

    function enviarDados() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Jorge, o nome é obrigatório!");

        let d=0, i=0, s=0, c=0;
        for(let j=0; j<blocos.length; j++) {
            let m = document.querySelector(`input[name="m${j}"]:checked`);
            let l = document.querySelector(`input[name="l${j}"]:checked`);
            
            if(!m || !l) return alert("Responda todas as opções do bloco " + (j+1));
            if(m.value === l.value) return alert("No bloco "+(j+1)+", o MAIS e MENOS devem ser diferentes!");

            // Soma Mais
            if(m.value==='D') d++; if(m.value==='I') i++; if(m.value==='S') s++; if(m.value==='C') c++;
            // Subtrai Menos
            if(l.value==='D') d--; if(l.value==='I') i--; if(l.value==='S') s--; if(l.value==='C') c--;
        }

        db.ref('resultados_testes').push({
            aluno: nome,
            disc: {D:d, I:i, S:s, C:c},
            sap: [5,5,5,5,5,5,5], // Mock SAP
            data: new Date().toLocaleString()
        }).then(() => {
            alert("Sucesso! Relatório enviado para o Jorge.");
            location.reload();
        });
    }

    render();
</script>
</body>
</html>
