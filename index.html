<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assessment Completo DISC + SAP - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; --destaque: #00d2d3; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-top: 0; text-transform: uppercase; }
        
        /* Estilo SAP Detalhado */
        .item-sap { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--destaque); }
        .titulo-sap { font-size: 18px; font-weight: bold; color: var(--destaque); margin-bottom: 10px; display: block; }
        .descricao-sap { font-size: 14px; color: #ced4da; line-height: 1.5; margin-bottom: 12px; text-align: justify; }
        .evidencias-sap { font-size: 13px; color: #a29bfe; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 1px dashed #4b4b4b; }
        .opcoes-sap { display: flex; justify-content: space-around; align-items: center; background: #1e272e; padding: 15px; border-radius: 8px; }
        .opcoes-sap label { text-align: center; cursor: pointer; font-weight: bold; }

        /* Estilo DISC */
        .bloco-disc { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        .enunciado-disc { background: #3d444b; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: var(--destaque); }
        .linha-header { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; font-weight: bold; color: var(--primaria); text-align: center; font-size: 12px; }
        .linha-res { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #454d5d; }
        
        input[type="radio"] { width: 24px; height: 24px; accent-color: var(--primaria); cursor: pointer; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid #4b4b4b; background: #000; color: #fff; font-size: 18px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 25px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 8px 0 #b33921; }
        .btn-enviar:active { transform: translateY(4px); box-shadow: 0 4px 0 #b33921; }
    </style>
</head>
<body>

<div class="container">
    <div class="sessao">
        <h2>1. IDENTIFICAÇÃO</h2>
        <input type="text" id="nome-aluno" placeholder="DIGITE SEU NOME COMPLETO">
    </div>

    <div class="sessao">
        <h2>2. COMPETÊNCIAS SOCIOEMOCIONAIS (SAP)</h2>
        <div id="sap-container"></div>
    </div>

    <div class="sessao">
        <h2>3. PERFIL COMPORTAMENTAL (DISC)</h2>
        <div id="disc-container"></div>
    </div>

    <button class="btn-enviar" onclick="enviar()">ENVIAR AVALIAÇÃO PARA O JORGE</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const listaSAP = [
        {
            titulo: "1 - SER PROTAGONISTA",
            desc: "Protagonista é o jovem que se conscientiza de sua identidade, se reconhece como ser atuante, autônomo, solidário, participativo e construtor do seu destino. Consegue exercer ações de intervenção no contexto social, visando responder a problemas reais como sujeito principal.",
            evidencia: "• Sou referência construtiva nos grupos.<br>• Respeito e me faço respeitar.<br>• Construo meu Projeto de Vida (estudos, trabalho, pessoal).<br>• Reconheço potenciais e pontos a melhorar."
        },
        {
            titulo: "2 - SER RESPONSÁVEL E COMPROMETIDO",
            desc: "Comprometer-se com suas atividades, ser pontual e assíduo, cumprir o que é exigido, respeitar regras e normas de convivência. É esforçar-se para obter bons resultados e melhorar seu desempenho continuamente.",
            evidencia: "• Cumpro tarefas e prazos com desempenho.<br>• Sou pontual e justifico faltas/atrasos.<br>• Reconheço a importância do trabalho para meu desenvolvimento.<br>• Cuido da minha apresentação e higiene.<br>• Cumpro as normas do contrato."
        },
        {
            titulo: "3 - CONSCIÊNCIA AMBIENTAL",
            desc: "Compreender a interdependência entre o ser humano e o meio ambiente. Adotar hábitos de consumo consciente, preservação de recursos naturais e descarte correto de resíduos no dia a dia.",
            evidencia: "• Economizo água e energia.<br>• Pratico o descarte correto de lixo.<br>• Zelo pela limpeza dos espaços comuns."
        },
        {
            titulo: "4 - CONVIVÊNCIA SOCIAL",
            desc: "Capacidade de interagir com o próximo de forma ética, respeitando a diversidade e as diferenças individuais. Promover um ambiente de harmonia e respeito mútuo.",
            evidencia: "• Sou cordial com todos.<br>• Respeito opiniões contrárias às minhas.<br>• Não pratico nem aceito discriminação."
        },
        {
            titulo: "5 - SAÚDE E HIGIENE",
            desc: "Manter hábitos que promovam o bem-estar físico e mental. Entender que o cuidado com o corpo e a mente é fundamental para a produtividade e qualidade de vida.",
            evidencia: "• Mantenho boa aparência e asseio corporal.<br>• Busco equilíbrio emocional nas tarefas.<br>• Respeito meus limites físicos."
        },
        {
            titulo: "6 - TRABALHO EM EQUIPE",
            desc: "Atuar de forma colaborativa para alcançar objetivos comuns. Compartilhar responsabilidades, informações e apoiar os colegas para o crescimento do grupo.",
            evidencia: "• Colaboro com o aprendizado dos colegas.<br>• Aceito críticas construtivas.<br>• Priorizo o sucesso do grupo."
        },
        {
            titulo: "7 - DESEJO DE APRENDER",
            desc: "Demonstrar curiosidade, interesse e proatividade na busca por novos conhecimentos e habilidades que contribuam para o crescimento pessoal e profissional.",
            evidencia: "• Sou curioso e faço perguntas relevantes.<br>• Busco aprender além do que é pedido.<br>• Aplico novos conhecimentos na prática."
        }
    ];

    const blocosDISC = [];
    for(let i=1; i<=28; i++) {
        blocosDISC.push({
            q: "Blobo Situacional " + i,
            o: [
                {t:"Atuo com foco em resultados rápidos",v:"D"},
                {t:"Prefiro influenciar pessoas pelo entusiasmo",v:"I"},
                {t:"Trabalho melhor em processos estáveis",v:"S"},
                {t:"Busco a perfeição e exatidão técnica",v:"C"}
            ]
        });
    }

    function render() {
        const sapDiv = document.getElementById('sap-container');
        listaSAP.forEach((s, i) => {
            sapDiv.innerHTML += `
                <div class="item-sap">
                    <span class="titulo-sap">${s.titulo}</span>
                    <div class="descricao-sap">${s.desc}</div>
                    <div class="evidencias-sap"><strong>EVIDÊNCIAS NORTEADORAS:</strong><br>${s.evidencia}</div>
                    <div class="opcoes-sap">
                        ${[1,2,3,4,5].map(v => `<label><input type="radio" name="sap${i}" value="${v}"><br>${v}</label>`).join('')}
                    </div>
                </div>`;
        });

        const discDiv = document.getElementById('disc-container');
        blocosDISC.forEach((b, i) => {
            let h = `<div class="bloco-disc"><div class="enunciado-disc">${b.q}</div><div class="linha-header"><span>OPÇÕES</span><span>MAIS (+)</span><span>MENOS (-)</span></div>`;
            b.o.forEach(op => {
                h += `<div class="linha-res"><span>${op.t}</span><div style="text-align:center"><input type="radio" name="m${i}" value="${op.v}"></div><div style="text-align:center"><input type="radio" name="l${i}" value="${op.v}"></div></div>`;
            });
            discDiv.innerHTML += h + `</div>`;
        });
    }

    function enviar() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Jorge, o nome do aluno é obrigatório!");

        let sapRes = [];
        for(let i=0; i<7; i++) {
            let r = document.querySelector(`input[name="sap${i}"]:checked`);
            if(!r) return alert("Responda todas as 7 competências SAP antes de enviar.");
            sapRes.push(parseInt(r.value));
        }

        let d=0, i=0, s=0, c=0;
        for(let j=0; j<28; j++) {
            let m = document.querySelector(`input[name="m${j}"]:checked`);
            let l = document.querySelector(`input[name="l${j}"]:checked`);
            if(!m || !l) return alert("Falta responder o bloco DISC " + (j+1));
            if(m.value === l.value) return alert("No bloco "+(j+1)+", o MAIS e o MENOS não podem ser a mesma opção.");
            
            if(m.value==='D') d++; if(m.value==='I') i++; if(m.value==='S') s++; if(m.value==='C') c++;
            if(l.value==='D') d--; if(l.value==='I') i--; if(l.value==='S') s--; if(l.value==='C') c--;
        }

        db.ref('resultados_testes').push({ aluno: nome, sap: sapRes, disc: {D:d, I:i, S:s, C:c}, data: new Date().toLocaleString() })
        .then(() => { alert("Finalizado com sucesso, Jorge! O perfil foi gerado."); location.reload(); });
    }
    render();
</script>
</body>
</html>
