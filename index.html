<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 650px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h3 { color: var(--accent); text-align: center; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .question-card { background: #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--blue); }
        .evidencias { font-size: 0.85em; color: #cbd5e1; background: #1a2232; padding: 12px; border-radius: 8px; margin-bottom: 15px; white-space: pre-line; }
        .rating-row { display: flex; justify-content: space-between; background: #0f172a; padding: 15px; border-radius: 10px; }
        .rating-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .rating-item input { width: 24px; height: 24px; cursor: pointer; accent-color: var(--blue); margin-bottom: 5px; }
        .disc-opt { display: block; background: #0f172a; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #475569; cursor: pointer; }
        .btn { width: 100%; padding: 20px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #msg-bloqueio { display: none; text-align: center; padding: 50px; }
        .wa-btn { position: fixed; bottom: 20px; right: 20px; background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-decoration: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="msg-bloqueio">
    <h1 style="color:var(--accent);">⚠️ LINK EXPIRADO</h1>
    <p>Jorge informa: Este link individual já foi utilizado. Caso precise refazer, solicite um novo link.</p>
</div>

<div id="conteudo-teste" class="container">
    <div id="step0" class="step active">
        <h3>Diagnóstico 2026</h3>
        <input type="text" id="nomeAluno" style="width:100%; padding:18px; margin-bottom:20px; border-radius:10px; border:none; background:#0f172a; color:white; font-size:1.1em;" placeholder="Digite seu Nome Completo">
        <button class="btn" onclick="proximo(1)">INICIAR 1ª ETAPA: SAP</button>
    </div>

    <div id="step1" class="step">
        <h3>1. Competências (SAP)</h3>
        <div id="sap-area"></div>
        <button class="btn" onclick="proximo(2)">PRÓXIMA ETAPA: DISC</button>
    </div>

    <div id="step2" class="step">
        <h3>2. Perfil Comportamental (DISC)</h3>
        <p style="text-align:center; color:#94a3b8; margin-bottom:20px;">Escolha a opção que melhor descreve você:</p>
        <div id="disc-area"></div>
        <button class="btn" style="background:#22c55e;" onclick="enviar()">FINALIZAR E ENVIAR</button>
    </div>
</div>

<a id="linkZap" href="https://wa.me/5563984011065?text=Jorge, estou com dúvida no teste." class="wa-btn" target="_blank">
    <svg width="35" height="35" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
</a>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const linkID = urlParams.get('id');

    if (linkID) {
        db.ref('links_usados/' + linkID).once('value', snap => {
            if (snap.exists()) {
                document.getElementById('conteudo-teste').style.display = 'none';
                document.getElementById('msg-bloqueio').style.display = 'block';
            }
        });
    } else {
        alert("Link inválido! Solicite o link correto ao Jorge.");
        document.getElementById('conteudo-teste').style.display = 'none';
    }

    const sapData = [
        { t: "SER PROTAGONISTA", e: "• Referência construtiva no grupo\n• Respeito mútuo\n• Projeto de Vida\n• Reconhece potenciais\n• Oferece ajuda" },
        { t: "SER RESPONSÁVEL E COMPROMETIDO", e: "• Cumpre tarefas e prazos\n• Pontual e assíduo\n• Apresentação pessoal\n• Cumpre regras e normas" },
        { t: "COMPREENDER CONTEXTOS E COMUNICAR-SE", e: "• Postura coerente\n• Críticas construtivas\n• Pensamentos ordenados\n• Sei ouvir e esperar a vez" },
        { t: "SER DEMOCRÁTICO, ÉTICO E CIDADÃO", e: "• Honesto e ético\n• Assumo meus erros\n• Respeito opiniões diferentes\n• Conheço direitos e deveres" },
        { t: "RESOLVER SITUAÇÕES-PROBLEMA", e: "• Conflitos sem fofoca\n• Pensar antes de agir\n• Pedir ajuda se precisar\n• Lido com sentimentos" },
        { t: "TRABALHAR E PRODUZIR EM EQUIPE", e: "• Bem-estar do grupo\n• Busca consenso\n• Aceitar trabalhar em grupo\n• Recebe críticas e sugestões" },
        { t: "APRENDER A APRENDER", e: "• Aprofunda conhecimentos\n• Comprometimento escolar\n• Lições de situações\n• Curioso e questionador" }
    ];

    const discData = [
        { d:"Decidido e Dominante", i:"Animado e Influente", s:"Amigável e Estável", c:"Preciso e Detalhista" },
        { d:"Foco em Resultados", i:"Foco em Pessoas", s:"Foco em Colaboração", c:"Foco em Processos" },
        { d:"Gosta de Liderar", i:"Gosta de Interagir", s:"Gosta de Rotinas", c:"Gosta de Organização" },
        { d:"Assertivo", i:"Persuasivo", s:"Bom Ouvinte", c:"Analítico" },
        { d:"Rápido", i:"Expressivo", s:"Cuidadoso", c:"Lógico" },
        { d:"Independente", i:"Sociável", s:"Leal", c:"Perfeccionista" },
        { d:"Competitivo", i:"Espontâneo", s:"Apoia os outros", c:"Exigente" },
        { d:"Determinado", i:"Comunicativo", s:"Paciente", c:"Prudente" },
        { d:"Direto ao ponto", i:"Gosta de conversar", s:"Evita conflitos", c:"Segue regras" },
        { d:"Energético", i:"Criativo", s:"Gentil", c:"Sistemático" },
        { d:"Corajoso", i:"Inspirador", s:"Calmo", c:"Racional" },
        { d:"Auto-confiante", i:"Otimista", s:"Previsível", c:"Técnico" },
        { d:"Comandante", i:"Popular", s:"Moderado", c:"Discreto" },
        { d:"Firme", i:"Encantador", s:"Seguro", c:"Criterioso" },
        { d:"Ousado", i:"Alegre", s:"Metódico", c:"Disciplinado" },
        { d:"Objetivo", i:"Entusiasmado", s:"Solidário", c:"Cauteloso" }
    ];

    const sapArea = document.getElementById('sap-area');
    sapData.forEach((item, i) => {
        let rs = '';
        for(let v=1; v<=5; v++) rs += `<label class="rating-item"><input type="radio" name="sap${i}" value="${v}"><span>${v}</span></label>`;
        sapArea.innerHTML += `<div class="question-card"><b>${item.t}</b><div class="evidencias">${item.e}</div><div class="rating-row">${rs}</div></div>`;
    });

    const discArea = document.getElementById('disc-area');
    discData.forEach((q, i) => {
        discArea.innerHTML += `<div class="question-card"><b>Questão ${i+1}</b>
            <label class="disc-opt"><input type="radio" name="d${i}" value="D"> ${q.d}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="I"> ${q.i}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="S"> ${q.s}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="C"> ${q.c}</label></div>`;
    });

    function proximo(s) { 
        if(s===1 && !document.getElementById('nomeAluno').value) return alert("Jorge diz: Nome obrigatório!");
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    function enviar() {
        const nome = document.getElementById('nomeAluno').value;
        let sapRes = {};
        sapData.forEach((_, i) => {
            const r = document.querySelector(`input[name="sap${i}"]:checked`);
            sapRes['q'+i] = r ? r.value : "0";
        });
        let dRes = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=0; i<16; i++) {
            const r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) dRes[r.value]++;
        }
        db.ref('resultados_testes').push({ aluno: nome, sap: sapRes, disc: dRes, link_id: linkID, data: new Date().toLocaleString() })
        .then(() => db.ref('links_usados/' + linkID).set(true))
        .then(() => {
            alert("Sucesso! Diagnóstico concluído.");
            location.reload(); 
        });
    }
</script>
</body>
</html>
