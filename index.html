<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
  // Configuração oficial do seu projeto Firebase
  const firebaseConfig = {
    apiKey: "AIzaSy...", // Jorge, pegue esta chave no painel do Firebase (Configurações do Projeto)
    authDomain: "perfil-jovem--disc.firebaseapp.com",
    databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com",
    projectId: "perfil-jovem--disc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  async function validarCodigo() {
    const nome = document.getElementById('nome').value;
    const inputKey = document.getElementById('codigo').value.trim().toUpperCase();

    if (!nome || !inputKey) return alert("Preencha o nome e a chave!");

    // Busca as chaves na nuvem (Firebase)
    const snapshot = await db.ref('chaves').once('value');
    let listaChaves = snapshot.val() || [];

    const index = listaChaves.findIndex(c => c.code === inputKey);

    if (index !== -1 && !listaChaves[index].used) {
      // Chave válida! Marca como usada na nuvem
      listaChaves[index].used = true;
      listaChaves[index].user = nome;
      await db.ref('chaves').set(listaChaves);

      alert("Acesso Autorizado! Boa sorte no teste.");
      window.location.href = "questoes.html"; // Nome da sua página de perguntas
    } else {
      alert("Chave inválida ou já utilizada por outro aluno.");
    }
  }
</script>
