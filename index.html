<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional - Jorge Zensque</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { display: none; }
        .active { display: block; }
        .progress-bar { height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.5s; }
        .section-card { background: #334155; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h3 { color: var(--accent); margin-bottom: 20px; text-align: center; }
        .question { margin-bottom: 25px; border-bottom: 1px solid #475569; padding-bottom: 15px; }
        .evidencia { font-size: 0.85em; color: var(--blue); margin-bottom: 10px; font-style: italic; }
        input[type="range"] { width: 100%; margin: 10px 0; accent-color: var(--blue); }
        .btn-next { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .disc-opt { display: block; background: #0f172a; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>

    <div id="step0" class="step active">
        <h3>Bem-vindo ao Diagnóstico</h3>
        <input type="text" id="nomeAluno" style="width:100%; padding:15px; box-sizing:border-box; border-radius:8px;" placeholder="Digite seu Nome Completo">
        <button class="btn-next" style="margin-top:20px" onclick="nextStep(1)">COMEÇAR (1º SAP)</button>
    </div>

    <div id="step1" class="step">
        <h3>1º ETAPA: COMPETÊNCIAS (SAP)</h3>
        <div id="sap-content"></div>
        <button class="btn-next" onclick="nextStep(2)">PRÓXIMO: 2º DUNNING-KRUGER</button>
    </div>

    <div id="step2" class="step">
        <h3>2º ETAPA: AUTOPERCEPÇÃO (DK)</h3>
        <div id="dk-content"></div>
        <button class="btn-next" onclick="nextStep(3)">ÚLTIMO: 3º PERFIL DISC</button>
    </div>

    <div id="step3" class="step">
        <h3>3º ETAPA: PERFIL COMPORTAMENTAL (DISC)</h3>
        <div id="disc-content"></div>
        <button class="btn-next" onclick="finalizar()">FINALIZAR E TABULAR DADOS</button>
    </div>
</div>

<script>
    const sapData = [
        { q: "PROTAGONISMO", e: "Iniciativa, busca de soluções, proatividade." },
        { q: "RESPONSABILIDADE", e: "Prazos, assumir erros, organização." },
        { q: "COMUNICAÇÃO", e: "Clareza, ouvir, expressar ideias." },
        { q: "ÉTICA", e: "Regras, honestidade, valores." },
        { q: "RESOLUÇÃO DE PROBLEMAS", e: "Rapidez, criatividade, resiliência." },
        { q: "TRABALHO EM EQUIPE", e: "Colaboração, coletividade, ouvir críticas." },
        { q: "APRENDER A APRENDER", e: "Curiosidade, autoestudo, lições aprendidas." }
    ];

    const dkQuestions = [
        "Acredito que me expresso muito bem e raramente preciso melhorar.",
        "Percebo que às vezes não sou tão claro e preciso aprender a ouvir mais.",
        "Acho que sou ótimo em liderar e trabalhar com os outros.",
        "Já percebi que nem sempre consigo colaborar como deveria.",
        "Entendo os sentimentos dos outros e sei como ajudar.",
        "Às vezes não percebo quando alguém precisa de apoio.",
        "Ajo corretamente e não preciso mudar nada.",
        "Reconheço que já cometi erros e estou aprendendo.",
        "Consigo resolver qualquer problema facilmente.",
        "Alguns desafios exigem mais esforço do que eu pensava."
    ];

    // Gerar SAP
    const sapDiv = document.getElementById('sap-content');
    sapData.forEach((s, i) => {
        sapDiv.innerHTML += `<div class="question"><label><b>${s.q}</b></label><div class="evidencia">Evidência: ${s.e}</div><input type="range" id="sap${i}" min="1" max="5" value="3"></div>`;
    });

    // Gerar DK
    const dkDiv = document.getElementById('dk-content');
    dkQuestions.forEach((q, i) => {
        dkDiv.innerHTML += `<div class="question"><label>${i+1}. ${q}</label><input type="range" id="dk${i}" min="1" max="5" value="3"></div>`;
    });

    // Gerar DISC (Exemplo de 16 questões repetidas para estrutura)
    const discDiv = document.getElementById('disc-content');
    for(let i=1; i<=16; i++) {
        discDiv.innerHTML += `<div class="question"><label>${i}. Selecione a frase que melhor te descreve:</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="D"> Sou decidido e focado em metas.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="I"> Sou entusiasmado e comunicativo.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="S"> Sou paciente e bom ouvinte.</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="C"> Sou detalhista e organizado.</label>
        </div>`;
    }

    function nextStep(s) {
        if(s === 1 && !document.getElementById('nomeAluno').value) return alert("Jorge diz: Digite seu nome primeiro!");
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        document.getElementById('fill').style.width = (s * 33.3) + "%";
        window.scrollTo(0,0);
    }

    // FIREBASE
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function finalizar() {
        const nome = document.getElementById('nomeAluno').value;
        
        // Coletar SAP
        let sapRes = {};
        sapData.forEach((_, i) => { sapRes['q'+i] = document.getElementById('sap'+i).value; });

        // Coletar DK (Lógica Jorge)
        let dkSomaPar = 0; let dkSomaImpar = 0;
        for(let i=0; i<10; i++) {
            let v = parseInt(document.getElementById('dk'+i).value);
            if(i % 2 === 0) dkSomaImpar += v; else dkSomaPar += v;
        }
        let dk_grafico = [1, dkSomaImpar/2, 6-(dkSomaImpar/2), dkSomaPar/3, (dkSomaImpar+dkSomaPar)/5];

        // Coletar DISC (Soma letras)
        let discFinal = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=1; i<=16; i++) {
            let r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) discFinal[r.value]++;
        }

        const payload = {
            aluno: nome,
            sap: sapRes,
            dk_grafico: dk_grafico,
            disc: discFinal,
            data: new Date().toLocaleDateString()
        };

        db.ref('resultados_testes').push(payload).then(() => {
            alert("Jorge recebeu todos os dados! Tabulação concluída.");
            location.reload();
        });
    }
</script>
</body>
</html>
