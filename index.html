<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assessment Completo - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; --destaque: #00d2d3; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-top: 0; text-transform: uppercase; }
        
        /* Estilo SAP */
        .item-sap { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--destaque); }
        .titulo-sap { font-size: 18px; font-weight: bold; color: var(--destaque); margin-bottom: 10px; display: block; }
        .descricao-sap { font-size: 14px; color: #ced4da; line-height: 1.5; margin-bottom: 12px; text-align: justify; }
        .evidencias-sap { font-size: 13px; color: #a29bfe; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 1px dashed #4b4b4b; }
        .opcoes-sap { display: flex; justify-content: space-around; background: #1e272e; padding: 15px; border-radius: 8px; }
        .opcoes-sap label { text-align: center; cursor: pointer; font-weight: bold; }

        /* Estilo DISC */
        .bloco-disc { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 35px; border: 1px solid #4b4b4b; }
        .enunciado-situacional { background: #1e3799; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; border-left: 5px solid var(--destaque); font-size: 16px; }
        .linha-header { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; font-weight: bold; color: var(--primaria); text-align: center; font-size: 12px; }
        .linha-res { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid #454d5d; }
        
        input[type="radio"] { width: 24px; height: 24px; accent-color: var(--primaria); cursor: pointer; }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid #4b4b4b; background: #000; color: #fff; font-size: 18px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 25px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 6px 0 #b33921; }
    </style>
</head>
<body>

<div class="container">
    <div class="sessao">
        <h2>1. IDENTIFICAÇÃO</h2>
        <input type="text" id="nome-aluno" placeholder="DIGITE O NOME COMPLETO DO ALUNO">
    </div>

    <div class="sessao">
        <h2>2. COMPETÊNCIAS SOCIOEMOCIONAIS (SAP)</h2>
        <div id="sap-container"></div>
    </div>

    <div class="sessao">
        <h2>3. PERFIL COMPORTAMENTAL (DISC)</h2>
        <div id="disc-container"></div>
    </div>

    <button class="btn-enviar" onclick="enviar()">FINALIZAR AVALIAÇÃO</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const listaSAP = [
        { t: "1 - SER PROTAGONISTA", d: "O jovem que se conscientiza da sua identidade, ser atuante e construtor do seu destino.", e: "• Referência construtiva • Projeto de Vida • Reconhece potenciais." },
        { t: "2 - SER RESPONSÁVEL", d: "Compromisso com atividades, pontualidade, cumprimento de regras e busca por resultados.", e: "• Cumpre prazos • Assíduo • Higiene pessoal • Respeita normas." },
        { t: "3 - CONSCIÊNCIA AMBIENTAL", d: "Agir de forma sustentável, cuidando do ambiente e recursos naturais.", e: "• Economia de recursos • Descarte correto • Organização do espaço." },
        { t: "4 - CONVIVÊNCIA SOCIAL", d: "Relacionar-se de forma ética e respeitosa com a diversidade.", e: "• Cordialidade • Respeito a opiniões • Mediação de conflitos." },
        { t: "5 - SAÚDE E HIGIENE", d: "Zelar pelo bem-estar físico e mental e manter hábitos saudáveis.", e: "• Asseio corporal • Equilíbrio emocional • Limites físicos." },
        { t: "6 - TRABALHO EM EQUIPE", d: "Colaborar com o grupo para atingir objetivos comuns.", e: "• Apoio aos colegas • Aceita feedbacks • Foco no coletivo." },
        { t: "7 - DESEJO DE APRENDER", d: "Curiosidade e proatividade na busca por novos conhecimentos.", e: "• Curiosidade • Busca aprender mais • Aplicação prática." }
    ];

    const blocosDISC = [
        { q: "1. Como você lida com trabalhos repetitivos?", o: [{t:"Gosto de rotina e segurança",v:"S"},{t:"Sigo o padrão lógico",v:"C"},{t:"Fico impaciente, quero ação",v:"D"},{t:"Prefiro interagir com pessoas",v:"I"}]},
        { q: "2. Numa discussão em grupo, você geralmente:", o: [{t:"Toma a frente e decide",v:"D"},{t:"Anima e motiva o grupo",v:"I"},{t:"Ouve antes de opinar",v:"S"},{t:"Analisa factos e lógica",v:"C"}]},
        { q: "3. Perante mudanças inesperadas, qual a sua reação?", o: [{t:"Vejo como chance de vencer",v:"D"},{t:"Fico entusiasmado",v:"I"},{t:"Sinto desconforto inicial",v:"S"},{t:"Avalio riscos e detalhes",v:"C"}]},
        { q: "4. Ao receber uma crítica direta, você:", o: [{t:"Argumenta e defende-se",v:"D"},{t:"Usa o humor para aliviar",v:"I"},{t:"Aceita para evitar conflito",v:"S"},{t:"Analisa se é justa e lógica",v:"C"}]},
        { q: "5. Na execução de uma tarefa nova, prefere:", o: [{t:"Ir direto para a prática",v:"D"},{t:"Fazer com outras pessoas",v:"I"},{t:"Receber instruções claras",v:"S"},{t:"Ler o manual detalhadamente",v:"C"}]},
        { q: "6. Em relação a regras e normas:", o: [{t:"Ignoro se atrasarem o resultado",v:"D"},{t:"Sigo as que são populares",v:"I"},{t:"Sigo para manter a ordem",v:"S"},{t:"Sigo rigorosamente o padrão",v:"C"}]},
        { q: "7. O seu principal foco no trabalho/escola é:", o: [{t:"Bater metas e vencer",v:"D"},{t:"Ser reconhecido e popular",v:"I"},{t:"Ter estabilidade e harmonia",v:"S"},{t:"Garantir qualidade e precisão",v:"C"}]},
        { q: "8. Como você organiza o seu dia?", o: [{t:"Foco nas tarefas prioritárias",v:"D"},{t:"Deixo fluir conforme os encontros",v:"I"},{t:"Sigo uma rotina tranquila",v:"S"},{t:"Planeio tudo com listas",v:"C"}]},
        { q: "9. Numa equipa, você é visto como:", o: [{t:"O motor que empurra o grupo",v:"D"},{t:"A alma que anima o grupo",v:"I"},{t:"O apoio que ajuda a todos",v:"S"},{t:"O cérebro que organiza tudo",v:"C"}]},
        { q: "10. Quando está sob forte pressão:", o: [{t:"Fico agressivo ou mandão",v:"D"},{t:"Fico agitado e falo muito",v:"I"},{t:"Fico calado e me retraio",v:"S"},{t:"Fico excessivamente crítico",v:"C"}]},
        { q: "11. Qual a sua maior dificuldade?", o: [{t:"Ter paciência com os outros",v:"D"},{t:"Ter organização e foco",v:"I"},{t:"Dizer 'não' às pessoas",v:"S"},{t:"Agir sem ter todos os dados",v:"C"}]},
        { q: "12. Como você toma decisões?", o: [{t:"Rápido, baseado no instinto",v:"D"},{t:"Otimista, pensando no prazer",v:"I"},{t:"Lento, buscando consenso",v:"S"},{t:"Cauteloso, baseado em factos",v:"C"}]},
        { q: "13. O que mais te motiva?", o: [{t:"Poder e autonomia",v:"D"},{t:"Prestígio e elogios",v:"I"},{t:"Segurança e lealdade",v:"S"},{t:"Conhecimento e lógica",v:"C"}]},
        { q: "14. Como lida com prazos apertados?", o: [{t:"Acelero todos ao meu redor",v:"D"},{t:"Tento negociar com charme",v:"I"},{t:"Mantenho a calma e o ritmo",v:"S"},{t:"Trabalho horas extra pela perfeição",v:"C"}]},
        { q: "15. No lazer, você prefere:", o: [{t:"Atividades competitivas",v:"D"},{t:"Festas e grandes eventos",v:"I"},{t:"Descanso e família",v:"S"},{t:"Hobbies que exijam técnica",v:"C"}]},
        { q: "16. Como você quer ser lembrado?", o: [{t:"Como alguém que realizou muito",v:"D"},{t:"Como alguém que inspirou muitos",v:"I"},{t:"Como alguém que foi bom amigo",v:"S"},{t:"Como alguém que foi impecável",v:"C"}]}
    ];

    function render() {
        const sCont = document.getElementById('sap-container');
        listaSAP.forEach((s, i) => {
            sCont.innerHTML += `<div class="item-sap"><span class="titulo-sap">${s.t}</span><p class="descricao-sap">${s.d}</p><div class="evidencias-sap">${s.e}</div><div class="opcoes-sap">${[1,2,3,4,5].map(v => `<label><input type="radio" name="sap${i}" value="${v}"><br>${v}</label>`).join('')}</div></div>`;
        });

        const dCont = document.getElementById('disc-container');
        blocosDISC.forEach((b, i) => {
            let h = `<div class="bloco-disc"><div class="enunciado-situacional">${b.q}</div><div class="linha-header"><span>OPÇÃO</span><span>MAIS (+)</span><span>MENOS (-)</span></div>`;
            b.o.forEach(op => {
                h += `<div class="linha-res"><span>${op.t}</span><div style="text-align:center"><input type="radio" name="m${i}" value="${op.v}"></div><div style="text-align:center"><input type="radio" name="l${i}" value="${op.v}"></div></div>`;
            });
            dCont.innerHTML += h + `</div>`;
        });
    }

    function enviar() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Jorge, falta o nome!");
        
        let sapRes = [];
        for(let i=0; i<7; i++){
            let r = document.querySelector(`input[name="sap${i}"]:checked`);
            if(!r) return alert("Responda todas as 7 questões do SAP!");
            sapRes.push(parseInt(r.value));
        }

        let d=0, i=0, s=0, c=0;
        for(let j=0; j<16; j++){
            let m = document.querySelector(`input[name="m${j}"]:checked`);
            let l = document.querySelector(`input[name="l${j}"]:checked`);
            if(!m || !l) return alert("Responda o bloco DISC " + (j+1));
            if(m.value === l.value) return alert("No bloco "+(j+1)+", o MAIS e MENOS devem ser diferentes.");
            if(m.value==='D') d++; if(m.value==='I') i++; if(m.value==='S') s++; if(m.value==='C') c++;
            if(l.value==='D') d--; if(l.value==='I') i--; if(l.value==='S') s--; if(l.value==='C') c--;
        }

        db.ref('resultados_testes').push({ aluno: nome, sap: sapRes, disc: {D:d, I:i, S:s, C:c}, data: new Date().toLocaleString() })
        .then(() => { alert("Assessment enviado com sucesso!"); location.reload(); });
    }
    render();
</script>
</body>
</html>
