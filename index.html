<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 0; margin: 0; }
        .header-fixo { position: sticky; top: 0; background: var(--dark); z-index: 1000; padding: 15px; border-bottom: 2px solid var(--blue); text-align: center; }
        .container { max-width: 650px; margin: 20px auto; padding: 0 15px 100px 15px; }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        h3 { color: var(--accent); margin: 10px 0; text-transform: uppercase; }
        .instrucao { color: #94a3b8; font-size: 0.9em; margin-bottom: 5px; }
        .question-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .evidencias { font-size: 0.85em; color: #cbd5e1; background: #1a2232; padding: 12px; border-radius: 8px; margin-bottom: 15px; white-space: pre-line; }
        .rating-row { display: flex; justify-content: space-between; background: #0f172a; padding: 15px; border-radius: 10px; }
        .rating-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .rating-item input { width: 24px; height: 24px; cursor: pointer; accent-color: var(--blue); }
        .disc-opt { display: block; background: #0f172a; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #475569; cursor: pointer; transition: 0.3s; }
        .disc-opt:hover { border-color: var(--blue); }
        .btn { width: 100%; padding: 20px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #msg-bloqueio { display: none; text-align: center; padding: 50px; }
        .wa-btn { position: fixed; bottom: 20px; right: 20px; background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="msg-bloqueio">
    <h1 style="color:var(--accent);">⚠️ LINK EXPIRADO</h1>
    <p>Jorge informa: Este link individual já foi utilizado.</p>
</div>

<div id="conteudo-teste">
    <div class="header-fixo">
        <h3 id="titulo-etapa">Diagnóstico 2026</h3>
        <p class="instrucao" id="texto-instrucao">Identifique-se para começar</p>
    </div>

    <div class="container">
        <div id="step0" class="step active">
            <input type="text" id="nomeAluno" style="width:100%; padding:18px; border-radius:10px; border:none; background:#1a2232; color:white; font-size:1.1em; box-sizing:border-box;" placeholder="Seu Nome Completo">
            <button class="btn" style="margin-top:20px;" onclick="proximo(1)">INICIAR SAP</button>
        </div>

        <div id="step1" class="step">
            <div id="sap-area"></div>
            <button class="btn" onclick="proximo(2)">IR PARA O DISC</button>
        </div>

        <div id="step2" class="step">
            <div id="disc-area"></div>
            <button class="btn" style="background:var(--green);" onclick="enviar()">FINALIZAR E ENVIAR</button>
        </div>
    </div>
</div>

<a href="https://wa.me/5563984011065" class="wa-btn" target="_blank">
    <svg width="30" height="30" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592z"/></svg>
</a>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const linkID = urlParams.get('id');

    // Bloqueio por Link
    if (linkID) {
        db.ref('links_usados/' + linkID).once('value', snap => {
            if (snap.exists()) {
                document.getElementById('conteudo-teste').style.display = 'none';
                document.getElementById('msg-bloqueio').style.display = 'block';
            }
        });
    }

    const sapData = [
        { t: "1. SER PROTAGONISTA", e: "• Referência no grupo\n• Respeito mútuo\n• Projeto de Vida\n• Reconhece potenciais\n• Oferece ajuda" },
        { t: "2. SER RESPONSÁVEL", e: "• Prazos e tarefas\n• Pontualidade\n• Higiene pessoal\n• Cumpre regras" },
        { t: "3. COMUNICAR-SE", e: "• Postura coerente\n• Críticas construtivas\n• Pensamento ordenado\n• Sabe ouvir" },
        { t: "4. ÉTICA E CIDADANIA", e: "• Honestidade\n• Assume erros\n• Respeita opiniões\n• Direitos e deveres" },
        { t: "5. RESOLVER PROBLEMAS", e: "• Sem fofocas\n• Pensa antes de agir\n• Pede ajuda\n• Lida com sentimentos" },
        { t: "6. TRABALHO EM EQUIPE", e: "• Bem comum\n• Busca consenso\n• Aceita desafios\n• Recebe críticas" },
        { t: "7. APRENDER A APRENDER", e: "• Busca conhecimento\n• Vida escolar\n• Tira lições\n• Curioso" }
    ];

    const discData = [
        { d:"Decidido e Dominante", i:"Animado e Influente", s:"Amigável e Estável", c:"Preciso e Detalhista" },
        { d:"Foco em Resultados", i:"Foco em Entusiasmo", s:"Foco em Cooperação", c:"Foco em Organização" },
        { d:"Gosta de Liderar", i:"Gosta de Persuadir", s:"Gosta de Ajudar", c:"Gosta de Analisar" },
        { d:"Assertivo e Direto", i:"Comunicativo e Alegre", s:"Paciente e Calmo", c:"Cuidadoso e Lógico" },
        { d:"Independente", i:"Sociável", s:"Leal", c:"Perfeccionista" },
        { d:"Competitivo", i:"Espontâneo", s:"Bom ouvinte", c:"Metódico" },
        { d:"Ousado", i:"Otimista", s:"Conciliador", c:"Disciplinado" },
        { d:"Determinado", i:"Criativo", s:"Gentil", c:"Sistemático" },
        { d:"Rápido", i:"Expressivo", s:"Previsível", c:"Analítico" },
        { d:"Corajoso", i:"Popular", s:"Moderado", c:"Discreto" },
        { d:"Firme", i:"Brincalhão", s:"Seguro", c:"Criterioso" },
        { d:"Objetivo", i:"Encantador", s:"Solidário", c:"Cauteloso" },
        { d:"Auto-confiante", i:"Inspirador", s:"Tranquilo", c:"Racional" },
        { d:"Comandante", i:"Amigável", s:"Estável", c:"Organizado" },
        { d:"Assume riscos", i:"Gosta de elogios", s:"Gosta de rotina", c:"Gosta de regras" },
        { d:"Energético", i:"Persuasivo", s:"Apoia o grupo", c:"Busca perfeição" }
    ];

    // Gerar SAP
    const sapArea = document.getElementById('sap-area');
    sapData.forEach((item, i) => {
        let rs = '';
        for(let v=1; v<=5; v++) rs += `<label class="rating-item"><input type="radio" name="sap${i}" value="${v}"><span style="margin-top:5px">${v}</span></label>`;
        sapArea.innerHTML += `<div class="question-card"><b>${item.t}</b><div class="evidencias">${item.e}</div><div class="rating-row">${rs}</div></div>`;
    });

    // Gerar DISC
    const discArea = document.getElementById('disc-area');
    discData.forEach((q, i) => {
        discArea.innerHTML += `<div class="question-card"><b>Questão ${i+1} de 16</b>
            <label class="disc-opt"><input type="radio" name="d${i}" value="D"> ${q.d}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="I"> ${q.i}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="S"> ${q.s}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="C"> ${q.c}</label></div>`;
    });

    function proximo(s) { 
        if(s===1 && !document.getElementById('nomeAluno').value) return alert("Jorge diz: Nome obrigatório!");
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
        if(s===1) { document.getElementById('titulo-etapa').innerText = "1. Competências (SAP)"; document.getElementById('texto-instrucao').innerText = "Avalie-se de 1 a 5 em cada item"; }
        if(s===2) { document.getElementById('titulo-etapa').innerText = "2. Perfil DISC"; document.getElementById('texto-instrucao').innerText = "Escolha a frase que MELHOR descreve você"; }
    }

    function enviar() {
        const nome = document.getElementById('nomeAluno').value;
        let sapRes = {};
        sapData.forEach((_, i) => {
            const r = document.querySelector(`input[name="sap${i}"]:checked`);
            sapRes['q'+i] = r ? r.value : "0";
        });
        let dRes = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=0; i<16; i++) {
            const r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) dRes[r.value]++;
        }
        db.ref('resultados_testes').push({ aluno: nome, sap: sapRes, disc: dRes, link_id: linkID, data: new Date().toLocaleString() })
        .then(() => db.ref('links_usados/' + linkID).set(true))
        .then(() => { alert("Enviado com sucesso!"); location.reload(); });
    }
</script>
</body>
</html>
