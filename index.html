<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 0; margin: 0; overflow-x: hidden; }
        
        /* ENUNCIADO FIXO NO TOPO */
        .header-fixo { position: sticky; top: 0; background: var(--dark); z-index: 1000; padding: 15px; border-bottom: 2px solid var(--blue); text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .container { max-width: 650px; margin: 20px auto; padding: 0 15px 100px 15px; }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h3 { color: var(--accent); margin: 5px 0; text-transform: uppercase; font-size: 1.2em; }
        .instrucao { color: #94a3b8; font-size: 0.9em; font-weight: bold; }
        
        .question-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border-left: 5px solid var(--blue); }
        .pergunta-texto { color: var(--accent); font-weight: bold; margin-bottom: 15px; display: block; font-size: 1.05em; }
        
        .evidencias { font-size: 0.85em; color: #cbd5e1; background: #1a2232; padding: 12px; border-radius: 8px; margin-bottom: 15px; white-space: pre-line; }
        .rating-row { display: flex; justify-content: space-between; background: #0f172a; padding: 15px; border-radius: 10px; }
        .rating-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .rating-item input { width: 25px; height: 25px; cursor: pointer; accent-color: var(--blue); }
        
        .disc-opt { display: block; background: #0f172a; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #475569; cursor: pointer; }
        .disc-opt input { margin-right: 10px; transform: scale(1.2); }
        
        .btn { width: 100%; padding: 20px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #msg-bloqueio { display: none; text-align: center; padding: 100px 20px; }
        .wa-btn { position: fixed; bottom: 20px; right: 20px; background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="msg-bloqueio">
    <h1 style="color:var(--accent);">⚠️ LINK EXPIRADO</h1>
    <p>Jorge informa: Este teste já foi realizado. Caso precise de um novo acesso, entre em contato.</p>
</div>

<div id="conteudo-teste">
    <div class="header-fixo">
        <h3 id="titulo-etapa">Diagnóstico 2026</h3>
        <p class="instrucao" id="texto-instrucao">Aguardando Identificação...</p>
    </div>

    <div class="container">
        <div id="step0" class="step active">
            <input type="text" id="nomeAluno" style="width:100%; padding:18px; border-radius:10px; border:none; background:#1a2232; color:white; font-size:1.1em; box-sizing:border-box;" placeholder="Digite seu Nome Completo">
            <button class="btn" style="margin-top:20px;" onclick="proximo(1)">INICIAR TESTE</button>
        </div>

        <div id="step1" class="step">
            <div id="sap-area"></div>
            <button class="btn" onclick="proximo(2)">AVANÇAR PARA O DISC</button>
        </div>

        <div id="step2" class="step">
            <div id="disc-area"></div>
            <button class="btn" style="background:var(--green);" onclick="enviar()">FINALIZAR E ENVIAR TUDO</button>
        </div>
    </div>
</div>

<a href="https://wa.me/5563984011065" class="wa-btn" target="_blank">
    <svg width="30" height="30" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592z"/></svg>
</a>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const linkID = urlParams.get('id');

    // Lógica de Link Único (A Chave morre ao usar)
    if (linkID) {
        db.ref('links_usados/' + linkID).once('value', snap => {
            if (snap.exists()) {
                document.getElementById('conteudo-teste').style.display = 'none';
                document.getElementById('msg-bloqueio').style.display = 'block';
            }
        });
    } else {
        alert("Atenção: Você precisa de um link individual do Jorge para acessar.");
        document.getElementById('conteudo-teste').style.display = 'none';
    }

    const sapData = [
        { t: "1. SER PROTAGONISTA", e: "• Referência no grupo\n• Respeito mútuo\n• Projeto de Vida\n• Oferece ajuda" },
        { t: "2. SER RESPONSÁVEL", e: "• Cumpre prazos\n• Pontualidade\n• Higiene pessoal\n• Cumpre regras" },
        { t: "3. COMUNICAR-SE", e: "• Postura coerente\n• Críticas construtivas\n• Sabe ouvir" },
        { t: "4. ÉTICA E CIDADANIA", e: "• Honestidade\n• Assume erros\n• Respeita opiniões" },
        { t: "5. RESOLVER PROBLEMAS", e: "• Sem fofocas\n• Pensa antes de agir\n• Pede ajuda" },
        { t: "6. TRABALHO EM EQUIPE", e: "• Busca consenso\n• Bem estar do grupo\n• Aceita críticas" },
        { t: "7. APRENDER A APRENDER", e: "• Busca conhecimento\n• Vida escolar ativa\n• Curioso" }
    ];

    const discData = [
        { q: "1. Em um grupo, você geralmente se comporta como:", d: "Decidido e Dominante", i: "Animado e Influente", s: "Amigável e Estável", c: "Preciso e Detalhista" },
        { q: "2. Seu principal foco no dia a dia é:", d: "Resultados rápidos", i: "Entusiasmo das pessoas", s: "Cooperação e harmonia", c: "Organização e processos" },
        { q: "3. Quando surge um desafio, você prefere:", d: "Liderar a solução", i: "Persuadir os outros", s: "Apoiar a equipe", c: "Analisar riscos" },
        { q: "4. Como seus amigos descreveriam você?", d: "Assertivo e direto", i: "Comunicativo e alegre", s: "Paciente e calmo", c: "Cuidadoso e lógico" },
        { q: "5. Em uma conversa, você tende a ser:", d: "Objetivo no ponto", i: "Expressivo e animado", s: "Bom ouvinte", c: "Questionador e técnico" },
        { q: "6. Seu estilo de trabalho ideal é:", d: "Independente e veloz", i: "Sociável e criativo", s: "Leal e constante", c: "Disciplinado e perfeito" },
        { q: "7. O que mais te motiva?", d: "Vencer e competir", i: "Ser reconhecido", s: "Ajudar e conciliar", c: "Seguir normas exatas" },
        { q: "8. Como você reage a mudanças?", d: "Aceito e comando", i: "Fico otimista", s: "Prefiro a rotina", c: "Analiso os impactos" },
        { q: "9. Em uma reunião de equipe, você:", d: "Diz o que fazer", i: "Anima o grupo", s: "Busca o consenso", c: "Anota os detalhes" },
        { q: "10. Qual sua maior característica?", d: "Coragem para arriscar", i: "Poder de inspirar", s: "Paciência sob pressão", c: "Raciocínio lógico" },
        { q: "11. Diante de um erro, você:", d: "Conserta e segue", i: "Motiva a equipe", s: "Preocupa-se com o clima", c: "Busca a causa técnica" },
        { q: "12. Você se sente confortável sendo:", d: "O líder da situação", i: "O centro das atenções", s: "Quem traz segurança", c: "Alguém criterioso" },
        { q: "13. Sua decisão é baseada em:", d: "Rapidez e instinto", i: "Intuição e emoção", s: "Harmonia do grupo", c: "Dados e evidências" },
        { q: "14. No ambiente escolar, você gosta de:", d: "Mandar e arriscar", i: "Elogios e interagir", s: "Rotina definida", c: "Seguir padrões" },
        { q: "15. Com prazos apertados, você:", d: "Fica focado e entrega", i: "Pede ajuda e motiva", s: "Mantém a calma", c: "Trabalha com método" },
        { q: "16. Seu maior valor é:", d: "A determinação", i: "O entusiasmo", s: "A solidariedade", c: "A precisão" }
    ];

    const sapArea = document.getElementById('sap-area');
    sapData.forEach((item, i) => {
        let rs = '';
        for(let v=1; v<=5; v++) rs += `<label class="rating-item"><input type="radio" name="sap${i}" value="${v}"><span>${v}</span></label>`;
        sapArea.innerHTML += `<div class="question-card"><b>${item.t}</b><div class="evidencias">${item.e}</div><div class="rating-row">${rs}</div></div>`;
    });

    const discArea = document.getElementById('disc-area');
    discData.forEach((item, i) => {
        discArea.innerHTML += `<div class="question-card">
            <span class="pergunta-texto">${item.q}</span>
            <label class="disc-opt"><input type="radio" name="d${i}" value="D"> ${item.d}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="I"> ${item.i}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="S"> ${item.s}</label>
            <label class="disc-opt"><input type="radio" name="d${i}" value="C"> ${item.c}</label>
        </div>`;
    });

    function proximo(s) { 
        if(s===1 && !document.getElementById('nomeAluno').value) return alert("Jorge diz: Nome obrigatório!");
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
        if(s===1) { document.getElementById('titulo-etapa').innerText = "1. Competências (SAP)"; document.getElementById('texto-instrucao').innerText = "Avalie-se de 1 a 5"; }
        if(s===2) { document.getElementById('titulo-etapa').innerText = "2. Perfil DISC"; document.getElementById('texto-instrucao').innerText = "Escolha a frase que melhor te descreve"; }
    }

    function enviar() {
        const nome = document.getElementById('nomeAluno').value;
        let sapRes = {};
        sapData.forEach((_, i) => {
            const r = document.querySelector(`input[name="sap${i}"]:checked`);
            sapRes['q'+i] = r ? r.value : "0";
        });
        let dRes = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=0; i<16; i++) {
            const r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) dRes[r.value]++;
        }
        db.ref('resultados_testes').push({ aluno: nome, sap: sapRes, disc: dRes, link_id: linkID, data: new Date().toLocaleString() })
        .then(() => db.ref('links_usados/' + linkID).set(true))
        .then(() => {
            alert("Sucesso, Jorge! Dados enviados e link bloqueado.");
            location.reload(); 
        });
    }
</script>
</body>
</html>
