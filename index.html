<!DOCTYPE html>
<html lang="pt-BR" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Avaliação Jorge - SAP & DISC</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; --destaque: #00d2d3; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-top: 0; }
        .descricao-sap { font-size: 14px; color: #bbb; font-style: italic; margin-bottom: 10px; display: block; }
        .evidencias { background: rgba(0,210,211,0.1); padding: 12px; border-radius: 8px; font-size: 13px; color: var(--destaque); margin-bottom: 15px; border-left: 4px solid var(--destaque); }
        .pergunta-bloco { background: #1e272e; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .opcoes-grade { display: flex; justify-content: space-around; margin-top: 15px; }
        .radio-circulo { cursor: pointer; text-align: center; }
        .radio-circulo input { display: none; }
        .checkmark { width: 45px; height: 45px; border: 2px solid #4b4b4b; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-weight: bold; }
        .radio-circulo input:checked + .checkmark { background: var(--primaria); border-color: var(--primaria); transform: scale(1.1); box-shadow: 0 0 10px var(--primaria); }
        .label-disc { display: block; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin: 8px 0; border: 1px solid #444; cursor: pointer; }
        .btn-enviar { width: 100%; padding: 20px; background: var(--primaria); color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #4b4b4b; background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <div class="sessao">
        <h2>1. IDENTIFICAÇÃO</h2>
        <input type="text" id="nome-aluno" placeholder="NOME COMPLETO DO JOVEM">
    </div>

    <div class="sessao">
        <h2>2. AUTOAVALIAÇÃO SAP</h2>
        <div id="container-sap"></div>
    </div>

    <div class="sessao">
        <h2>3. PERFIL COMPORTAMENTAL (DISC)</h2>
        <div id="container-disc"></div>
    </div>

    <button class="btn-enviar" onclick="enviar()">ENVIAR AVALIAÇÃO AO JORGE</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const dadosSap = [
        { 
            t: "1. SER PROTAGONISTA", 
            d: "É o jovem que se conscientiza de sua identidade, se reconhece como ser atuante, autônomo, solidário, participativo e construtor do seu destino.",
            e: "Sou visto como referência; Respeito e me faço respeitar; Construo meu Projeto de Vida; Reconheço potenciais e talentos."
        },
        { 
            t: "2. SER RESPONSÁVEL E COMPROMETIDO", 
            d: "Comprometer-se com suas atividades, ser pontual, assíduo, cumprir exigências e respeitar normas de convivência.",
            e: "Cumpro tarefas e prazos; Sou pontual; Cuido da higiene pessoal; Cumpro as regras do contrato de convivência."
        },
        { 
            t: "3. COMPREENDER CONTEXTOS E COMUNICAR-SE", 
            d: "Capacidade de compreender o outro dentro de uma realidade histórica e cultural, expressando-se de forma clara e objetiva.",
            e: "Postura coerente; Percebo o humor do outro; Faço críticas construtivas; Sei esperar minha vez de falar."
        },
        { 
            t: "4. SER DEMOCRÁTICO, ÉTICO E CIDADÃO", 
            d: "Possui valores que respeitam as diferenças e direitos humanos. É honesto, confiável e conhece seus direitos e deveres.",
            e: "Sou honesto e ético; Assumo meus erros; Respeito opiniões diferentes; Tenho atitudes coerentes com o discurso."
        },
        { 
            t: "5. RESOLVER SITUAÇÕES-PROBLEMA", 
            d: "Capacidade de enfrentar problemas, pensando em alternativas e tomando decisões. Reconhece erros e reconsidera pontos de vista.",
            e: "Evito fofocas ao resolver problemas; Penso antes de agir; Não me envergonho de pedir ajuda; Sei lidar com meus sentimentos."
        },
        { 
            t: "6. TRABALHAR E PRODUZIR EM EQUIPE", 
            d: "Capacidade de colaborar e partilhar, colocando os interesses do grupo acima dos pessoais e respeitando as contribuições de todos.",
            e: "Penso no bem-estar do grupo; Busco o consenso; Aceito críticas e sugestões; Transmito informações com fidelidade."
        },
        { 
            t: "7. APRENDER A APRENDER", 
            d: "Habilidade para buscar e construir novos conhecimentos, colocando em prática o que aprendeu em todos os espaços.",
            e: "Comprometimento com a vida escolar; Tiro lições de situações boas ou ruins; Sou curioso e indago; Aplico o aprendizado no dia a dia."
        }
    ];

    const sapContainer = document.getElementById('container-sap');
    dadosSap.forEach((s, i) => {
        sapContainer.innerHTML += `
            <div class="pergunta-bloco">
                <span style="font-weight:bold; color:var(--primaria); font-size:18px;">${s.t}</span>
                <p class="descricao-sap">${s.d}</p>
                <div class="evidencias"><strong>Evidências:</strong> ${s.e}</div>
                <div class="opcoes-grade">
                    ${[1,2,3,4,5].map(n => `<label class="radio-circulo"><input type="radio" name="sap${i}" value="${n}"><div class="checkmark">${n}</div></label>`).join('')}
                </div>
            </div>`;
    });

    const discPerguntas = [
        { q: "1. No dia a dia, você é mais:", o: ["Decidido e competitivo", "Comunicativo e entusiasmado", "Paciente e bom ouvinte", "Organizado e perfeccionista"], v: ["D","I","S","C"] },
        { q: "2. Em um grupo, você prefere:", o: ["Assumir o comando", "Interagir com todos", "Apoiar os colegas", "Seguir os processos"], v: ["D","I","S","C"] },
        // ... (Adicione as outras 14 perguntas aqui seguindo o mesmo padrão)
    ];

    const discContainer = document.getElementById('container-disc');
    discPerguntas.forEach((d, i) => {
        let opts = d.o.map((o, idx) => `<label class="label-disc"><input type="radio" name="disc${i}" value="${d.v[idx]}"> ${o}</label>`).join('');
        discContainer.innerHTML += `<div class="pergunta-bloco"><span class="titulo-p">${d.q}</span>${opts}</div>`;
    });

    function enviar() {
        const nome = document.getElementById('nome-aluno').value;
        if (!nome) return alert("Por favor, preencha o nome!");
        let dados = { aluno: nome, data: new Date().toLocaleString(), sap: {}, disc: {D:0, I:0, S:0, C:0} };
        for (let i = 0; i < 7; i++) {
            const r = document.querySelector(`input[name="sap${i}"]:checked`);
            if (!r) return alert("Responda todas as SAPs!");
            dados.sap[`item${i}`] = parseInt(r.value);
        }
        db.ref('resultados_testes').push(dados).then(() => { alert("Enviado com sucesso!"); location.reload(); });
    }
</script>
</body>
</html>
