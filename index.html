<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assessment Completo - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; }
        body { background: var(--grafite); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .sessao { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; margin-top: 0; text-transform: uppercase; font-size: 20px;}
        
        /* DISC Grid */
        .bloco-disc { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #4b4b4b; }
        .linha-header { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; font-weight: bold; color: var(--primaria); text-align: center; margin-bottom: 10px; }
        .linha-disc { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid #3d444b; }
        .col-radio { display: flex; justify-content: center; }
        input[type="radio"] { width: 25px; height: 25px; accent-color: var(--primaria); cursor: pointer; }
        
        /* SAP */
        .pergunta-sap { margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .opcoes-sap { display: flex; justify-content: space-around; margin-top: 15px; }
        .opcoes-sap label { text-align: center; cursor: pointer; font-weight: bold; }

        .btn-enviar { width: 100%; padding: 25px; background: var(--primaria); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input[type="text"] { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid #4b4b4b; background: #000; color: #fff; font-size: 18px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="sessao">
        <h2>1. IDENTIFICAÇÃO</h2>
        <input type="text" id="nome-aluno" placeholder="NOME COMPLETO DO ALUNO">
    </div>

    <div class="sessao">
        <h2>2. AVALIAÇÃO SOCIOEMOCIONAL (SAP)</h2>
        <p>Como você se avalia hoje (1 é pouco, 5 é muito)?</p>
        <div id="sap-content">
            </div>
    </div>

    <div class="sessao">
        <h2>3. TESTE COMPORTAMENTAL (DISC)</h2>
        <p>Escolha um adjetivo que <b>MAIS (+)</b> tem a ver com você e um que <b>MENOS (-)</b> tem.</p>
        <div id="disc-content">
            </div>
    </div>

    <button class="btn-enviar" onclick="enviarDados()">SALVAR E FINALIZAR AVALIAÇÃO</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 28 Blocos de Adjetivos Reais
    const blocos = [
        {id:1, o:[{t:"Entusiasta",v:"I"},{t:"Ousado",v:"D"},{t:"Diplomata",v:"C"},{t:"Satisfeito",v:"S"}]},
        {id:2, o:[{t:"Cauteloso",v:"C"},{t:"Decidido",v:"D"},{t:"Receptivo",v:"S"},{t:"Amigável",v:"I"}]},
        {id:3, o:[{t:"Amigável",v:"S"},{t:"Preciso",v:"C"},{t:"Franco",v:"D"},{t:"Eloquente",v:"I"}]},
        {id:4, o:[{t:"Moderado",v:"S"},{t:"Controlado",v:"C"},{t:"Persuasivo",v:"I"},{t:"Decisivo",v:"D"}]},
        {id:5, o:[{t:"Atrevido",v:"D"},{t:"Convivial",v:"I"},{t:"Paciente",v:"S"},{t:"Estrito",v:"C"}]},
        {id:6, o:[{t:"Persuasivo",v:"I"},{t:"Gentil",v:"S"},{t:"Humilde",v:"C"},{t:"Original",v:"D"}]},
        {id:7, o:[{t:"Expressivo",v:"I"},{t:"Consciencioso",v:"C"},{t:"Dominante",v:"D"},{t:"Responsivo",v:"S"}]},
        {id:8, o:[{t:"Pioneiro",v:"D"},{t:"Influente",v:"I"},{t:"Submisso",v:"S"},{t:"Cauteloso",v:"C"}]},
        {id:9, o:[{t:"Força de Vontade",v:"D"},{t:"Otimista",v:"I"},{t:"Acomodado",v:"S"},{t:"Exato",v:"C"}]},
        {id:10, o:[{t:"Estimulante",v:"I"},{t:"Complacente",v:"S"},{t:"Medroso",v:"C"},{t:"Independente",v:"D"}]},
        {id:11, o:[{t:"Vigoroso",v:"D"},{t:"Afável",v:"I"},{t:"Discreto",v:"C"},{t:"Resignado",v:"S"}]},
        {id:12, o:[{t:"Tagarela",v:"I"},{t:"Convencional",v:"C"},{t:"Ousado",v:"D"},{t:"Calmo",v:"S"}]},
        {id:13, o:[{t:"Competitivo",v:"D"},{t:"Alegre",v:"I"},{t:"Agradável",v:"S"},{t:"Retraído",v:"C"}]},
        {id:14, o:[{t:"Satisfeito",v:"S"},{t:"Obediente",v:"C"},{t:"Firme",v:"D"},{t:"Brincalhão",v:"I"}]},
        {id:15, o:[{t:"Confiante",v:"I"},{t:"Simpático",v:"S"},{t:"Tolerante",v:"C"},{t:"Agressivo",v:"D"}]},
        {id:16, o:[{t:"Adaptável",v:"S"},{t:"Sistemático",v:"C"},{t:"Vigoroso",v:"D"},{t:"Sociável",v:"I"}]},
        {id:17, o:[{t:"Vibrante",v:"I"},{t:"Analítico",v:"C"},{t:"Afirmativo",v:"D"},{t:"Sereno",v:"S"}]},
        {id:18, o:[{t:"Inovador",v:"D"},{t:"Popular",v:"I"},{t:"Amável",v:"S"},{t:"Perfeccionista",v:"C"}]},
        {id:19, o:[{t:"Argumentador",v:"D"},{t:"Gentil",v:"S"},{t:"Metódico",v:"C"},{t:"Inspirador",v:"I"}]},
        {id:20, o:[{t:"Destemido",v:"D"},{t:"Espirituoso",v:"I"},{t:"Pacificador",v:"S"},{t:"Sensível",v:"C"}]},
        {id:21, o:[{t:"Polido",v:"C"},{t:"Audaz",v:"D"},{t:"Refinado",v:"I"},{t:"Generoso",v:"S"}]},
        {id:22, o:[{t:"Incentivador",v:"I"},{t:"Prudente",v:"C"},{t:"Determinado",v:"D"},{t:"Prestativo",v:"S"}]},
        {id:23, o:[{t:"Autossuficiente",v:"D"},{t:"Dócil",v:"S"},{t:"Idealista",v:"I"},{t:"Objetivo",v:"C"}]},
        {id:24, o:[{t:"Direto",v:"D"},{t:"Entusiasta",v:"I"},{t:"Tolerante",v:"S"},{t:"Convencional",v:"C"}]},
        {id:25, o:[{t:"Persistente",v:"D"},{t:"Colaborativo",v:"S"},{t:"Cauteloso",v:"C"},{t:"Divertido",v:"I"}]},
        {id:26, o:[{t:"Exigente",v:"D"},{t:"Conciliador",v:"S"},{t:"Animado",v:"I"},{t:"Preciso",v:"C"}]},
        {id:27, o:[{t:"Inquieto",v:"D"},{t:"Amigável",v:"I"},{t:"Estável",v:"S"},{t:"Cuidadoso",v:"C"}]},
        {id:28, o:[{t:"Respeitoso",v:"C"},{t:"Pioneiro",v:"D"},{t:"Otimista",v:"I"},{t:"Atencioso",v:"S"}]}
    ];

    const saps = ["Protagonismo", "Responsabilidade", "C. Ambiental", "C. Social", "Saúde/Higiene", "T. Equipe", "D. Aprender"];

    function iniciar() {
        // Render SAP
        const sapDiv = document.getElementById('sap-content');
        saps.forEach((s, i) => {
            sapDiv.innerHTML += `<div class="pergunta-sap"><label>${s}</label><div class="opcoes-sap">${[1,2,3,4,5].map(v => `<label><input type="radio" name="sap${i}" value="${v}"><br>${v}</label>`).join('')}</div></div>`;
        });

        // Render DISC
        const discDiv = document.getElementById('disc-content');
        blocos.forEach(b => {
            let h = `<div class="bloco-disc"><div class="linha-header"><span>GRUPO ${b.id}</span><span>MAIS (+)</span><span>MENOS (-)</span></div>`;
            b.o.forEach(op => {
                h += `<div class="linha-disc"><span>${op.t}</span><div class="col-radio"><input type="radio" name="m${b.id}" value="${op.v}"></div><div class="col-radio"><input type="radio" name="l${b.id}" value="${op.v}"></div></div>`;
            });
            discDiv.innerHTML += h + `</div>`;
        });
    }

    function enviarDados() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Jorge, o aluno esqueceu o nome!");

        let sapFinal = [];
        for(let i=0; i<7; i++) {
            let r = document.querySelector(`input[name="sap${i}"]:checked`);
            if(!r) return alert("Falta responder o SAP!");
            sapFinal.push(parseInt(r.value));
        }

        let d=0, i=0, s=0, c=0;
        for(let j=1; j<=28; j++) {
            let m = document.querySelector(`input[name="m${j}"]:checked`);
            let l = document.querySelector(`input[name="l${j}"]:checked`);
            if(!m || !l) return alert("Falta o bloco "+j+" do DISC!");
            if(m.value === l.value) return alert("No bloco "+j+" o MAIS e o MENOS não podem ser iguais!");
            
            if(m.value==='D') d++; if(m.value==='I') i++; if(m.value==='S') s++; if(m.value==='C') c++;
            if(l.value==='D') d--; if(l.value==='I') i--; if(l.value==='S') s--; if(l.value==='C') c--;
        }

        db.ref('resultados_testes').push({ aluno: nome, sap: sapFinal, disc: {D:d, I:i, S:s, C:c}, data: new Date().toLocaleString() })
        .then(() => { alert("Tudo certo, Jorge! Dados enviados."); location.reload(); });
    }
    iniciar();
</script>
</body>
</html>
