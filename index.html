<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; }
        .step { display: none; }
        .active { display: block; }
        h3 { color: var(--accent); text-align: center; font-size: 1.2em; margin-bottom: 20px; }
        .question-card { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--blue); }
        .label-title { font-weight: bold; display: block; margin-bottom: 5px; color: #fff; }
        .evidencias { font-size: 0.8em; color: var(--blue); background: #0f172a; padding: 8px; border-radius: 5px; margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Estilo dos Botões de Nota 1-5 */
        .rating-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .rating-option { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .rating-option input { margin-bottom: 5px; width: 18px; height: 18px; cursor: pointer; accent-color: var(--blue); }
        .rating-option span { font-size: 0.8em; color: #94a3b8; }

        .disc-opt { display: block; background: #0f172a; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; cursor: pointer; font-size: 0.9em; }
        .btn { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="step0" class="step active">
        <h3>Diagnóstico Socioemocional 2026</h3>
        <input type="text" id="nomeAluno" placeholder="Digite seu Nome Completo">
        <button class="btn" onclick="next(1)">INICIAR 1ª ETAPA: SAP</button>
    </div>

    <div id="step1" class="step">
        <h3>1. Competências (SAP)</h3>
        <div id="sap-area"></div>
        <button class="btn" onclick="next(2)">PRÓXIMA ETAPA: DISC</button>
    </div>

    <div id="step2" class="step">
        <h3>2. Perfil Comportamental (DISC)</h3>
        <div id="disc-area"></div>
        <button class="btn" style="background:#22c55e;" onclick="enviar()">FINALIZAR E ENVIAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const sapData = [
        { t: "PROTAGONISMO", e: "Iniciativa; Busca de soluções; Proatividade." },
        { t: "RESPONSABILIDADE", e: "Cumprimento de prazos; Assumir erros; Organização." },
        { t: "COMUNICAÇÃO", e: "Clareza ao falar; Saber ouvir; Expressão de ideias." },
        { t: "ÉTICA", e: "Respeito às regras; Honestidade; Valores morais." },
        { t: "RESOLUÇÃO DE PROBLEMAS", e: "Pensamento rápido; Criatividade; Resiliência." },
        { t: "TRABALHO EM EQUIPE", e: "Colaboração; Coletividade; Aceitar críticas." },
        { t: "APRENDER A APRENDER", e: "Curiosidade; Autoestudo; Lições aprendidas." }
    ];

    const sapArea = document.getElementById('sap-area');
    sapData.forEach((item, i) => {
        let optionsHtml = '';
        for(let n=1; n<=5; n++) {
            optionsHtml += `
                <label class="rating-option">
                    <input type="radio" name="sap${i}" value="${n}" ${n===3 ? 'checked' : ''}>
                    <span>${n}</span>
                </label>`;
        }
        sapArea.innerHTML += `
            <div class="question-card">
                <span class="label-title">${i+1}. ${item.t}</span>
                <div class="evidencias"><b>Evidências:</b> ${item.e}</div>
                <div class="rating-container">${optionsHtml}</div>
            </div>`;
    });

    const discArea = document.getElementById('disc-area');
    for(let i=1; i<=16; i++) {
        discArea.innerHTML += `
            <div class="question-card">
                <span class="label-title">Questão ${i}</span>
                <label class="disc-opt"><input type="radio" name="d${i}" value="D"> Liderar e decidir</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="I"> Animar e interagir</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="S"> Ouvir e apoiar</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="C"> Analisar e organizar</label>
            </div>`;
    }

    function next(s) {
        if(s === 1 && !document.getElementById('nomeAluno').value) return alert("Digite seu nome!");
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    function enviar() {
        const nome = document.getElementById('nomeAluno').value;
        let sapRes = {};
        sapData.forEach((_, i) => { 
            const sel = document.querySelector(`input[name="sap${i}"]:checked`);
            sapRes['q'+i] = sel ? sel.value : "3"; 
        });

        let discRes = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=1; i<=16; i++) {
            let r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) discRes[r.value]++;
        }

        db.ref('resultados_testes').push({
            aluno: nome, sap: sapRes, disc: discRes, data: new Date().toLocaleDateString()
        }).then(() => {
            alert("Jorge, dados salvos com sucesso!");
            location.reload();
        });
    }
</script>
</body>
</html>
