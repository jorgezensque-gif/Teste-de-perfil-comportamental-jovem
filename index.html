<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --destaque: #00d2d3; --card: #2d3436; --erro: #eb4d4b; }
        body { background: var(--grafite); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .controles-topo { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-print { background: #0984e3; }
        .btn-zero { background: var(--erro); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #4b4b4b; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--destaque); margin-bottom: 15px; outline: none; }
        h2 { color: var(--primaria); font-size: 1.1rem; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        @media print { .controles-topo, select { display: none; } .card { border: none; box-shadow: none; } }
    </style>
</head>
<body>

    <div class="controles-topo">
        <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR RELATÓRIOS</button>
        <button class="btn btn-zero" onclick="zerarBanco()">🗑️ ZERAR BASE DE DADOS</button>
    </div>

    <div class="grid">
        <div class="card">
            <h2>MÉDIA DA TURMA (SAP)</h2>
            <canvas id="chartColetivo"></canvas>
        </div>

        <div class="card">
            <h2>SELECIONAR ALUNO</h2>
            <select id="selectAluno" onchange="atualizarIndividual()">
                <option value="">Carregando...</option>
            </select>
            <p style="font-size: 12px; color: #aaa; text-align: center;">Os gráficos individual e DISC aparecerão abaixo.</p>
        </div>

        <div class="card">
            <h2>AUTOAVALIAÇÃO SAP (INDIVIDUAL)</h2>
            <canvas id="chartIndividual"></canvas>
        </div>

        <div class="card">
            <h2>PERFIL COMPORTAMENTAL (DISC)</h2>
            <canvas id="chartDisc"></canvas>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // NOMES COMPLETOS PARA OS GRÁFICOS
    const labelsSAP = [
        "1. Ser Protagonista",
        "2. Ser Responsável",
        "3. Comunicar-se",
        "4. Ser Ético/Cidadão",
        "5. Resolver Problemas",
        "6. Trabalho em Equipe",
        "7. Aprender a Aprender"
    ];

    let dadosGerais = {};
    let gCol, gInd, gDisc;

    db.ref('resultados_testes').on('value', snapshot => {
        dadosGerais = snapshot.val() || {};
        const lista = Object.values(dadosGerais);
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="">Escolha um aluno...</option>';
        
        for (let id in dadosGerais) {
            let opt = document.createElement('option');
            opt.value = id; opt.text = dadosGerais[id].aluno;
            sel.add(opt);
        }

        if (lista.length > 0) {
            let medias = [0,0,0,0,0,0,0];
            lista.forEach(d => { if(d.sap) for(let i=0; i<7; i++) medias[i] += (d.sap[`item${i}`] || 0); });
            medias = medias.map(m => (m / lista.length).toFixed(1));
            
            if(gCol) gCol.destroy();
            gCol = new Chart(document.getElementById('chartColetivo'), {
                type: 'bar',
                data: {
                    labels: labelsSAP,
                    datasets: [{ label: 'Média da Turma', data: medias, backgroundColor: '#00d2d3' }]
                },
                options: { scales: { y: { min: 0, max: 5 } } }
            });
        }
    });

    function atualizarIndividual() {
        const id = document.getElementById('selectAluno').value;
        if(!id || !dadosGerais[id]) return;
        const aluno = dadosGerais[id];

        // RADAR SAP
        const notasSap = [];
        for(let i=0; i<7; i++) notasSap.push(aluno.sap[`item${i}`] || 0);
        if(gInd) gInd.destroy();
        gInd = new Chart(document.getElementById('chartIndividual'), {
            type: 'radar',
            data: {
                labels: labelsSAP,
                datasets: [{ label: aluno.aluno, data: notasSap, borderColor: '#ff5c3a', backgroundColor: 'rgba(255,92,58,0.2)', borderWidth: 3 }]
            },
            options: { scales: { r: { min: 0, max: 5, ticks: { display: false } } } }
        });

        // BARRAS DISC
        const d = aluno.disc || {D:0, I:0, S:0, C:0};
        if(gDisc) gDisc.destroy();
        gDisc = new Chart(document.getElementById('chartDisc'), {
            type: 'bar',
            data: {
                labels: ['D - Dominância', 'I - Influência', 'S - Estabilidade', 'C - Conformidade'],
                datasets: [{
                    data: [d.D, d.I, d.S, d.C],
                    backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db']
                }]
            },
            options: { 
                indexAxis: 'y', 
                plugins: { legend: { display: false } },
                scales: { x: { min: 0, max: 16 } }
            }
        });
    }

    function zerarBanco() {
        if (confirm("Jorge, deseja apagar todos os dados?")) {
            db.ref('resultados_testes').remove().then(() => location.reload());
        }
    }
</script>
</body>
</html>
