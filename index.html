<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assessment DISC Profissional - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .bloco { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        .linha { display: grid; grid-template-columns: 1fr 80px 80px; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .header-grid { font-weight: bold; color: var(--primaria); font-size: 12px; margin-bottom: 10px; }
        .btn-enviar { width: 100%; padding: 20px; background: var(--primaria); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <h2>Avaliação DISC - 28 Blocos</h2>
    <input type="text" id="nome-aluno" placeholder="Nome Completo">
    <div id="quiz"></div>
    <button class="btn-enviar" onclick="enviar()">GERAR MEU PERFIL</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Matriz simplificada dos 28 blocos (Adjetivos Reais)
    const perguntas = [
        {id:1, opts:[{t:"Entusiasta",v:"I"},{t:"Ousado",v:"D"},{t:"Diplomata",v:"C"},{t:"Satisfeito",v:"S"}]},
        {id:2, opts:[{t:"Cauteloso",v:"C"},{t:"Decidido",v:"D"},{t:"Receptivo",v:"S"},{t:"Amigável",v:"I"}]},
        // ... (Repetir para os 28 blocos conforme a lógica D,I,S,C)
    ];
    // Para teste rápido, usei 5 blocos aqui. Expanda para 28 seguindo o mesmo padrão abaixo:
    for(let i=3; i<=28; i++) { perguntas.push({id:i, opts:[{t:"Opção D",v:"D"},{t:"Opção I",v:"I"},{t:"Opção S",v:"S"},{t:"Opção C",v:"C"}]}); }

    function render() {
        const quiz = document.getElementById('quiz');
        perguntas.forEach(b => {
            let html = `<div class="bloco"><div class="linha header-grid"><span>Bloco ${b.id}</span><span>MAIS</span><span>MENOS</span></div>`;
            b.opts.forEach(o => {
                html += `<div class="linha"><span>${o.t}</span>
                    <input type="radio" name="m${b.id}" value="${o.v}">
                    <input type="radio" name="l${b.id}" value="${o.v}"></div>`;
            });
            quiz.innerHTML += html + `</div>`;
        });
    }

    function enviar() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Digite seu nome");
        
        let d=0, i=0, s=0, c=0;
        for(let j=1; j<=28; j++) {
            const m = document.querySelector(`input[name="m${j}"]:checked`);
            const l = document.querySelector(`input[name="l${j}"]:checked`);
            if(!m || !l) return alert("Responda todos os campos do bloco " + j);
            if(m.value === 'D') d++; if(m.value === 'I') i++; if(m.value === 'S') s++; if(m.value === 'C') c++;
            if(l.value === 'D') d--; if(l.value === 'I') i--; if(l.value === 'S') s--; if(l.value === 'C') c--;
        }

        db.ref('resultados_testes').push({
            aluno: nome,
            disc: {D:d, I:i, S:s, C:c},
            sap: [4,4,4,4,4,4,4],
            data: new Date().toLocaleString()
        }).then(() => { alert("Enviado!"); location.reload(); });
    }
    render();
</script>
</body>
</html>
