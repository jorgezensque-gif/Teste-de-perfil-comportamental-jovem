<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Comportamental DISC - Modelo Profissional</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --bg: #f5f6fa; --texto: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primaria); text-align: center; margin-bottom: 10px; }
        p.instrucao { text-align: center; font-size: 14px; color: #636e72; margin-bottom: 30px; }
        
        .bloco-pergunta { margin-bottom: 30px; padding: 20px; border: 1px solid #dfe6e9; border-radius: 10px; background: #fafafa; }
        .pergunta-titulo { font-weight: bold; margin-bottom: 15px; display: block; color: #2d3436; border-bottom: 2px solid var(--primaria); width: fit-content; }
        
        .opcao { display: grid; grid-template-columns: 1fr auto; align-items: center; margin-bottom: 10px; padding: 10px; background: white; border-radius: 8px; border: 1px solid #eee; }
        .opcao:hover { border-color: var(--primaria); }
        
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; cursor: pointer; }
        
        .btn-enviar { width: 100%; padding: 15px; background: var(--primaria); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-enviar:hover { background: #e64a2e; }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Avaliação de Estilo Comportamental</h2>
    <p class="instrucao">Para cada bloco abaixo, selecione a opção que <b>MAIS</b> se identifica com você e a que <b>MENOS</b> se identifica.</p>

    <input type="text" id="nome-aluno" placeholder="Digite seu nome completo">

    <div id="questoes-container"></div>

    <button class="btn-enviar" onclick="enviarTeste()">FINALIZAR E GERAR RESULTADOS</button>
</div>

<script>
    // Configuração Firebase (Sua base atual)
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Modelo Profissional: 10 blocos de 4 adjetivos cada (D, I, S, C)
    const perguntas = [
        { id: 1, opcoes: [
            { t: "Decidido, focado em resultados", v: "E" },
            { t: "Entusiasta, comunicativo", v: "C" },
            { t: "Paciente, bom ouvinte", v: "P" },
            { t: "Preciso, analítico", v: "A" }
        ]},
        { id: 2, opcoes: [
            { t: "Auto-confiante, pioneiro", v: "E" },
            { t: "Persuasivo, otimista", v: "C" },
            { t: "Gentil, acomodado", v: "P" },
            { t: "Lógico, sistemático", v: "A" }
        ]},
        { id: 3, opcoes: [
            { t: "Ousado, competitivo", v: "E" },
            { t: "Sociável, alegre", v: "C" },
            { t: "Leal, constante", v: "P" },
            { t: "Perfeccionista, cuidadoso", v: "A" }
        ]},
        { id: 4, opcoes: [
            { t: "Direto, aceita desafios", v: "E" },
            { t: "Inspirador, influenciador", v: "C" },
            { t: "Amigável, cooperativo", v: "P" },
            { t: "Disciplinado, diplomático", v: "A" }
        ]}
        // Adicione mais blocos conforme necessário seguindo o padrão
    ];

    function renderQuestões() {
        const container = document.getElementById('questoes-container');
        perguntas.forEach((q, i) => {
            let html = `<div class="bloco-pergunta"><span class="pergunta-titulo">GRUPO ${q.id}</span>`;
            q.opcoes.forEach((opt, j) => {
                html += `
                    <div class="opcao">
                        <span>${opt.t}</span>
                        <select class="respostas" data-tipo="${opt.v}">
                            <option value="0">Neutro</option>
                            <option value="2">MAIS se parece</option>
                            <option value="-1">MENOS se parece</option>
                        </select>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    function enviarTeste() {
        const nome = document.getElementById('nome-aluno').value;
        if(!nome) return alert("Por favor, digite seu nome.");

        let pontos = { E: 0, C: 0, P: 0, A: 0 };
        const selects = document.querySelectorAll('.respostas');

        selects.forEach(s => {
            const tipo = s.getAttribute('data-tipo');
            pontos[tipo] += parseInt(s.value);
        });

        // Simulação SAP (Pode ser integrado a outras perguntas)
        const sapMock = Array.from({length: 7}, () => Math.floor(Math.random() * 5) + 1);

        db.ref('resultados_testes').push({
            aluno: nome,
            disc: pontos,
            sap: sapMock,
            data: new Date().toLocaleDateString()
        }).then(() => {
            alert("Teste enviado com sucesso!");
            window.location.reload();
        });
    }

    renderQuestões();
</script>
</body>
</html>
