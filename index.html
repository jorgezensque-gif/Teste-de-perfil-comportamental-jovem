<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Perfil - Sistema Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0d10; color: white; font-family: sans-serif; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #1e272e; padding: 25px; border-radius: 15px; border: 1px solid #ff5c3a; }
        h2 { color: #ff5c3a; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; }
        label { display: block; margin-top: 15px; color: #00d2d3; font-weight: bold; }
        .footer { text-align: center; font-size: 12px; margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📝 AVALIAÇÃO DIAGNÓSTICA</h2>
        <p style="text-align: center;">Preencha os dados abaixo com atenção.</p>
        
        <label>Seu Nome Completo:</label>
        <input type="text" id="nomeAluno" placeholder="Digite seu nome aqui...">
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <h3>AUTOAVALIAÇÃO SAP</h3>
        <p style="font-size: 13px;">Dê uma nota de 1 a 5 para você mesmo:</p>
        
        <label>1. Protagonismo e Iniciativa:</label>
        <input type="number" id="sap0" min="1" max="5" value="3">
        
        <label>2. Comunicação Assertiva:</label>
        <input type="number" id="sap1" min="1" max="5" value="3">

        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <h3>PERFIL DISC</h3>
        <p style="font-size: 13px;">Insira a pontuação do seu teste (0 a 40):</p>
        
        <label>Dominância (D):</label>
        <input type="number" id="discD" value="10">
        
        <label>Influência (I):</label>
        <input type="number" id="discI" value="10">

        <button onclick="enviar()">ENVIAR MINHA AVALIAÇÃO</button>
        <div class="footer">Responsável: Jorge</div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU BANCO
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function enviar() {
            const nome = document.getElementById('nomeAluno').value;
            if(!nome) return alert("Por favor, Jorge solicita que você digite seu nome!");

            const dados = {
                aluno: nome,
                sap: {
                    item0: parseInt(document.getElementById('sap0').value),
                    item1: parseInt(document.getElementById('sap1').value),
                    item2: 3, item3: 3, item4: 3, item5: 3, item6: 3 
                },
                disc: {
                    D: parseInt(document.getElementById('discD').value),
                    I: parseInt(document.getElementById('discI').value),
                    S: 10, C: 10 
                },
                data: new Date().toLocaleDateString()
            };

            db.ref('resultados_testes').push(dados).then(() => {
                alert("Sucesso! Seus dados foram enviados para o painel do Jorge.");
                location.reload();
            });
        }
    </script>
</body>
</html>
