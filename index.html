<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioemocional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 650px; margin: auto; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .step { display: none; }
        .active { display: block; }
        h3 { color: var(--accent); text-align: center; font-size: 1.2em; margin-bottom: 20px; text-transform: uppercase; }
        .question-card { background: #334155; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--blue); }
        .label-title { font-weight: bold; display: block; margin-bottom: 10px; color: #fff; font-size: 1.1em; border-bottom: 1px solid #475569; padding-bottom: 5px; }
        .evidencias-box { font-size: 0.85em; color: var(--blue); background: #0f172a; padding: 12px; border-radius: 5px; margin-bottom: 15px; line-height: 1.5; }
        .evidencias-box b { color: var(--accent); display: block; margin-bottom: 5px; }
        
        /* Layout de Botões de Rádio 1-5 */
        .rating-group { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; background: #2d3748; border-radius: 8px; margin-top: 10px; }
        .rating-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .rating-item input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--blue); margin-bottom: 8px; }
        .rating-item span { font-size: 0.9em; font-weight: bold; color: #cbd5e1; }

        input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #0f172a; color: white; box-sizing: border-box; font-size: 1.1em; margin-bottom: 15px; }
        .disc-opt { display: block; background: #0f172a; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; cursor: pointer; transition: 0.3s; }
        .disc-opt:hover { border-color: var(--blue); background: #1e293b; }
        .btn { width: 100%; padding: 20px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .btn:hover { background: #0ea5e9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div id="step0" class="step active">
        <h3>Diagnóstico Socioemocional 2026</h3>
        <p style="text-align:center; color:#94a3b8; font-size:0.9em;">Preencha a avaliação de forma sincera e espontânea.</p>
        <input type="text" id="nomeAluno" placeholder="Nome Completo do Aluno">
        <button class="btn" onclick="next(1)">INICIAR 1ª ETAPA: SAP</button>
    </div>

    <div id="step1" class="step">
        <h3>1. Competências (SAP)</h3>
        <div id="sap-area"></div>
        <button class="btn" onclick="next(2)">PRÓXIMA ETAPA: DISC</button>
    </div>

    <div id="step2" class="step">
        <h3>2. Perfil Comportamental (DISC)</h3>
        <div id="disc-area"></div>
        <button class="btn" style="background:#22c55e;" onclick="enviar()">FINALIZAR E ENVIAR RESULTADOS</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Dados baseados no documento oficial [cite: 9, 27, 46, 65, 82, 98, 117]
    const sapData = [
        { 
            t: "SER PROTAGONISTA", 
            e: "• Sou referência construtiva no grupo; • Respeito e me faço respeitar; • Construo meu Projeto de Vida; • Reconheço potenciais e pontos a melhorar; • Ofereço ajuda nos ambientes que frequento." // [cite: 13, 14, 15, 16, 17]
        },
        { 
            t: "SER RESPONSÁVEL E COMPROMETIDO", 
            e: "• Cumpro tarefas e prazos; • Sou pontual e assíduo (justifico faltas); • Reconheço a importância do trabalho; • Cuido da apresentação pessoal; • Cumpro regras do contrato de convivência." // [cite: 32, 33, 34, 35]
        },
        { 
            t: "COMPREENDER CONTEXTOS E COMUNICAR-SE", 
            e: "• Postura coerente com os ambientes; • Respeito o estado de humor do outro; • Faço críticas construtivas e elogios; • Expresso pensamentos de forma ordenada; • Sei ouvir e esperar minha vez de falar." // [cite: 51, 52, 53, 55]
        },
        { 
            t: "SER DEMOCRÁTICO, ÉTICO E CIDADÃO", 
            e: "• Sou honesto e ético nas relações; • Assumo meus erros; • Respeito opiniões diferentes e mudo meu ponto de vista se necessário; • Atitude coerente com o discurso; • Conheço meus direitos e deveres." // [cite: 69, 70, 71, 72, 73]
        },
        { 
            t: "RESOLVER SITUAÇÕES-PROBLEMA", 
            e: "• Resolvo conflitos diretamente sem fofocas; • Penso antes de agir e assumo escolhas; • Não tenho vergonha de pedir ajuda; • Enfrento desafios e incertezas; • Reconheço e lido com meus sentimentos." // [cite: 86, 87, 88, 89, 90]
        },
        { 
            t: "TRABALHAR E PRODUZIR EM EQUIPE", 
            e: "• Penso no bem-estar do grupo; • Busco o consenso nas atividades coletivas; • Aceito o desafio de trabalhar em grupo; • Recebo críticas e sugestões sobre meu comportamento; • Transmito informações com fidelidade." // [cite: 103, 104, 105, 106, 107]
        },
        { 
            t: "APRENDER A APRENDER", 
            e: "• Aprofundo conhecimentos dos conteúdos; • Comprometimento com a vida escolar; • Tiro lições de situações boas ou ruins; • Sou curioso, questiono e argumento; • Utilizo os conteúdos aprendidos no dia a dia." // [cite: 121, 122, 123, 124, 125]
        }
    ];

    const sapArea = document.getElementById('sap-area');
    sapData.forEach((item, i) => {
        let ratings = '';
        for(let v=1; v<=5; v++) {
            ratings += `
                <label class="rating-item">
                    <input type="radio" name="sap${i}" value="${v}" ${v===3 ? 'checked' : ''}>
                    <span>${v}</span>
                </label>`;
        }
        sapArea.innerHTML += `
            <div class="question-card">
                <span class="label-title">${i+1}. ${item.t}</span>
                <div class="evidencias-box"><b>Evidências Norteadoras:</b>${item.e}</div>
                <div class="rating-group">${ratings}</div>
            </div>`;
    });

    const discArea = document.getElementById('disc-area');
    for(let i=1; i<=16; i++) {
        discArea.innerHTML += `
            <div class="question-card">
                <span class="label-title">Questão ${i}</span>
                <label class="disc-opt"><input type="radio" name="d${i}" value="D"> Prefiro liderar, decidir e focar em resultados.</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="I"> Prefiro animar, interagir e influenciar pessoas.</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="S"> Prefiro ouvir, apoiar e manter a estabilidade.</label>
                <label class="disc-opt"><input type="radio" name="d${i}" value="C"> Prefiro analisar, organizar e seguir processos.</label>
            </div>`;
    }

    function next(s) {
        if(s === 1 && !document.getElementById('nomeAluno').value) return alert("Por favor, digite seu nome completo para iniciar.");
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
        window.scrollTo(0,0);
    }

    function enviar() {
        const nome = document.getElementById('nomeAluno').value;
        let sapRes = {};
        sapData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="sap${i}"]:checked`);
            sapRes['q'+i] = selected ? selected.value : "3";
        });

        let discRes = { D: 0, I: 0, S: 0, C: 0 };
        for(let i=1; i<=16; i++) {
            let r = document.querySelector(`input[name="d${i}"]:checked`);
            if(r) discRes[r.value]++;
        }

        db.ref('resultados_testes').push({
            aluno: nome, sap: sapRes, disc: discRes, data: new Date().toLocaleDateString()
        }).then(() => {
            alert("Diagnóstico concluído! Os dados foram enviados para o Gestor Jorge.");
            location.reload();
        });
    }
</script>
</body>
</html>
