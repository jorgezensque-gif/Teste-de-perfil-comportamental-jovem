<!DOCTYPE html>
<html lang="pt-BR" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Avaliação Jorge - SAP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --card: #2d3436; --texto: #ffffff; --destaque: #00d2d3; }
        body { background: var(--grafite); color: var(--texto); font-family: sans-serif; padding: 20px; }
        .sessao { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #666; background: #000; color: #fff; }
        .item-sap { background: #1e272e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .opcoes { display: flex; justify-content: space-around; margin-top: 10px; }
        .btn { width: 100%; padding: 15px; background: var(--primaria); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div style="max-width:600px; margin:auto;">
        <div class="sessao">
            <h2>NOME DO ALUNO</h2>
            <input type="text" id="nome-aluno" placeholder="Digite aqui...">
        </div>
        <div class="sessao">
            <h2>COMPETÊNCIAS SAP</h2>
            <div id="lista-sap"></div>
        </div>
        <button class="btn" onclick="enviar()">ENVIAR PARA O JORGE</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const saps = ["Protagonismo", "Responsabilidade", "Ambiental", "Social", "Saúde", "Equipe", "Aprender"];
        const cont = document.getElementById('lista-sap');
        
        saps.forEach((s, i) => {
            cont.innerHTML += `<div class="item-sap"><strong>${s}</strong><div class="opcoes">
                ${[1,2,3,4,5].map(n => `<label><input type="radio" name="sap${i}" value="${n}"> ${n}</label>`).join('')}
            </div></div>`;
        });

        function enviar() {
            const nome = document.getElementById('nome-aluno').value;
            if(!nome) return alert("Nome vazio!");
            let notas = {};
            for(let i=0; i<7; i++) {
                const r = document.querySelector(`input[name="sap${i}"]:checked`);
                if(!r) return alert("Responda tudo!");
                notas[`item${i}`] = parseInt(r.value);
            }
            db.ref('resultados_testes').push({ aluno: nome, sap: notas, data: new Date().toLocaleString() })
              .then(() => { alert("Enviado!"); location.reload(); });
        }
    </script>
</body>
</html>
