<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Diagnóstico Socioemocional - Jorge Zensque</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; padding: 20px; }
        .form-container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2980b9; text-align: center; }
        fieldset { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; color: #d35400; padding: 0 10px; }
        .pergunta { margin-bottom: 15px; }
        input[type="range"] { width: 100%; }
        .input-text { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Diagnóstico Socioemocional - Jorge Zensque</h2>
    <input type="text" id="nomeAluno" class="input-text" placeholder="Seu Nome Completo" required>

    <form id="testeForm">
        <fieldset>
            <legend>📊 Perfil e Competências</legend>
            <p>Responda de 1 (Nada) a 5 (Totalmente)</p>
            <div class="pergunta">
                <label>Tomo iniciativa em projetos? (SAP)</label>
                <input type="range" name="sap1" min="1" max="5" value="3">
            </div>
            <div class="pergunta">
                <label>Gosto de liderar e decidir? (Dominância)</label>
                <input type="range" name="discD" min="1" max="7" value="4">
            </div>
        </fieldset>

        <fieldset>
            <legend>🧠 Autopercepção (Dunning-Kruger)</legend>
            <div class="pergunta"><label>1. Acredito que me expresso muito bem e raramente preciso melhorar.</label><input type="range" name="dk1" min="1" max="5" value="3"></div>
            <div class="pergunta"><label>2. Percebo que às vezes não sou tão claro e preciso ouvir mais.</label><input type="range" name="dk2" min="1" max="5" value="3"></div>
            <div class="pergunta"><label>3. Acho que sou ótimo em liderar e trabalhar com os outros.</label><input type="range" name="dk3" min="1" max="5" value="3"></div>
            <div class="pergunta"><label>4. Já percebi que nem sempre consigo colaborar como deveria.</label><input type="range" name="dk4" min="1" max="5" value="3"></div>
            <div class="pergunta"><label>5. Reconheço que cometo erros e estou aprendendo.</label><input type="range" name="dk5" min="1" max="5" value="3"></div>
        </fieldset>

        <button type="button" onclick="enviarDados()">ENVIAR TESTE</button>
    </form>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function enviarDados() {
        const nome = document.getElementById('nomeAluno').value;
        if(!nome) return alert("Jorge diz: Digite o nome!");

        const form = document.getElementById('testeForm');
        const fd = new FormData(form);

        // Lógica de Cálculo Dunning-Kruger
        let pConfianca = (parseInt(fd.get('dk1')) + parseInt(fd.get('dk3'))) / 2;
        let pHumildade = (parseInt(fd.get('dk2')) + parseInt(fd.get('dk4')) + parseInt(fd.get('dk5'))) / 3;
        let dk_grafico = [1, pConfianca, 6 - pConfianca, pHumildade, (pConfianca + pHumildade)/2];

        const dados = {
            aluno: nome,
            sap: { p: fd.get('sap1'), r: 3, c: 4, e: 5, pb: 3, eq: 4, a: 5 }, // Mapeie todos aqui
            disc: { D: fd.get('discD'), I: 5, S: 4, C: 3 }, // Mapeie todos aqui
            dk_grafico: dk_grafico,
            data: new Date().toLocaleDateString()
        };

        db.ref('resultados_testes').push(dados).then(() => {
            alert("Enviado com sucesso!");
            location.reload();
        });
    }
</script>
</body>
</html>
