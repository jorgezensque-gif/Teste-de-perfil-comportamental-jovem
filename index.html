<!DOCTYPE html>
<html lang="pt-BR" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Painel Jorge - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #1e272e; --destaque: #00d2d3; --card: #2d3436; }
        body { background: var(--grafite); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 950px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase; font-size: 16px; }
        select { width: 100%; padding: 15px; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--destaque); font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body class="notranslate" translate="no">

    <div class="grid">
        <div class="card">
            <h2>SELECIONAR ALUNO</h2>
            <select id="selectAluno" onchange="atualizarIndividual()">
                <option value="">Carregando lista...</option>
            </select>
        </div>

        <div class="card">
            <h2>AUTOAVALIAÇÃO SAP (INDIVIDUAL)</h2>
            <div style="height: 550px; position: relative;">
                <canvas id="chartIndividual"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>PERFIL COMPORTAMENTAL (DISC)</h2>
            <canvas id="chartDisc"></canvas>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ESTA LISTA SUBSTITUI DEFINITIVAMENTE OS NOMES ANTIGOS
    const nomesSAP_Oficiais = [
        "1. SER PROTAGONISTA",
        "2. SER RESPONSÁVEL E COMPROMETIDO",
        "3. COMPREENDER CONTEXTOS E COMUNICAR-SE",
        "4. SER DEMOCRÁTICO, ÉTICO E CIDADÃO",
        "5. RESOLVER SITUAÇÕES-PROBLEMA",
        "6. TRABALHAR E PRODUZIR EM EQUIPE",
        "7. APRENDER A APRENDER"
    ];

    let dadosGerais = {};
    let gInd, gDisc;

    db.ref('resultados_testes').on('value', snapshot => {
        dadosGerais = snapshot.val() || {};
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="">Escolha o aluno aqui...</option>';
        for (let id in dadosGerais) {
            let opt = document.createElement('option');
            opt.value = id; opt.text = dadosGerais[id].aluno;
            sel.add(opt);
        }
    });

    function atualizarIndividual() {
        const id = document.getElementById('selectAluno').value;
        if(!id) return;
        const aluno = dadosGerais[id];

        const notasSap = [];
        for(let i=0; i<7; i++) {
            // Garante que pegamos os dados na ordem certa, ignorando nomes antigos do banco
            notasSap.push(aluno.sap[`item${i}`] || 0);
        }
        
        if(gInd) gInd.destroy();
        gInd = new Chart(document.getElementById('chartIndividual'), {
            type: 'bar',
            data: {
                labels: nomesSAP_Oficiais, // USA A LISTA NOVA AQUI
                datasets: [{ 
                    label: 'Nota Individual', 
                    data: notasSap, 
                    backgroundColor: '#00d2d3',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                maintainAspectRatio: false,
                scales: { 
                    x: { min: 0, max: 5, grid: { color: '#444' } },
                    y: { 
                        ticks: { 
                            color: 'white', 
                            font: { size: 12, weight: 'bold' }
                        } 
                    } 
                },
                plugins: { legend: { display: false } }
            }
        });

        const d = aluno.disc || {D:0, I:0, S:0, C:0};
        if(gDisc) gDisc.destroy();
        gDisc = new Chart(document.getElementById('chartDisc'), {
            type: 'bar',
            data: {
                labels: ['D - DOMINÂNCIA', 'I - INFLUÊNCIA', 'S - ESTABILIDADE', 'C - CONFORMIDADE'],
                datasets: [{ data: [d.D, d.I, d.S, d.C], backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db'] }]
            },
            options: { 
                indexAxis: 'y', 
                scales: { x: { min: 0, max: 16 } },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
