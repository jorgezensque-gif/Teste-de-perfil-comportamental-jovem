<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Jorge - Gestão 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; }
        h2 { color: var(--accent); text-align: center; }
        .box { background: #334155; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--blue); }
        input { width: 70%; padding: 12px; border-radius: 8px; border: none; font-size: 1em; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gen { background: var(--blue); color: white; }
        .btn-wa { background: var(--green); color: white; text-decoration: none; display: inline-block; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #475569; text-align: left; }
        .link-display { font-family: monospace; font-size: 0.8em; color: var(--blue); word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel de Controle - Jorge</h2>

    <div class="box">
        <h3>🔗 Gerar Novo Link de Teste</h3>
        <p>Digite o nome do aluno para gerar o link exclusivo:</p>
        <input type="text" id="nomeLink" placeholder="Ex: João Silva">
        <button class="btn btn-gen" onclick="gerarLink()">GERAR LINK</button>
        
        <div id="resultadoLink" style="margin-top:20px; display:none;">
            <p><strong>Link Gerado:</strong></p>
            <div class="link-display" id="urlGerada"></div>
            <a href="#" id="waLink" target="_blank" class="btn btn-wa">📲 Enviar para o WhatsApp</a>
        </div>
    </div>

    <div class="box">
        <h3>📊 Resultados Recebidos</h3>
        <div id="tabela-resultados">Carregando dados...</div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO JORGE
    const SEU_NUMERO = "5563984011065"; 
    const URL_BASE = "https://jorgezensque-gif.github.io/Teste-de-perfil-comportamental-jovem/index.html";

    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // FUNÇÃO PARA GERAR O LINK
    function gerarLink() {
        const nome = document.getElementById('nomeLink').value;
        if(!nome) return alert("Digite o nome do aluno!");

        // Criar um ID limpo (sem espaços)
        const idUnico = nome.toLowerCase().replace(/\s+/g, '_') + '_' + Math.floor(Math.random() * 1000);
        const linkCompleto = `${URL_BASE}?id=${idUnico}`;

        // Mostrar na tela
        document.getElementById('resultadoLink').style.display = 'block';
        document.getElementById('urlGerada').innerText = linkCompleto;

        // Configurar link do WhatsApp
        const mensagem = encodeURIComponent(`Olá ${nome}! Aqui é o Jorge. Segue seu link exclusivo para o Diagnóstico Socioemocional: ${linkCompleto}`);
        document.getElementById('waLink').href = `https://api.whatsapp.com/send?phone=&text=${mensagem}`;
        // Nota: Deixei o phone vazio para você escolher o contato na hora no WhatsApp
    }

    // CARREGAR RESULTADOS (Resumo)
    db.ref('resultados_testes').on('value', snap => {
        let html = '<table><tr><th>Aluno</th><th>Data</th><th>DISC</th></tr>';
        snap.forEach(item => {
            const d = item.val();
            const perfil = Object.keys(d.disc).reduce((a, b) => d.disc[a] > d.disc[b] ? a : b);
            html += `<tr>
                <td>${d.aluno}</td>
                <td>${d.data}</td>
                <td><strong>${perfil}</strong></td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('tabela-resultados').innerHTML = html;
    });
</script>

</body>
</html>
