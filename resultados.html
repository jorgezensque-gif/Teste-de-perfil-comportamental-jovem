<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Gestor 2026 - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #22c55e; --red: #ef4444; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1300px; margin: auto; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .header-gestor { border-top: 4px solid var(--red); }
        .top-bar { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        input, select { padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1em; }
        input { flex-grow: 1; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-link { background: var(--blue); }
        .btn-excel { background: var(--green); }
        .btn-zerar { background: var(--red); }
        .grid-graficos { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card-grafico { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; min-height: 400px; }
        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1em; text-transform: uppercase; text-align: center; }
        canvas { width: 100% !important; height: 320px !important; }
        #resultadoLink { margin-top: 10px; color: var(--blue); font-family: monospace; font-size: 0.9em; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h3>🔗 Gerador de Acessos Individuais (WhatsApp)</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="nomeLink" placeholder="Nome Completo do Aluno">
            <button class="btn btn-link" onclick="gerarLink()">GERAR E DISPARAR LINK</button>
        </div>
        <div id="resultadoLink"></div>
    </div>

    <div class="box header-gestor">
        <h2 style="color: var(--red); margin:0;">GESTOR RESPONSÁVEL: JORGE | PAINEL 2026</h2>
        <div class="top-bar">
            <select id="selectAluno" onchange="atualizarPainel()" style="flex-grow: 1;">
                <option value="geral">📊 VISÃO GERAL DA TURMA</option>
            </select>
            <button class="btn btn-excel" onclick="exportarExcel()">📊 EXCEL COMPLETO</button>
            <button class="btn btn-zerar" onclick="zerarSistema()">🗑️ ZERAR SISTEMA</button>
        </div>
    </div>

    <div class="grid-graficos">
        <div class="card-grafico"><h3>1. Autoavaliação SAP (Radar)</h3><canvas id="chartRadarSAP"></canvas></div>
        <div class="card-grafico"><h3>2. Perfil DISC (Dominante)</h3><canvas id="chartBarDISC"></canvas></div>
        <div class="card-grafico"><h3>3. Competências SAP (Barras)</h3><canvas id="chartBarSAP"></canvas></div>
        <div class="card-grafico"><h3>4. Equilíbrio: DISC vs Média SAP</h3><canvas id="chartCorrelacao"></canvas></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let todosResultados = [];
    let charts = {};
    const MEU_WHATSAPP = "5563984011065";

    // FUNÇÃO GERAR LINK (SEU TELEFONE ESTÁ AQUI)
    function gerarLink() {
        const nome = document.getElementById('nomeLink').value;
        if(!nome) return alert("Jorge, digite o nome!");
        const id = nome.toLowerCase().replace(/\s+/g, '_') + '_' + Math.floor(Math.random()*1000);
        const link = `https://jorgezensque-gif.github.io/Teste-de-perfil-comportamental-jovem/index.html?id=${id}`;
        document.getElementById('resultadoLink').innerText = "LINK: " + link;
        
        const msg = encodeURIComponent(`Olá, Jorge aqui! Segue seu link individual para o Diagnóstico Socioemocional 2026: ${link}`);
        window.open(`https://wa.me/${MEU_WHATSAPP}?text=${msg}`, '_blank');
    }

        charts.discBar = new Chart(document.getElementById('chartBarDISC'), { type: 'bar', data: { labels: ['D', 'I', 'S', 'C'], datasets: [{ label: 'Pontuação', data: [0,0,0,0], backgroundColor: ['#ef4444', '#facc15', '#22c55e', '#3b82f6'] }] } });
        charts.sapBar = new Chart(document.getElementById('chartBarSAP'), { type: 'bar', data: { labels: ['P', 'R', 'C', 'E', 'Pr', 'Eq', 'A'], datasets: [{ label: 'Score', data: [0,0,0,0,0,0,0], backgroundColor: '#38bdf8' }] }, options: { scales: { y: { min: 0, max: 5 } } } });
        charts.correlacao = new Chart(document.getElementById('chartCorrelacao'), { type: 'bar', data: { labels: ['D', 'I', 'S', 'C'], datasets: [{ label: 'Média SAP por Perfil', data: [0,0,0,0], backgroundColor: ['#ef4444', '#facc15', '#22c55e', '#3b82f6'] }] }, options: { scales: { y: { min: 0, max: 5 } } } });
    }

    db.ref('resultados_testes').on('value', snap => {
        todosResultados = [];
        const select = document.getElementById('selectAluno');
        select.innerHTML = '<option value="geral">📊 VISÃO GERAL DA TURMA</option>';
        snap.forEach(child => {
            const data = child.val(); data.key = child.key;
            todosResultados.push(data);
            select.innerHTML += `<option value="${data.key}">${data.aluno}</option>`;
        });
        atualizarPainel();
    });

            });
