<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PAINEL JORGE 2026 - FIXO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --red: #ef4444; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: auto; }
        
        .box { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .header { border-top: 4px solid var(--red); }

        /* GRADE DOS GRÁFICOS - FIXAÇÃO DE ALTURA */
        .grid-graficos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 20px; 
        }

        .card-grafico { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            height: 380px; /* ALTURA TRAVADA PARA NÃO ALONGAR */
            display: flex;
            flex-direction: column;
        }

        .chart-wrapper { 
            flex-grow: 1; 
            position: relative; 
            width: 100%; 
            height: 300px; /* LIMITADOR REAL DO CANVAS */
        }

        h3 { color: var(--accent); text-align: center; font-size: 1rem; margin-bottom: 10px; text-transform: uppercase; }
        
        /* BOTÕES E INPUTS */
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; flex-grow: 1; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div class="box header">
        <h2 style="margin:0; color:var(--red);">GESTOR: JORGE | PAINEL 2026</h2>
        <div class="controls">
            <select id="selectAluno" onchange="atualizarPainel()">
                <option value="geral">📊 VISÃO GERAL DA TURMA</option>
            </select>
            <button class="btn btn-red" onclick="zerarSistema()">ZERAR</button>
        </div>
    </div>

    <div class="box">
        <h3>🔗 Gerar Link</h3>
        <div class="controls">
            <input type="text" id="nomeLink" placeholder="Nome do aluno">
            <button class="btn btn-blue" onclick="gerarLink()">GERAR LINK</button>
        </div>
    </div>

    <div class="grid-graficos">
        <div class="card-grafico"><h3>1. SAP (Radar)</h3><div class="chart-wrapper"><canvas id="c1"></canvas></div></div>
        <div class="card-grafico"><h3>2. DISC (Dominante)</h3><div class="chart-wrapper"><canvas id="c2"></canvas></div></div>
        <div class="card-grafico"><h3>3. Competências SAP</h3><div class="chart-wrapper"><canvas id="c3"></canvas></div></div>
        <div class="card-grafico"><h3>4. Equilíbrio DISC/SAP</h3><div class="chart-wrapper"><canvas id="c4"></canvas></div></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dados = [];
    let charts = {};

    function init() {
        const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
        
        charts.radar = new Chart(document.getElementById('c1'), { type: 'radar', data: { labels: ['P', 'R', 'C', 'E', 'Pr', 'Eq', 'A'], datasets: [{ data: [0,0,0,0,0,0,0], borderColor: '#38bdf8' }] }, options: opt });
        charts.disc = new Chart(document.getElementById('c2'), { type: 'bar', data: { labels: ['D','I','S','C'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#ef4444','#facc15','#22c55e','#3b82f6'] }] }, options: opt });
        charts.sap = new Chart(document.getElementById('c3'), { type: 'bar', data: { labels: ['P','R','C','E','Pr','Eq','A'], datasets: [{ data: [0,0,0,0,0,0,0], backgroundColor: '#38bdf8' }] }, options: opt });
        charts.corr = new Chart(document.getElementById('c4'), { type: 'bar', data: { labels: ['D','I','S','C'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#ef4444','#facc15','#22c55e','#3b82f6'] }] }, options: opt });
    }

    db.ref('resultados_testes').on('value', snap => {
        dados = [];
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="geral">📊 VISÃO GERAL DA TURMA</option>';
        snap.forEach(c => {
            let d = c.val(); d.key = c.key; dados.push(d);
            sel.innerHTML += `<option value="${d.key}">${d.aluno.toUpperCase()}</option>`;
        });
        atualizarPainel();
    });

    function atualizarPainel() {
        const id = document.getElementById('selectAluno').value;
        let s = [0,0,0,0,0,0,0], d = [0,0,0,0];

        if (id === 'geral' && dados.length > 0) {
            dados.forEach(r => {
                for(let i=0; i<7; i++) s[i] += parseInt(r.sap['q'+i] || 0);
                d[0] += r.disc.D; d[1] += r.disc.I; d[2] += r.disc.S; d[3] += r.disc.C;
            });
            s = s.map(v => v / dados.length);
        } else {
            const r = dados.find(x => x.key === id);
            if(r) {
                for(let i=0; i<7; i++) s[i] = parseInt(r.sap['q'+i]);
                d = [r.disc.D, r.disc.I, r.disc.S, r.disc.C];
            }
        }
        charts.radar.data.datasets[0].data = s;
        charts.sap.data.datasets[0].data = s;
        charts.disc.data.datasets[0].data = d;
        Object.values(charts).forEach(c => c.update());
    }

    function gerarLink() {
        const n = document.getElementById('nomeLink').value;
        const url = `https://jorgezensque-gif.github.io/Teste-de-perfil-comportamental-jovem/index.html?id=${Date.now()}`;
        window.open(`https://wa.me/5563984011065?text=Link: ${url}`, '_blank');
    }

    function zerarSistema() { if(confirm("Zerar tudo?")) db.ref('resultados_testes').remove(); }

    window.onload = init;
</script>
</body>
</html>
