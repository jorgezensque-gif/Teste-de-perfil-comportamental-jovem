<!DOCTYPE html>
<html lang="pt-BR" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Painel Jorge - Visibilidade Alta</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #000000; --destaque: #00d2d3; --card: #1e272e; }
        body { background: var(--grafite); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #4b4b4b; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; text-transform: uppercase; font-size: 18px; }
        select { width: 100%; padding: 15px; border-radius: 8px; background: #2d3436; color: #fff; border: 1px solid var(--destaque); font-size: 16px; font-weight: bold; margin-bottom: 20px; }
        canvas { max-height: 500px; }
    </style>
</head>
<body class="notranslate" translate="no">

    <div class="grid">
        <div class="card">
            <h2>SELECIONAR ALUNO</h2>
            <select id="selectAluno" onchange="atualizarIndividual()">
                <option value="">Clique aqui para escolher...</option>
            </select>
        </div>

        <div class="card">
            <h2>AUTOAVALIAÇÃO SAP (COMPETÊNCIAS)</h2>
            <div style="height: 450px;">
                <canvas id="chartIndividual"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>PERFIL COMPORTAMENTAL (DISC)</h2>
            <div style="height: 300px;">
                <canvas id="chartDisc"></canvas>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const nomesSAP_Oficiais = [
        "1. SER PROTAGONISTA",
        "2. SER RESPONSÁVEL E COMPROMETIDO",
        "3. COMPREENDER CONTEXTOS E COMUNICAR-SE",
        "4. SER DEMOCRÁTICO, ÉTICO E CIDADÃO",
        "5. RESOLVER SITUAÇÕES-PROBLEMA",
        "6. TRABALHAR E PRODUZIR EM EQUIPE",
        "7. APRENDER A APRENDER"
    ];

    let dadosGerais = {};
    let gInd, gDisc;

    db.ref('resultados_testes').on('value', snapshot => {
        dadosGerais = snapshot.val() || {};
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="">Escolha um aluno na lista...</option>';
        for (let id in dadosGerais) {
            let opt = document.createElement('option');
            opt.value = id; opt.text = dadosGerais[id].aluno;
            sel.add(opt);
        }
    });

    function atualizarIndividual() {
        const id = document.getElementById('selectAluno').value;
        if(!id) return;
        const aluno = dadosGerais[id];
        const notasSap = [];
        for(let i=0; i<7; i++) notasSap.push(aluno.sap[`item${i}`] || 0);
        
        // CONFIGURAÇÃO DOS TEXTOS DOS GRÁFICOS
        const configTexto = {
            color: '#FFFFFF', // BRANCO PURO
            font: { size: 13, weight: 'bold' }
        };

        if(gInd) gInd.destroy();
        gInd = new Chart(document.getElementById('chartIndividual'), {
            type: 'bar',
            data: {
                labels: nomesSAP_Oficiais,
                datasets: [{ data: notasSap, backgroundColor: '#00d2d3', borderRadius: 5 }]
            },
            options: {
                indexAxis: 'y',
                maintainAspectRatio: false,
                scales: { 
                    x: { min: 0, max: 5, ticks: configTexto, grid: { color: '#444' } },
                    y: { ticks: configTexto } 
                },
                plugins: { legend: { display: false } }
            }
        });

        const d = aluno.disc || {D:0, I:0, S:0, C:0};
        if(gDisc) gDisc.destroy();
        gDisc = new Chart(document.getElementById('chartDisc'), {
            type: 'bar',
            data: {
                labels: ['D - DOMINÂNCIA', 'I - INFLUÊNCIA', 'S - ESTABILIDADE', 'C - CONFORMIDADE'],
                datasets: [{ data: [d.D, d.I, d.S, d.C], backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db'] }]
            },
            options: { 
                indexAxis: 'y',
                maintainAspectRatio: false,
                scales: { 
                    x: { min: 0, max: 16, ticks: configTexto, grid: { color: '#444' } },
                    y: { ticks: configTexto }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
