<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão 360°</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1e272e; color: white; font-family: sans-serif; padding: 0; margin: 0; }
        
        /* MENU DE NAVEGAÇÃO */
        .navbar { background: #000; padding: 15px; display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid #f39c12; }
        .nav-link { color: #f39c12; text-decoration: none; font-weight: bold; padding: 8px 15px; border: 1px solid #f39c12; border-radius: 5px; transition: 0.3s; }
        .nav-link:hover { background: #f39c12; color: #000; }
        .active { background: #f39c12; color: #000; }

        .card { background: #2d3436; padding: 20px; border-radius: 10px; border: 1px solid #444; max-width: 950px; margin: 20px auto; }
        h2 { color: #f39c12; text-align: center; }
        select { width: 100%; padding: 15px; background: #000; color: #00d2d3; border: 2px solid #00d2d3; border-radius: 8px; font-size: 18px; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; min-width: 160px; }
        
        .btn-pdi { background: #a29bfe; color: #2d3436; }
        .btn-excel { background: #55efc4; color: #2d3436; }
        .btn-azul { background: #3498db; color: white; border: 2px solid #fff; }
        .btn-zerar { background: #ff7675; color: white; }

        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-box { background: #353b48; padding: 15px; border-radius: 8px; height: 350px; }
        @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">📝 TESTE (ALUNO)</a>
        <a href="resultados.html" class="nav-link active">👤 INDIVIDUAL (BOTÃO AZUL)</a>
        <a href="dashboard_geral.html" class="nav-link">📊 VISÃO DA TURMA</a>
    </div>

    <div class="card">
        <h2>GESTOR RESPONSÁVEL: JORGE | SISTEMA 2026</h2>
        
        <select id="selectAluno" onchange="atualizarDashboard()">
            <option value="">Escolha um aluno para analisar...</option>
        </select>

        <div class="btn-group">
            <button class="btn-pdi">✨ GERAR PDI COM GEMINI</button>
            <button class="btn-excel">📊 EXCEL COMPLETO</button>
            <button class="btn-azul" onclick="irParaRelatorio()">📄 RELATÓRIO INDIVIDUAL</button>
            <button class="btn-zerar">🗑️ ZERAR SISTEMA</button>
        </div>

        <div class="charts">
            <div class="chart-box"><canvas id="chartRadar"></canvas></div>
            <div class="chart-box"><canvas id="chartDisc"></canvas></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let dadosGerais = {};
        let graf1, graf2;

        db.ref('resultados_testes').on('value', snapshot => {
            dadosGerais = snapshot.val();
            const combo = document.getElementById('selectAluno');
            combo.innerHTML = '<option value="">Escolha um aluno para analisar...</option>';
            for(let id in dadosGerais) {
                let opt = document.createElement('option');
                opt.value = id;
                opt.text = dadosGerais[id].aluno;
                combo.add(opt);
            }
        });

        function atualizarDashboard() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            const aluno = dadosGerais[id];
            
            if(graf1) graf1.destroy();
            if(graf2) graf2.destroy();

            // RADAR SAP
            graf1 = new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: ["Protagonismo", "Responsabilidade", "Comunicação", "Ética", "Problemas", "Equipe", "Aprender"],
                    datasets: [{ data: Object.values(aluno.sap), backgroundColor: 'rgba(0, 210, 211, 0.2)', borderColor: '#00d2d3' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 5 } }, plugins: { legend: { display: false } } }
            });

            // DISC BARRAS
            graf2 = new Chart(document.getElementById('chartDisc'), {
                type: 'bar',
                data: {
                    labels: ['Dominância', 'Influência', 'Estabilidade', 'Conformidade'],
                    datasets: [{ data: [aluno.disc.D, aluno.disc.I, aluno.disc.S, aluno.disc.C], backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4', '#74b9ff'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 7 } }, plugins: { legend: { display: false } } }
            });
        }

        function irParaRelatorio() {
            const id = document.getElementById('selectAluno').value;
            if(!id) { alert("Jorge, selecione um aluno primeiro!"); return; }
            window.open(`relatorio.html?id=${id}`, '_blank');
        }
    </script>
</body>
</html>
