<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão 360°</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1e272e; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .navbar { background: #000; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #f39c12; }
        .nav-link { color: #f39c12; text-decoration: none; font-weight: bold; font-size: 13px; padding: 5px 10px; border: 1px solid #f39c12; border-radius: 4px; }
        .active { background: #f39c12; color: #000; }
        .container { max-width: 1200px; margin: 5px auto; padding: 10px; }
        h2 { color: #f39c12; text-align: center; font-size: 18px; margin: 10px 0; }
        select { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #00d2d3; border-radius: 5px; margin-bottom: 10px; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; font-size: 11px; text-transform: uppercase; }
        .btn-azul { background: #3498db; color: white; }
        .btn-excel { background: #1dd1a1; color: #000; }
        .btn-zerar { background: #ee5253; color: white; }

        .dashboard-grid { display: flex; justify-content: space-between; gap: 10px; }
        .chart-card { background: #2d3436; border-radius: 8px; padding: 10px; width: 32.5%; height: 300px; border: 1px solid #444; }
        .canvas-container { position: relative; height: 230px; width: 100%; }
        h4 { text-align: center; margin: 0 0 10px 0; font-size: 12px; color: #f39c12; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">📝 TESTE</a>
        <a href="resultados.html" class="nav-link active">👤 INDIVIDUAL</a>
        <a href="dashboard_geral.html" class="nav-link">📊 TURMA</a>
    </div>

    <div class="container">
        <h2>GESTOR: JORGE | CONTROLE DE RESULTADOS</h2>
        
        <select id="selectAluno" onchange="atualizarDashboard()">
            <option value="">Selecione um Aluno...</option>
        </select>
        
        <div class="btn-group">
            <button class="btn-azul" onclick="irParaRelatorio()">📄 RELATÓRIO PDF</button>
            <button class="btn-excel" onclick="exportarExcel()">📊 EXPORTAR EXCEL</button>
            <button class="btn-zerar" onclick="zerarSistema()">🗑️ ZERAR SISTEMA</button>
        </div>

        <div class="dashboard-grid">
            <div class="chart-card">
                <h4>EQUILÍBRIO SAP (RADAR)</h4>
                <div class="canvas-container"><canvas id="chartRadar"></canvas></div>
            </div>
            <div class="chart-card">
                <h4>PERFIL COMPORTAMENTAL DISC</h4>
                <div class="canvas-container"><canvas id="chartDisc"></canvas></div>
            </div>
            <div class="chart-card">
                <h4>DUNNING-KRUGER</h4>
                <div class="canvas-container"><canvas id="chartDunning"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let dadosGerais = {};
        let graficos = {};

        db.ref('resultados_testes').on('value', snap => {
            dadosGerais = snap.val();
            const combo = document.getElementById('selectAluno');
            combo.innerHTML = '<option value="">Selecione um Aluno...</option>';
            if(!dadosGerais) return;
            for(let id in dadosGerais) {
                let opt = document.createElement('option');
                opt.value = id; opt.text = dadosGerais[id].aluno;
                combo.add(opt);
            }
        });

        function atualizarDashboard() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            const a = dadosGerais[id];
            
            if(graficos.r) graficos.r.destroy();
            if(graficos.d) graficos.d.destroy();
            if(graficos.dk) graficos.dk.destroy();

            const optBase = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

            // RADAR SAP
            graficos.r = new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: ["Prot.", "Resp.", "Com.", "Ética", "Prob.", "Equip.", "Apr."],
                    datasets: [{ data: Object.values(a.sap), backgroundColor: 'rgba(0, 210, 211, 0.2)', borderColor: '#00d2d3' }]
                },
                options: { ...optBase, scales: { r: { min: 0, max: 5, ticks: { display: false } } } }
            });

            // DISC COM NOMES COMPLETOS
            graficos.d = new Chart(document.getElementById('chartDisc'), {
                type: 'bar',
                data: {
                    labels: ['Dominância (D)', 'Influência (I)', 'Estabilidade (E)', 'Conformidade (C)'],
                    datasets: [{ data: [a.disc.D, a.disc.I, a.disc.S, a.disc.C], backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4', '#74b9ff'] }]
                },
                options: { ...optBase, scales: { y: { min: 0, max: 7 } } }
            });

            // DUNNING-KRUGER
            graficos.dk = new Chart(document.getElementById('chartDunning'), {
                type: 'line',
                data: {
                    labels: ['Início', 'Pico', 'Vale', 'Subida', 'Platô'],
                    datasets: [{ data: [1, 5, 1.5, 3.5, 4.8], borderColor: '#f39c12', fill: true, tension: 0.4 }]
                },
                options: { ...optBase, scales: { y: { min: 0, max: 5, display: false } } }
            });
        }

        function irParaRelatorio() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return alert("Selecione um aluno!");
            window.open(`relatorio.html?id=${id}`, '_blank');
        }

        function exportarExcel() {
            if(!dadosGerais) return alert("Não há dados para exportar!");
            const lista = Object.values(dadosGerais).map(a => ({
                Aluno: a.aluno,
                Dominância: a.disc.D,
                Influência: a.disc.I,
                Estabilidade: a.disc.S,
                Conformidade: a.disc.C,
                Data: a.data || "N/A"
            }));
            const ws = XLSX.utils.json_to_sheet(lista);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Resultados");
            XLSX.writeFile(wb, "Relatorio_Jorge_Zensque.xlsx");
        }

        function zerarSistema() {
            if(confirm("ATENÇÃO JORGE: Isso apagará TODOS os alunos do banco de dados para uma nova rodada. Confirma?")) {
                db.ref('resultados_testes').remove();
                alert("Sistema zerado com sucesso!");
                location.reload();
            }
        }
    </script>
</body>
</html>
