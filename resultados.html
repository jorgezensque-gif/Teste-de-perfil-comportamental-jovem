<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão 2026 - Jorge</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; --accent: #facc15; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .grid-graficos { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 30px; }
        .card-grafico { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 250px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--blue); color: white; }
        h2, h3 { color: var(--accent); text-align: center; }
        canvas { max-width: 100%; height: 300px !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 PAINEL ESTRATÉGICO - GESTÃO JORGE 2026</h2>

    <div class="box">
        <h3>🔗 Gerador de Acessos</h3>
        <input type="text" id="nomeLink" placeholder="Nome do Aluno">
        <button class="btn" onclick="gerarLink()">GERAR E ENVIAR WHATSAPP</button>
        <div id="resultadoLink" style="margin-top:10px; color:var(--blue); font-family:monospace;"></div>
    </div>

    <div class="grid-graficos">
        <div class="card-grafico">
            <h3>Gráfico Radar SAP (Média Individual)</h3>
            <canvas id="chartRadarSAP"></canvas>
        </div>

        <div class="card-grafico">
            <h3>Gráfico Radar DISC (Perfil Predominante)</h3>
            <canvas id="chartRadarDISC"></canvas>
        </div>

        <div class="card-grafico">
            <h3>Engajamento: Total de Respondidos</h3>
            <canvas id="chartColunasGeral"></canvas>
        </div>

        <div class="card-grafico">
            <h3>Distribuição DISC da Turma</h3>
            <canvas id="chartColunasDISC"></canvas>
        </div>

        <div class="card-grafico">
            <h3>Efeito Dunning-Kruger (Jornada)</h3>
            <canvas id="chartDunningKruger"></canvas>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function gerarLink() {
        const nome = document.getElementById('nomeLink').value;
        if(!nome) return alert("Nome vazio!");
        const id = nome.toLowerCase().replace(/\s+/g, '_') + '_' + Math.floor(Math.random()*1000);
        const link = `https://jorgezensque-gif.github.io/Teste-de-perfil-comportamental-jovem/index.html?id=${id}`;
        document.getElementById('resultadoLink').innerText = link;
        window.open(`https://wa.me/5563984011065?text=Jorge enviou seu link: ${link}`, '_blank');
    }

    // INICIALIZAÇÃO DOS GRÁFICOS
    const ctx1 = document.getElementById('chartRadarSAP').getContext('2d');
    const chartSAP = new Chart(ctx1, { type: 'radar', data: { labels: ['Protagonismo', 'Resp.', 'Comun.', 'Ética', 'Prob.', 'Equipe', 'Aprender'], datasets: [{ label: 'Nível SAP', data: [0,0,0,0,0,0,0], backgroundColor: 'rgba(56, 189, 248, 0.2)', borderColor: '#38bdf8' }] }, options: { scales: { r: { suggestMin: 0, suggestMax: 5 } } } });

    const ctx2 = document.getElementById('chartRadarDISC').getContext('2d');
    const chartDISC = new Chart(ctx2, { type: 'radar', data: { labels: ['Dominância', 'Influência', 'Estabilidade', 'Conformidade'], datasets: [{ label: 'Perfil Individual', data: [0,0,0,0], backgroundColor: 'rgba(250, 204, 21, 0.2)', borderColor: '#facc15' }] } });

    const ctx3 = document.getElementById('chartColunasGeral').getContext('2d');
    const chartGeral = new Chart(ctx3, { type: 'bar', data: { labels: ['Alunos Respondidos'], datasets: [{ label: 'Total', data: [0], backgroundColor: '#38bdf8' }] } });

    const ctx4 = document.getElementById('chartColunasDISC').getContext('2d');
    const chartTurmaDISC = new Chart(ctx4, { type: 'bar', data: { labels: ['D', 'I', 'S', 'C'], datasets: [{ label: 'Alunos por Perfil', data: [0,0,0,0], backgroundColor: ['#ef4444', '#facc15', '#22c55e', '#3b82f6'] }] } });

    // 5. GRÁFICO DUNNING-KRUGER (ESTÁTICO/CONCEITUAL)
    const ctx5 = document.getElementById('chartDunningKruger').getContext('2d');
    new Chart(ctx5, {
        type: 'line',
        data: {
            labels: ['Início', 'Pico de Confiança', 'Vale do Desespero', 'Subida da Sabedoria', 'Platô'],
            datasets: [{
                label: 'Confiança vs Competência',
                data: [10, 100, 5, 40, 80],
                borderColor: '#ef4444',
                tension: 0.4,
                fill: false
            }]
        }
    });

    // ATUALIZAÇÃO DOS DADOS EM TEMPO REAL
    db.ref('resultados_testes').on('value', snap => {
        let total = 0;
        let discTurma = { D:0, I:0, S:0, C:0 };
        let sapMedias = [0,0,0,0,0,0,0];

        snap.forEach(item => {
            const d = item.val();
            total++;
            // Lógica DISC
            const dominante = Object.keys(d.disc).reduce((a, b) => d.disc[a] > d.disc[b] ? a : b);
            discTurma[dominante]++;
            // Lógica SAP (Pega o último aluno para o radar individual)
            for(let i=0; i<7; i++) sapMedias[i] = parseInt(d.sap['q'+i]);
        });

        chartGeral.data.datasets[0].data = [total];
        chartTurmaDISC.data.datasets[0].data = [discTurma.D, discTurma.I, discTurma.S, discTurma.C];
        chartSAP.data.datasets[0].data = sapMedias;
        
        chartGeral.update();
        chartTurmaDISC.update();
        chartSAP.update();
    });
</script>
</body>
</html>
