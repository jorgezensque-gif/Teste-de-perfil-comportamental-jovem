<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PAINEL JORGE 2026 - SISTEMA BLINDADO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ef4444; --blue: #38bdf8; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 15px; height: 100vh; overflow-y: auto; }
        .header { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--red); margin-bottom: 15px; }
        
        /* GRADE QUE TRAVA O TAMANHO */
        .grid-graficos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 15px; 
            max-width: 1400px; 
            margin: auto;
        }

        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #334155;
            height: 350px; /* ALTURA FIXA PARA IMPEDIR ALONGAMENTO */
            display: flex;
            flex-direction: column;
        }

        .canvas-container { 
            flex: 1; 
            position: relative; 
            min-height: 0; /* ESSENCIAL PARA O CHART.JS NÃO BUGAR */
        }

        h3 { color: #facc15; text-align: center; margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; }
        select, input, button { padding: 10px; border-radius: 5px; border: none; }
        button { cursor: pointer; font-weight: bold; background: var(--blue); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0 0 10px 0;">GESTOR: JORGE | PAINEL 2026</h2>
    <div style="display:flex; gap:10px;">
        <select id="selectAluno" onchange="atualizar()" style="flex:1;"></select>
        <button onclick="zerar()" style="background:var(--red);">ZERAR SISTEMA</button>
    </div>
</div>

<div class="grid-graficos">
    <div class="card"><h3>1. SAP (Radar)</h3><div class="canvas-container"><canvas id="c1"></canvas></div></div>
    <div class="card"><h3>2. DISC (Barras)</h3><div class="canvas-container"><canvas id="c2"></canvas></div></div>
    <div class="card"><h3>3. Competências</h3><div class="canvas-container"><canvas id="c3"></canvas></div></div>
    <div class="card"><h3>4. Correlação</h3><div class="canvas-container"><canvas id="c4"></canvas></div></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dados = [], charts = {};

    function criarChart(id, tipo, labels, colors) {
        return new Chart(document.getElementById(id), {
            type: tipo,
            data: { labels: labels, datasets: [{ data: [], backgroundColor: colors, borderColor: colors[0], borderWidth: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function init() {
        const labelsSAP = ['Protagonismo', 'Resp.', 'Comun.', 'Ética', 'Prob.', 'Equipe', 'Aprender'];
        charts.radar = criarChart('c1', 'radar', labelsSAP, ['#38bdf822']);
        charts.disc = criarChart('c2', 'bar', ['D','I','S','C'], ['#ef4444','#facc15','#22c55e','#3b82f6']);
        charts.sap = criarChart('c3', 'bar', ['P','R','C','E','Pr','Eq','A'], ['#38bdf8']);
        charts.corr = criarChart('c4', 'bar', ['D','I','S','C'], ['#ef4444','#facc15','#22c55e','#3b82f6']);
        
        db.ref('resultados_testes').on('value', snap => {
            dados = [];
            const sel = document.getElementById('selectAluno');
            sel.innerHTML = '<option value="geral">📊 VISÃO GERAL DA TURMA</option>';
            snap.forEach(c => {
                let d = c.val(); d.key = c.key; dados.push(d);
                sel.innerHTML += `<option value="${d.key}">${d.aluno.toUpperCase()}</option>`;
            });
            atualizar();
        });
    }

    function atualizar() {
        const id = document.getElementById('selectAluno').value;
        let s = [0,0,0,0,0,0,0], d = [0,0,0,0];

        if (id === 'geral' && dados.length > 0) {
            dados.forEach(r => {
                for(let i=0; i<7; i++) s[i] += parseInt(r.sap['q'+i] || 0);
                d[0] += r.disc.D; d[1] += r.disc.I; d[2] += r.disc.S; d[3] += r.disc.C;
            });
            s = s.map(v => v / dados.length);
        } else {
            const r = dados.find(x => x.key === id);
            if(r) {
                for(let i=0; i<7; i++) s[i] = parseInt(r.sap['q'+i]);
                d = [r.disc.D, r.disc.I, r.disc.S, r.disc.C];
            }
        }
        
        charts.radar.data.datasets[0].data = s;
        charts.sap.data.datasets[0].data = s;
        charts.disc.data.datasets[0].data = d;
        Object.values(charts).forEach(c => c.update());
    }

    function zerar() { if(confirm("Jorge, apagar tudo?")) db.ref('resultados_testes').remove(); }

    window.onload = init;
</script>
</body>
</html>
