<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão com IA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #000000; --ia: #8e44ad; --destaque: #00d2d3; --danger: #e74c3c; --success: #2ecc71; }
        body { background: var(--grafite); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e272e; padding: 20px; border-radius: 15px; border: 1px solid #4b4b4b; }
        .full { grid-column: 1 / -1; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; font-size: 16px; }
        select { width: 100%; padding: 15px; border-radius: 8px; background: #2d3436; color: #fff; border: 1px solid var(--destaque); font-size: 16px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; min-width: 150px; }
        .btn-ia { background: var(--ia); }
        .btn-excel { background: var(--success); }
        .btn-clear { background: var(--danger); }
        #resultadoIA { background: #2d3436; padding: 20px; border-radius: 10px; border-left: 6px solid var(--ia); display: none; margin-top: 15px; line-height: 1.5; color: #FFF; }
        .chart-container { position: relative; height: 280px; width: 100%; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card full">
            <h2>GESTÃO DE ALUNOS - RESPONSÁVEL: JORGE</h2>
            <select id="selectAluno" onchange="atualizarPainel()"><option value="">Carregando...</option></select>
            <div class="btn-group">
                <button id="btnGerarIA" class="btn-ia" onclick="analisarComIA()" style="display:none;">✨ GERAR ANÁLISE COM GEMINI 2.0</button>
                <button class="btn-excel" onclick="exportarExcel()">📊 EXPORTAR EXCEL</button>
                <button class="btn-clear" onclick="limparSistema()">🗑️ ZERAR SISTEMA</button>
            </div>
            <div id="resultadoIA"></div>
        </div>
        <div class="card"><h2>AUTOAVALIAÇÃO SAP (RADAR)</h2><div class="chart-container"><canvas id="chartRadar"></canvas></div></div>
        <div class="card"><h2>PERFIL COMPORTAMENTAL (DISC)</h2><div class="chart-container"><canvas id="chartDisc"></canvas></div></div>
        <div class="card"><h2>COMPETÊNCIAS SAP (BARRAS)</h2><div class="chart-container"><canvas id="chartSap"></canvas></div></div>
        <div class="card"><h2>JORNADA (DUNNING-KRUGER)</h2><div class="chart-container"><canvas id="chartDunning"></canvas></div></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // --- ÁREA DA CHAVE ---
    const MINHA_CHAVE_BRUTA = "COLE_SUA_CHAVE_AQUI"; 
    const GOOGLE_API_KEY = MINHA_CHAVE_BRUTA.trim(); 

    let dadosGerais = {};
    let charts = {};

    db.ref('resultados_testes').on('value', snapshot => {
        dadosGerais = snapshot.val() || {};
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="">Escolha um aluno...</option>';
        for (let id in dadosGerais) {
            let opt = document.createElement('option');
            opt.value = id; opt.text = dadosGerais[id].aluno;
            sel.add(opt);
        }
    });

    function criarGrafico(id, type, labels, datasetsConfig) {
        if(charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        charts[id] = new Chart(ctx, {
            type: type,
            data: { labels: labels, datasets: datasetsConfig },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, 
                scales: type === 'radar' ? { r: { grid: {color: '#444'}, pointLabels: {color: '#fff'}, ticks: {display: false} } } : 
                { x: { ticks: { color: '#fff' } }, y: { ticks: { color: '#fff' }, beginAtZero: true, max: 5 } }
            }
        });
    }

    function atualizarPainel() {
        const id = document.getElementById('selectAluno').value;
        if(!id) return;
        document.getElementById('btnGerarIA').style.display = 'block';
        const aluno = dadosGerais[id];
        const notasSap = [];
        for(let i=0; i<7; i++) notasSap.push(aluno.sap[`item${i}`] || 0);
        const d = aluno.disc || {D:0, I:0, S:0, C:0};
        criarGrafico('chartRadar', 'radar', ["Protagonismo", "Responsabilidade", "Comunicação", "Ética", "Problemas", "Equipe", "Aprender"], [{ data: notasSap, backgroundColor: 'rgba(0, 210, 211, 0.3)', borderColor: '#00d2d3' }]);
        criarGrafico('chartDisc', 'bar', ['D','I','S','C'], [{ data: [d.D, d.I, d.S, d.C], backgroundColor: ['#e74c3c','#f1c40f','#2ecc71','#3498db'] }]);
        criarGrafico('chartSap', 'bar', ["P", "R", "C", "E", "S", "Eq", "A"], [{ data: notasSap, backgroundColor: '#ff5c3a' }]);
        const media = (notasSap.reduce((a,b)=>a+b,0)/7).toFixed(1);
        criarGrafico('chartDunning', 'line', ['Início', 'Pico', 'Vale', 'Subida', 'Atual'], [{ data: [0.5, 5, 1, 2.5, media], borderColor: '#8e44ad', tension: 0.4, fill: false }]);
    }

    function exportarExcel() {
        const dataParaExcel = Object.values(dadosGerais).map(a => ({
            Aluno: a.aluno,
            D: a.disc.D, I: a.disc.I, S: a.disc.S, C: a.disc.C,
            Media_SAP: (Object.values(a.sap).reduce((a,b)=>a+b,0)/7).toFixed(2)
        }));
        const ws = XLSX.utils.json_to_sheet(dataParaExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Resultados");
        XLSX.utils.writeFile(wb, "Relatorio_Alunos_Jorge.xlsx");
    }

    function limparSistema() {
        if(confirm("Jorge, deseja APAGAR TUDO do banco de dados?")) {
            db.ref('resultados_testes').remove();
            alert("Sistema zerado!");
            location.reload();
        }
    }

    async function analisarComIA() {
        const id = document.getElementById('selectAluno').value;
        const aluno = dadosGerais[id];
        const box = document.getElementById('resultadoIA');
        box.innerHTML = "🤖 Mentor IA analisando dados de " + aluno.aluno + "...";
        box.style.display = 'block';
        const prompt = `Aja como um mentor de carreira. Analise as notas SAP e perfil DISC (D:${aluno.disc.D}, I:${aluno.disc.I}, S:${aluno.disc.S}, C:${aluno.disc.C}) do aluno ${aluno.aluno}. Gere um PDI com 3 ações práticas.`;
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GOOGLE_API_KEY}`;
            const resp = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await resp.json();
            if (data.candidates && data.candidates[0].content) {
                box.innerHTML = "<strong>🎯 PDI SUGERIDO PELO GEMINI 2.0:</strong><br><br>" + data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } else if (data.error) {
                throw new Error(data.error.message);
            }
        } catch (e) {
            box.innerHTML = "❌ Erro detectado: " + e.message;
        }
    }
</script>
</body>
</html>
