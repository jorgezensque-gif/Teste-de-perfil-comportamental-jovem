<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão 360°</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1e272e; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .navbar { background: #000; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #f39c12; }
        .nav-link { color: #f39c12; text-decoration: none; font-weight: bold; font-size: 12px; padding: 5px 10px; border: 1px solid #f39c12; border-radius: 4px; }
        .active { background: #f39c12; color: #000; }

        .container { max-width: 1200px; margin: 5px auto; padding: 10px; }
        
        /* GRID DE 3 COLUNAS RÍGIDO */
        .dashboard-grid { 
            display: flex; 
            justify-content: space-around; 
            gap: 10px; 
            flex-wrap: nowrap; /* Impede que eles caiam para baixo */
        }

        .chart-card { 
            background: #2d3436; 
            border-radius: 8px; 
            padding: 10px; 
            width: 32%; /* Divide a tela em 3 certinho */
            height: 300px; /* ALTURA MÁXIMA FIXA */
            box-sizing: border-box;
            border: 1px solid #444;
        }

        .canvas-container {
            position: relative;
            height: 220px; /* Espaço real para o gráfico */
            width: 100%;
        }

        h2 { color: #f39c12; text-align: center; font-size: 16px; margin-bottom: 10px; }
        h4 { text-align: center; margin: 0 0 10px 0; font-size: 13px; color: #00d2d3; text-transform: uppercase; }
        
        select { width: 100%; padding: 8px; background: #000; color: #fff; border: 1px solid #f39c12; border-radius: 5px; margin-bottom: 10px; }
        .btn-azul { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }

    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">📝 TESTE</a>
        <a href="resultados.html" class="nav-link active">👤 INDIVIDUAL</a>
        <a href="dashboard_geral.html" class="nav-link">📊 TURMA</a>
    </div>

    <div class="container">
        <h2>GESTOR: JORGE | PAINEL DE ANÁLISE</h2>
        
        <select id="selectAluno" onchange="atualizarDashboard()">
            <option value="">Selecione o Aluno...</option>
        </select>
        
        <button class="btn-azul" onclick="irParaRelatorio()" style="margin-bottom:15px;">📄 ABRIR RELATÓRIO PDF PARA IMPRIMIR</button>

        <div class="dashboard-grid">
            <div class="chart-card">
                <h4>Radar SAP</h4>
                <div class="canvas-container"><canvas id="chartRadar"></canvas></div>
            </div>

            <div class="chart-card">
                <h4>Perfil DISC</h4>
                <div class="canvas-container"><canvas id="chartDisc"></canvas></div>
            </div>

            <div class="chart-card">
                <h4>Dunning-Kruger</h4>
                <div class="canvas-container"><canvas id="chartDunning"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let dadosGerais = {};
        let graficos = {};

        db.ref('resultados_testes').on('value', snap => {
            dadosGerais = snap.val();
            const combo = document.getElementById('selectAluno');
            combo.innerHTML = '<option value="">Selecione o Aluno...</option>';
            for(let id in dadosGerais) {
                let opt = document.createElement('option');
                opt.value = id; opt.text = dadosGerais[id].aluno;
                combo.add(opt);
            }
        });

        function atualizarDashboard() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            const a = dadosGerais[id];
            
            // Destruição total para evitar sobreposição
            if(graficos.r) graficos.r.destroy();
            if(graficos.d) graficos.d.destroy();
            if(graficos.dk) graficos.dk.destroy();

            const optBase = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

            graficos.r = new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: ["Prot.", "Resp.", "Com.", "Ética", "Prob.", "Equip.", "Apr."],
                    datasets: [{ data: Object.values(a.sap), backgroundColor: 'rgba(0, 210, 211, 0.2)', borderColor: '#00d2d3', borderWidth: 2 }]
                },
                options: { ...optBase, scales: { r: { min: 0, max: 5, ticks: { display: false } } } }
            });

            graficos.d = new Chart(document.getElementById('chartDisc'), {
                type: 'bar',
                data: {
                    labels: ['D', 'I', 'S', 'C'],
                    datasets: [{ data: [a.disc.D, a.disc.I, a.disc.S, a.disc.C], backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4', '#74b9ff'] }]
                },
                options: { ...optBase, scales: { y: { min: 0, max: 7 } } }
            });

            graficos.dk = new Chart(document.getElementById('chartDunning'), {
                type: 'line',
                data: {
                    labels: ['Início', 'Pico', 'Vale', 'Subida', 'Platô'],
                    datasets: [{ data: [1, 5, 1.5, 3.5, 4.8], borderColor: '#f39c12', fill: true, tension: 0.4 }]
                },
                options: { ...optBase, scales: { y: { min: 0, max: 5, display: false } } }
            });
        }

        function irParaRelatorio() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            window.open(`relatorio.html?id=${id}`, '_blank');
        }
    </script>
</body>
</html>
