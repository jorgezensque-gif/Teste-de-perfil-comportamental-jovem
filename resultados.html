<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão 360°</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #1e272e; color: white; font-family: sans-serif; padding: 0; margin: 0; }
        .navbar { background: #000; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #f39c12; }
        .nav-link { color: #f39c12; text-decoration: none; font-weight: bold; padding: 5px 10px; border: 1px solid #f39c12; border-radius: 5px; font-size: 13px; }
        .active { background: #f39c12; color: #000; }

        .card { background: #2d3436; padding: 15px; border-radius: 10px; max-width: 1100px; margin: 10px auto; }
        h2 { color: #f39c12; text-align: center; margin: 5px 0; font-size: 18px; }
        
        select { width: 100%; padding: 10px; background: #000; color: #00d2d3; border: 2px solid #00d2d3; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; font-size: 12px; }
        .btn-azul { background: #3498db; color: white; }

        /* AJUSTE DE TAMANHO DOS GRÁFICOS */
        .charts-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3 colunas para caber tudo lado a lado */
            gap: 15px; 
        }
        .chart-box { 
            background: #353b48; 
            padding: 10px; 
            border-radius: 8px; 
            height: 280px; /* Altura travada para não crescer */
            position: relative;
        }
        h4 { text-align: center; color: #f39c12; margin: 0 0 10px 0; font-size: 14px; }

        @media (max-width: 900px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">📝 TESTE</a>
        <a href="resultados.html" class="nav-link active">👤 INDIVIDUAL</a>
        <a href="dashboard_geral.html" class="nav-link">📊 TURMA</a>
    </div>

    <div class="card">
        <h2>GESTOR RESPONSÁVEL: JORGE</h2>
        <select id="selectAluno" onchange="atualizarDashboard()">
            <option value="">Escolha um aluno...</option>
        </select>
        <div class="btn-group">
            <button class="btn-azul" onclick="irParaRelatorio()">📄 GERAR RELATÓRIO PDF</button>
        </div>

        <div class="charts-container">
            <div class="chart-box"><h4>RADAR SAP</h4><canvas id="chartRadar"></canvas></div>
            <div class="chart-box"><h4>PERFIL DISC</h4><canvas id="chartDisc"></canvas></div>
            <div class="chart-box"><h4>DUNNING-KRUGER</h4><canvas id="chartDunning"></canvas></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let dadosGerais = {};
        let graficosInstancias = {};

        db.ref('resultados_testes').on('value', snap => {
            dadosGerais = snap.val();
            const combo = document.getElementById('selectAluno');
            combo.innerHTML = '<option value="">Escolha um aluno...</option>';
            for(let id in dadosGerais) {
                let opt = document.createElement('option');
                opt.value = id; opt.text = dadosGerais[id].aluno;
                combo.add(opt);
            }
        });

        function atualizarDashboard() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            const a = dadosGerais[id];
            
            // Destruir gráficos antigos para evitar bugs
            ['radar','disc','dunning'].forEach(k => {
                if(graficosInstancias[k]) graficosInstancias[k].destroy();
            });

            const configComum = { responsive: true, maintainAspectRatio: false };

            graficosInstancias['radar'] = new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: ["Prot.", "Resp.", "Com.", "Ética", "Prob.", "Equip.", "Apr."],
                    datasets: [{ data: Object.values(a.sap), backgroundColor: 'rgba(0, 210, 211, 0.2)', borderColor: '#00d2d3' }]
                },
                options: { ...configComum, scales: { r: { min: 0, max: 5, ticks: { display: false } } } }
            });

            graficosInstancias['disc'] = new Chart(document.getElementById('chartDisc'), {
                type: 'bar',
                data: {
                    labels: ['D', 'I', 'S', 'C'],
                    datasets: [{ data: [a.disc.D, a.disc.I, a.disc.S, a.disc.C], backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4', '#74b9ff'] }]
                },
                options: { ...configComum, scales: { y: { min: 0, max: 7 } }, plugins: { legend: { display: false } } }
            });

            graficosInstancias['dunning'] = new Chart(document.getElementById('chartDunning'), {
                type: 'line',
                data: {
                    labels: ['Início', 'Pico', 'Vale', 'Subida', 'Platô'],
                    datasets: [{ data: [1, 5, 1.5, 3.5, 4.8], borderColor: '#f39c12', fill: true, tension: 0.4 }]
                },
                options: { ...configComum, scales: { y: { min: 0, max: 5, display: false } }, plugins: { legend: { display: false } } }
            });
        }

        function irParaRelatorio() {
            const id = document.getElementById('selectAluno').value;
            if(!id) return;
            window.open(`relatorio.html?id=${id}`, '_blank');
        }
    </script>
</body>
</html>
