<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <title>Painel Jorge - Gestão com IA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primaria: #ff5c3a; --grafite: #000000; --ia: #8e44ad; }
        body { background: var(--grafite); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e272e; padding: 20px; border-radius: 15px; border: 1px solid #4b4b4b; }
        .full { grid-column: 1 / -1; }
        h2 { color: var(--primaria); border-bottom: 2px solid var(--primaria); padding-bottom: 10px; font-size: 16px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #2d3436; color: #fff; margin-bottom: 15px; }
        .btn-ia { width: 100%; padding: 15px; background: var(--ia); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #resultadoIA { background: #2d3436; padding: 15px; border-radius: 10px; border-left: 5px solid var(--ia); display: none; margin-top: 10px; }
        canvas { max-height: 300px; }
    </style>
</head>
<body class="notranslate">
    <div class="grid">
        <div class="card full">
            <h2>SELECIONAR ALUNO</h2>
            <select id="selectAluno" onchange="atualizarPainel()"><option value="">Carregando...</option></select>
            <button id="btnGerarIA" class="btn-ia" onclick="analisarComIA()" style="display:none;">✨ GERAR ANÁLISE COM IA</button>
            <div id="resultadoIA"></div>
        </div>

        <div class="card"><h2>AUTOAVALIAÇÃO SAP (RADAR)</h2><canvas id="chartRadar"></canvas></div>
        <div class="card"><h2>PERFIL DISC</h2><canvas id="chartDisc"></canvas></div>
        <div class="card"><h2>COMPETÊNCIAS SAP</h2><canvas id="chartSap"></canvas></div>
        <div class="card"><h2>CURVA DUNNING-KRUGER</h2><canvas id="chartDunning"></canvas></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const GEMINI_API_KEY = "AIzaSyBEw-HIPZUDCTXqrVhbXeUA9Md_KLo7y0E"; 

    let dadosGerais = {};
    let charts = {};

    db.ref('resultados_testes').on('value', snapshot => {
        dadosGerais = snapshot.val() || {};
        const sel = document.getElementById('selectAluno');
        sel.innerHTML = '<option value="">Escolha o aluno...</option>';
        for (let id in dadosGerais) {
            let opt = document.createElement('option');
            opt.value = id; opt.text = dadosGerais[id].aluno;
            sel.add(opt);
        }
    });

    function criarGrafico(id, type, labels, data, color) {
        if(charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        charts[id] = new Chart(ctx, {
            type: type,
            data: { labels: labels, datasets: [{ data: data, backgroundColor: color, borderColor: color, fill: type==='radar' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: type !== 'radar' ? { y: { beginAtZero: true, grid: {color: '#444'} } } : {} }
        });
    }

    function atualizarPainel() {
        const id = document.getElementById('selectAluno').value;
        if(!id) return;
        document.getElementById('btnGerarIA').style.display = 'block';
        const aluno = dadosGerais[id];
        const notasSap = Object.values(aluno.sap || {});
        const d = aluno.disc || {D:0, I:0, S:0, C:0};

        // 1. Radar SAP
        criarGrafico('chartRadar', 'radar', ["Protagonismo", "Responsabilidade", "Comunicação", "Ética", "Problemas", "Equipe", "Aprender"], notasSap, 'rgba(0, 210, 211, 0.5)');
        
        // 2. DISC (Restaurado)
        criarGrafico('chartDisc', 'bar', ['D','I','S','C'], [d.D, d.I, d.S, d.C], ['#e74c3c','#f1c40f','#2ecc71','#3498db']);
        
        // 3. SAP Barras
        criarGrafico('chartSap', 'bar', ["P", "R", "C", "E", "S", "Eq", "A"], notasSap, '#ff5c3a');

        // 4. Curva Dunning-Kruger (Simulação Baseada em Média SAP vs Confiança)
        const competencia = notasSap.reduce((a,b)=>a+b,0)/7;
        const confianca = 5; // Valor estático para simular a curva inicial
        criarGrafico('chartDunning', 'line', ['Iniciante', 'Monte da Ignorância', 'Vale do Desespero', 'Subida da Iluminação', 'Mestria'], [0, 5, 1, 3, competencia], '#8e44ad');
    }

    async function analisarComIA() {
        const id = document.getElementById('selectAluno').value;
        const box = document.getElementById('resultadoIA');
        box.innerHTML = "🤖 Analisando...";
        box.style.display = 'block';
        const prompt = "Analise o perfil de " + dadosGerais[id].aluno + " com base em SAP " + JSON.stringify(dadosGerais[id].sap) + " e DISC " + JSON.stringify(dadosGerais[id].disc);
        
        try {
            const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            box.innerHTML = d.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        } catch (e) { alert("Erro na IA. Verifique a tradução."); }
    }
</script>
</body>
</html>
