<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatório - Jorge</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: white; padding: 40px; font-family: sans-serif; }
        h1 { color: #ff5c3a; border-bottom: 2px solid #ff5c3a; }
        .print-btn { background: #3498db; color: white; padding: 10px; border: none; cursor: pointer; }
        @media print { .print-btn { display: none; } }
    </style>
</head>
<body>
    <button class="print-btn" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
    <h1 id="nomeAluno">CARREGANDO...</h1>
    <div style="height:400px"><canvas id="c1"></canvas></div>
    <script>
        const firebaseConfig = { databaseURL: "https://perfil-jovem--disc-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) {
            firebase.database().ref('resultados_testes/' + id).once('value', snap => {
                const a = snap.val();
                document.getElementById('nomeAluno').innerText = "ALUNO: " + a.aluno.toUpperCase();
                new Chart(document.getElementById('c1'), {
                    type: 'bar',
                    data: {
                        labels: ["SAP 1", "SAP 2", "SAP 3", "SAP 4", "SAP 5", "SAP 6", "SAP 7"],
                        datasets: [{ data: Object.values(a.sap), backgroundColor: '#00d2d3' }]
                    },
                    options: { indexAxis: 'y', scales: { x: { min: 0, max: 5 } } }
                });
            });
        }
    </script>
</body>
</html>
